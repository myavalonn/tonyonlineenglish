<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tutor Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #ffffff;
    --surf:     #f5f5f5;
    --card:     #ffffff;
    --border:   #e0e0e0;
    --border2:  #c0c0c0;
    --text:     #111111;
    --sub:      #444444;
    --muted:    #888888;
    --red:      #cc0000;
    --r:        8px;
    --mono:     'Inter', sans-serif;
    --sans:     'Noto Sans TC', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100dvh; overflow-x: hidden; }

  #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 999; transition: opacity 0.5s ease; }
  #loader.out { opacity: 0; pointer-events: none; }
  .loader-ring { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.9s linear infinite; }
  .loader-text { font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--text); letter-spacing: 0.08em; }
  @keyframes spin { to { transform: rotate(360deg); } }

  header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.95); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); padding: 12px 16px 10px; }
  .hrow1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 12px; flex-wrap: wrap; }
  .logo { font-family: var(--mono); font-size: 0.78rem; font-weight: 700; color: var(--text); letter-spacing: 0.14em; display: flex; align-items: center; gap: 8px; }
  @media (min-width: 600px) { .logo { font-size: 1.05rem; } }
  .logo-dot { width: 7px; height: 7px; background: var(--text); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }

  .current-date-bar { font-family: var(--mono); font-size: 0.68rem; font-weight: 700; color: #fff; background: #0066cc; border-radius: var(--r); padding: 4px 12px; white-space: nowrap; }
  @media (min-width: 600px) { .current-date-bar { font-size: 0.9rem; padding: 6px 18px; } }

  .today-pill { font-family: var(--mono); font-size: clamp(0.75rem, 3.8vw, 1.24rem); font-weight: 700; padding: clamp(6px, 1.5vw, 8px) clamp(10px, 2.5vw, 18px); border-radius: var(--r); border: 2px solid var(--text); color: var(--text); background: transparent; cursor: pointer; transition: 0.15s; }
  .today-pill:hover { background: var(--text); color: var(--bg); }

  .hrow2 { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn { background: var(--text); border: none; color: var(--bg); cursor: pointer; font-size: 1.8rem; font-weight: 700; width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
  .nav-btn:hover:not(:disabled) { background: var(--sub); transform: scale(1.08); }
  .nav-btn:disabled { opacity: 0.18; cursor: default; }
  #weekLabel { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--text); min-width: 140px; text-align: center; }

/* ─── TODAY BANNER ──────────────────────────────────── */
  .today-end-banner {
    background: #F2ADA3; 
    color: #000000; 
    font-family: var(--sans);
    font-size: clamp(1.25rem, 4.5vw, 1.8rem); 
    font-weight: 700; 
    text-align: center;
    padding: 22px 16px; 
    margin: 16px 12px 0; 
    border-radius: var(--r);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15); 
    animation: fadeUp 0.35s ease both;
  }
  @media (min-width: 600px) { .today-end-banner { margin: 24px auto 0; max-width: 1400px; padding: 28px; } }
  .today-end-banner .highlight-time { font-family: var(--mono); color: #000000; padding-left: 2px; }
  .today-topic { font-size: clamp(1.05rem, 3.5vw, 1.3rem); margin-top: 6px; font-weight: 400; color: rgba(0,0,0,0.7); }

  /* ─── GRID & CARDS ──────────────────────────────────── */
  .grid { display: grid; grid-template-columns: 57vw 57vw; gap: 10px; padding: 14px 12px 36px; position: relative; will-change: transform; }
  @media (min-width: 600px) and (max-width: 979px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 18px 18px 44px; } }
  @media (min-width: 980px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 24px 28px 56px; max-width: 1400px; margin: 0 auto; } }

  .card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r); display: flex; flex-direction: column; min-height: 180px; animation: fadeUp 0.35s ease both; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .card.today { border-color: var(--text); border-width: 2px; box-shadow: 0 2px 12px rgba(0,0,0,0.14); }

  .card-head { padding: 11px 13px 9px; border-bottom: 1.5px solid var(--border); background: var(--surf); display: flex; flex-direction: column; gap: 2px; }
  @media (min-width: 600px) { .card-head { padding: 18px 18px 14px; } }
  .day-label { display: flex; align-items: center; gap: 5px; }
  .day-en { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; color: var(--text); }
  .day-zh { font-family: var(--sans); font-size: 0.88rem; font-weight: 700; color: var(--sub); }
  .day-num { font-family: var(--mono); font-size: 2.2rem; font-weight: 700; color: var(--text); margin-top: 4px; }
  @media (min-width: 600px) { .day-en { font-size: 1.4rem; } .day-zh { font-size: 1.15rem; } .day-num { font-size: 2.8rem; } }

  .card-end-time { font-family: var(--sans); font-size: 0.75rem; color: var(--muted); margin-top: 6px; font-weight: 500; }
  @media (min-width: 600px) { .card-end-time { font-size: 0.85rem; } }
  .card.today .card-end-time { color: var(--sub); font-weight: 700; }

  .student-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .s-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(--surf); border: 1.5px solid var(--border); border-radius: 6px; }
  .s-info { flex: 1; min-width: 0; }
  .s-name { font-family: var(--sans); font-size: 1rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-time { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); margin-top: 2px; display: block; }
  @media (min-width: 600px) { .s-name { font-size: 1.1rem; } .s-row { padding: 14px; } }

  .no-class { flex: 1; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; padding: 20px 8px; }
  
  .error-box { margin: 40px auto; max-width: 440px; background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r); padding: 28px 24px; text-align: center; }
  .error-box h2 { font-family: var(--mono); color: var(--red); font-size: 0.9rem; margin-bottom: 10px; }
  .error-box p { font-size: 0.8rem; color: var(--sub); }

  /* ─── POPUP MODAL (NEW) ─────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 1000;
    padding: 20px; opacity: 0; transition: opacity 0.3s ease;
  }
  .modal-overlay.show { display: flex; opacity: 1; }
  .modal-card {
    background: #F2ADA3; /* Match the banner color */
    color: #000; width: 100%; max-width: 550px; border-radius: 16px;
    padding: 44px 24px 40px; position: relative;
    box-shadow: 0 12px 32px rgba(0,0,0,0.3); text-align: center;
    transform: translateY(20px); transition: transform 0.3s ease;
  }
  .modal-overlay.show .modal-card { transform: translateY(0); }
  
  .modal-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; font-size: 32px; font-weight: bold;
    color: rgba(0,0,0,0.5); cursor: pointer; transition: color 0.2s;
    line-height: 1; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: #000; }
  
  /* Large text for the modal */
  .modal-card-text { font-family: var(--sans); font-size: clamp(1.5rem, 6vw, 2.2rem); font-weight: 700; }
  .modal-card-text .highlight-time { font-family: var(--mono); color: #000; font-size: 1.1em; }
  .modal-card-text .today-topic { font-size: clamp(1.2rem, 4.5vw, 1.6rem); margin-top: 16px; font-weight: 400; color: rgba(0,0,0,0.8); }

  /* Modal 專用的日期樣式 */
  .modal-date {
    font-family: var(--mono);
    font-size: clamp(1rem, 4vw, 1.3rem);
    font-weight: 700;
    color: rgba(0,0,0,0.65);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div id="loader"><div class="loader-ring"></div><div class="loader-text">Loading calendar…</div></div>

<header>
  <div class="hrow1">
    <div class="logo"><div class="logo-dot"></div>TUTOR TRACKER</div>
    <div class="current-date-bar" id="currentDateBar">—</div>
    <div class="top-actions">
      <button class="today-pill" onclick="goToday()">THIS WEEK</button>
    </div>
  </div>
  <div class="hrow2">
    <div class="week-nav">
      <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">&#8249;</button>
      <div id="weekLabel">—</div>
      <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">&#8250;</button>
    </div>
  </div>
</header>

<!-- Banner 原本位置保持不變 -->
<div id="todayBanner" class="today-end-banner" style="display:none;"></div>
<div class="grid" id="grid"></div>

<!-- 新增的彈出式卡片 (Popup Modal) -->
<div id="infoModalOverlay" class="modal-overlay">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalContent" class="modal-card-text"></div>
  </div>
</div>

<script>
// =========================================================
// REPLACE THIS URL WITH YOUR NEW APPS SCRIPT WEB APP URL
// =========================================================
const API = 'https://script.google.com/macros/s/AKfycby0MWwKq9bericZPj5NYy4cOkwVa0pUMGgr6p0SS7M_JZiV_dl5L16jSDgjJtpOK6e5dA/exec';

const DAY_NAMES = ['MON','TUE','WED','THU','FRI','SAT'];
const DAY_NAMES_ZH = ['週一','週二','週三','週四','週五','週六'];
const CN_DAYS = ['日','一','二','三','四','五','六'];
const EN_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let currentMonday = null;
let hasShownModal = false; // 控制只在初次載入時彈出

function updateCurrentDateBar() {
  const now = new Date();
  const dow = now.getDay();
  document.getElementById('currentDateBar').textContent = 
    `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}  ${EN_DAYS[dow]}  ${CN_DAYS[dow]}`;
}

window.addEventListener('DOMContentLoaded', () => {
  currentMonday = getMondayOf(new Date());
  updateCurrentDateBar();
  setInterval(updateCurrentDateBar, 60000);
  loadWeek();
});

function loadWeek() {
  document.getElementById('loader').classList.remove('out');
  
  const monDate = new Date(currentMonday + 'T00:00:00');
  const satDate = new Date(currentMonday + 'T00:00:00'); satDate.setDate(monDate.getDate() + 5);
  document.getElementById('weekLabel').textContent = `${monDate.getMonth()+1}/${monDate.getDate()} – ${satDate.getMonth()+1}/${satDate.getDate()}`;
  document.getElementById('prevBtn').disabled = currentMonday <= getMondayOf(new Date());

  const script = document.createElement('script');
  const cbName = '_cb_' + Date.now();
  
  window[cbName] = (json) => {
    delete window[cbName]; script.remove();
    document.getElementById('loader').classList.add('out');
    if (json.error) {
      document.getElementById('grid').innerHTML = `<div class="error-box" style="grid-column:1/-1"><h2>&#9888; Could not load data</h2><p>${json.error}</p></div>`;
    } else {
      renderGrid(json.data);
    }
  };

  script.src = `${API}?date=${currentMonday}&callback=${cbName}`;
  document.head.appendChild(script);
}

function renderGrid(weekEvents) {
  const grid = document.getElementById('grid');
  const todayStr = fmt(new Date());
  const todayTime = new Date(todayStr + 'T00:00:00').getTime();
  const banner = document.getElementById('todayBanner');
  
  grid.innerHTML = '';
  banner.style.display = 'none';

  for (let i = 0; i < 6; i++) {
    const d = new Date(currentMonday + 'T00:00:00');
    d.setDate(d.getDate() + i);
    const dateStr = fmt(d);
    
    // Hide past days entirely
    if (d.getTime() < todayTime) continue;

    const events = weekEvents[dateStr] || [];
    const isToday = dateStr === todayStr;
    const lastEventOnly = events.length > 0 ? [events[events.length - 1]] : [];

    let endTimeHtml = '<div class="card-end-time">無課程</div>';
    
    if (lastEventOnly.length > 0) {
      const ev = lastEventOnly[0];
      const endTimeStr = ev.endTime || ev.time.split('-').pop().trim();
      const topicName = ev.title.replace(/\s*(English\s*(Class|Lesson)?|英文課?|英語課?|的?英文|的?英語)\s*/gi, '').trim() || ev.title;
      
      endTimeHtml = `<div class="card-end-time">最後結束 ${endTimeStr}</div>`;
      
      if (isToday) {
        const bannerHtml = `今天最後一堂課程結束於 <span class="highlight-time">${endTimeStr}</span><div class="today-topic">Topic ${topicName}</div>`;
        banner.innerHTML = bannerHtml;
        banner.style.display = 'block';
        if (!hasShownModal) { showModal(bannerHtml); hasShownModal = true; }
      }
    } else if (isToday) {
      const bannerHtml = `今天沒有課程`;
      banner.innerHTML = bannerHtml;
      banner.style.display = 'block';
      if (!hasShownModal) { showModal(bannerHtml); hasShownModal = true; }
    }

    const card = document.createElement('div');
    card.className = `card${isToday ? ' today' : ''}`;
    
    card.innerHTML = `
      <div class="card-head">
        <div class="day-label"><span class="day-en">${DAY_NAMES[i]}</span><span class="day-zh">${DAY_NAMES_ZH[i]}</span></div>
        <div class="day-num">${d.getMonth()+1}/${d.getDate()}</div>
        ${endTimeHtml}
      </div>
      <div class="student-list">
        ${lastEventOnly.length === 0 ? '<div class="no-class">NO CLASS</div>' : 
          `<div class="s-row">
            <div class="s-info">
              <div class="s-name">${lastEventOnly[0].title.replace(/\s*(English\s*(Class|Lesson)?|英文課?|英語課?|的?英文|的?英語)\s*/gi, '').trim() || lastEventOnly[0].title}</div>
              <div class="s-time">${lastEventOnly[0].time}</div>
            </div>
          </div>`
        }
      </div>`;
    grid.appendChild(card);
  }
}

// 彈出式 Modal 控制函數 (加入今日日期與星期幾)
function showModal(content) {
  const overlay = document.getElementById('infoModalOverlay');
  
  // 取得今日日期格式化 (例如：2023.10.25 星期三)
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 星期${CN_DAYS[now.getDay()]}`;
  
  // 組合 Modal 的內容，將日期放在最上面
  document.getElementById('modalContent').innerHTML = 
    `<div class="modal-date">${dateStr}</div>` + content;
    
  overlay.style.display = 'flex';
  
  // 加入一點小延遲以確保過渡動畫能執行
  setTimeout(() => overlay.classList.add('show'), 10);
}

function closeModal() {
  const overlay = document.getElementById('infoModalOverlay');
  overlay.classList.remove('show');
  setTimeout(() => { overlay.style.display = 'none'; }, 300);
}

function slideGrid(delta, cb) {
  const grid = document.getElementById('grid');
  grid.style.transition = 'transform 0.25s, opacity 0.25s';
  grid.style.transform = `translateX(${delta > 0 ? '-110%' : '110%'})`;
  grid.style.opacity = '0.2';
  setTimeout(() => {
    cb();
    grid.style.transition = 'none';
    grid.style.transform = `translateX(${delta > 0 ? '110%' : '-110%'})`;
    void grid.offsetWidth;
    grid.style.transition = 'transform 0.28s, opacity 0.28s';
    grid.style.transform = 'translateX(0)';
    grid.style.opacity = '1';
  }, 220);
}

function changeWeek(delta) {
  if (delta < 0 && currentMonday <= getMondayOf(new Date())) return;
  slideGrid(delta, () => {
    const d = new Date(currentMonday + 'T00:00:00');
    d.setDate(d.getDate() + delta * 7);
    currentMonday = fmt(d);
    loadWeek();
  });
}

function goToday() {
  const todayMon = getMondayOf(new Date());
  if (currentMonday === todayMon) return;
  slideGrid(todayMon > currentMonday ? 1 : -1, () => {
    currentMonday = todayMon;
    loadWeek();
  });
}

function getMondayOf(d) { const nd = new Date(d); const day = nd.getDay(); nd.setDate(nd.getDate() + (day === 0 ? -6 : 1 - day)); return fmt(nd); }
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
</script>
</body>
</html>
