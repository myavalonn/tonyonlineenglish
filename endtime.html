<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tutor Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ─── CLEAN WHITE THEME ─────────────────────────────── */
  :root {
    --bg:       #ffffff;
    --surf:     #f5f5f5;
    --card:     #ffffff;
    --border:   #e0e0e0;
    --border2:  #c0c0c0;
    --accent:   #111111;
    --accent2:  #444444;
    --green:    #111111;
    --red:      #cc0000;
    --text:     #111111;
    --sub:      #444444;
    --muted:    #888888;
    --r:        8px;
    --mono:     'Inter', sans-serif;
    --sans:     'Noto Sans TC', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ─── SIMPLE LOADER ─────────────────────────────────── */
  #loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 999;
    transition: opacity 0.5s ease;
  }
  #loader.out { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  .loader-text {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── HEADER ────────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
  }

  .hrow1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @media (min-width: 600px) { .logo { font-size: 0.95rem; } }
  @media (min-width: 980px) { .logo { font-size: 1.05rem; } }

  .logo-dot {
    width: 7px; height: 7px;
    border-radius: 1px;
    background: var(--text);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  .current-date-bar {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 700;
    color: #ffffff;
    background: #0066cc;
    border: 1px solid #0066cc;
    border-radius: var(--r);
    padding: 4px 12px;
    white-space: nowrap;
  }

  @media (min-width: 600px) { .current-date-bar { font-size: 0.9rem; padding: 5px 16px; } }
  @media (min-width: 980px) { .current-date-bar { font-size: 1rem; padding: 6px 18px; } }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
    white-space: nowrap;
  }

  .today-pill {
    font-family: var(--mono);
    font-size: clamp(0.75rem, 3.8vw, 1.24rem); 
    font-weight: 700;
    padding: clamp(6px, 1.5vw, 8px) clamp(10px, 2.5vw, 18px);
    border-radius: var(--r);
    border: 2px solid var(--text);
    color: var(--text);
    background: transparent;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .today-pill:hover { background: var(--text); color: var(--bg); }

  .summary-pill {
    font-family: var(--mono);
    font-size: clamp(0.8rem, 4vw, 1.3rem); 
    font-weight: 700;
    color: #0066cc;
    white-space: nowrap;
  }

  .hrow2 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-btn {
    background: var(--text);
    border: none;
    color: var(--bg);
    cursor: pointer;
    font-size: 1.8rem;
    font-weight: 700;
    width: 44px; height: 44px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    line-height: 1;
    flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { background: var(--sub); transform: scale(1.08); }
  .nav-btn:active:not(:disabled) { transform: scale(0.94); }
  .nav-btn:disabled { opacity: 0.18; cursor: default; }

  #weekLabel {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    min-width: 140px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  @media (min-width: 600px) { #weekLabel { font-size: 1.2rem; } }

  .prog-track {
    height: 3px;
    background: var(--border);
    overflow: hidden;
    margin-top: 10px;
  }

  .prog-fill {
    height: 100%;
    background: var(--text);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ─── TODAY BANNER ──────────────────────────────────── */
  .today-end-banner {
    background: var(--text);
    color: var(--bg);
    font-family: var(--sans);
    font-size: clamp(1.25rem, 4.5vw, 1.8rem);
    font-weight: 700;
    text-align: center;
    padding: 22px 16px;
    margin: 16px 12px 0;
    border-radius: var(--r);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    animation: fadeUp 0.35s ease both;
    position: relative;
    z-index: 2;
    line-height: 1.4;
  }
  @media (min-width: 600px) and (max-width: 979px) {
    .today-end-banner { margin: 20px 18px 0; padding: 26px; }
  }
  @media (min-width: 980px) {
    .today-end-banner { margin: 24px auto 0; max-width: 1400px; padding: 28px; }
  }
  .today-end-banner .highlight-time {
    font-family: var(--mono);
    color: #ffffff;
    padding-left: 2px;
  }
  .today-topic {
    font-size: clamp(1.05rem, 3.5vw, 1.3rem);
    margin-top: 6px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.02em;
  }

  /* ─── GRID ──────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 57vw 57vw;
    gap: 10px;
    padding: 14px 12px 36px;
    position: relative;
    z-index: 1;
    will-change: transform;
  }

  @media (min-width: 600px) and (max-width: 979px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 18px 18px 44px; }
  }

  @media (min-width: 980px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 24px 28px 56px; max-width: 1400px; margin: 0 auto; }
  }

  /* ─── DAY CARD ──────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    display: flex;
    flex-direction: column;
    min-height: 200px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.35s ease both;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  @media (min-width: 600px) and (max-width: 979px) { .card { min-height: 240px; } }
  @media (min-width: 980px) { .card { min-height: 240px; } }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card.today {
    border-color: var(--text);
    border-width: 2px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.14);
  }

  .card.done {
    background: var(--surf);
    border-color: var(--border2);
  }

  .card-head {
    padding: 11px 13px 9px;
    border-bottom: 1.5px solid var(--border);
    background: var(--surf);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  @media (min-width: 600px) and (max-width: 979px) { .card-head { padding: 18px 18px 14px; } }
  @media (min-width: 980px) { .card-head { padding: 20px 20px 14px; } }

  .day-label {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 2px;
  }

  .day-en {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .day-zh {
    font-family: var(--sans);
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--sub);
  }

  @media (min-width: 600px) and (max-width: 979px) {
    .day-en { font-size: 1.4rem; }
    .day-zh { font-size: 1.15rem; }
  }

  @media (min-width: 980px) {
    .day-en { font-size: 1.05rem; }
    .day-zh { font-size: 0.88rem; }
  }

  .card.today .day-en { color: var(--text); }
  .card.today .day-zh { color: var(--sub); }

  .badge {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 700;
    padding: 1px 7px;
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    color: var(--sub);
    background: var(--bg);
    margin-left: auto;
    letter-spacing: 0.04em;
    white-space: nowrap;
    transition: all 0.2s;
  }

  @media (min-width: 600px) and (max-width: 979px) { .badge { font-size: 0.85rem; padding: 2px 9px; } }
  @media (min-width: 980px) { .badge { font-size: 0.82rem; padding: 2px 9px; } }

  .card.done .badge { background: var(--text); color: var(--bg); border-color: var(--text); }

  .day-num {
    font-family: var(--mono);
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  @media (min-width: 600px) and (max-width: 979px) { .day-num { font-size: 2.8rem; } }
  @media (min-width: 980px) { .day-num { font-size: 2.4rem; } }

  .card-end-time {
    font-family: var(--sans);
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  @media (min-width: 600px) { .card-end-time { font-size: 0.85rem; } }
  .card.today .card-end-time { color: var(--sub); font-weight: 700; }

  /* ─── STUDENT ROWS & GIANT CHECK ────────────────────── */
  .student-list {
    position: relative;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .giant-check {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 75%;
    height: 75%;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.3);
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 10;
  }

  .card.done .giant-check {
    opacity: 0.22;
    transform: translate(-50%, -50%) scale(1);
  }

  .s-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  @media (min-width: 600px) and (max-width: 979px) { .s-row { padding: 15px 16px; gap: 14px; } }
  @media (min-width: 980px) { .s-row { padding: 13px 16px; gap: 14px; } }

  .s-row:hover { border-color: var(--border2); background: var(--surf); }
  .s-row:active { transform: scale(0.98); }

  .s-row.sent { background: var(--surf); border-color: var(--border2); }

  .checkbox {
    width: 24px; height: 24px;
    border: 2px solid var(--border2);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    font-size: 14px;
    font-weight: 700;
    background: var(--bg);
    color: var(--bg);
  }

  @media (min-width: 600px) and (max-width: 979px) { .checkbox { width: 30px; height: 30px; font-size: 18px; border-radius: 5px; } }
  @media (min-width: 980px) { .checkbox { width: 24px; height: 24px; font-size: 14px; } }

  .s-row.sent .checkbox { background: var(--text); border-color: var(--text); color: var(--bg); }

  .s-info { flex: 1; min-width: 0; }

  .s-name {
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @media (min-width: 600px) and (max-width: 979px) { .s-name { font-size: 1.3rem; } }
  @media (min-width: 980px) { .s-name { font-size: 1rem; } }

  .s-row.sent .s-name { text-decoration: line-through; opacity: 0.45; }

  .s-time {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    display: block; 
  }

  .no-class {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 20px 8px;
  }

  /* ─── TOAST ─────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 10px 22px;
    border-radius: 50px;
    z-index: 200;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1), opacity 0.28s;
    opacity: 0;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.ok   { background: var(--text); }
  #toast.warn { background: #664400; }
  #toast.fail { background: var(--red); }

  .error-box {
    margin: 40px auto;
    max-width: 440px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 28px 24px;
    text-align: center;
  }

  .error-box h2 { font-family: var(--mono); color: var(--red); font-size: 0.9rem; margin-bottom: 10px; }
  .error-box p  { font-size: 0.8rem; color: var(--sub); line-height: 1.6; }

  .saving-row { opacity: 0.5; }

  .saving-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 0.58rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.1em;
    background: var(--surf);
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    padding: 3px 8px;
    animation: fadeInPill 0.2s ease;
  }

  @keyframes fadeInPill {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  .saving-spin {
    width: 8px; height: 8px;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading calendar…</div>
</div>

<div id="toast"></div>

<header>
  <div class="hrow1">
    <div class="logo">
      <div class="logo-dot"></div>
      TUTOR TRACKER
    </div>
    <div class="current-date-bar" id="currentDateBar">—</div>
    <div class="top-actions">
      <button class="today-pill" onclick="goToday()">THIS WEEK</button>
      <div class="summary-pill" id="summaryPill">—</div>
    </div>
  </div>
  <div class="hrow2">
    <div class="week-nav">
      <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">&#8249;</button>
      <div id="weekLabel">—</div>
      <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">&#8250;</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;">
      <div class="saving-pill" id="savingPill" style="display:none">
        <span class="saving-spin"></span>SAVING
      </div>
    </div>
  </div>
  <div class="prog-track">
    <div class="prog-fill" id="progFill"></div>
  </div>
</header>

<div id="todayBanner" class="today-end-banner" style="display:none;"></div>

<div class="grid" id="grid"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwkNK3C7TZpKosUJlmDvniNrR7AweBvscDymOBnCWv84XYm-KSQpjPHdXq5b45v_wYNcQ/exec';

const DAY_NAMES    = ['MON','TUE','WED','THU','FRI','SAT'];
const DAY_NAMES_ZH = ['週一','週二','週三','週四','週五','週六'];
let currentMonday = null;
let weekEvents    = {};
let statuses      = {};
let savesInFlight = 0;

function setSaveCount(n) {
  savesInFlight = n;
  const pill = document.getElementById('savingPill');
  if (pill) pill.style.display = n > 0 ? 'inline-flex' : 'none';
  document.getElementById('prevBtn').dataset.saving = n > 0 ? '1' : '';
  document.getElementById('nextBtn').dataset.saving = n > 0 ? '1' : '';
}

function incSave() { setSaveCount(savesInFlight + 1); }
function decSave() { setSaveCount(Math.max(0, savesInFlight - 1)); }

const CN_DAYS = ['日','一','二','三','四','五','六'];
const EN_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function updateCurrentDateBar() {
  const now = new Date();
  const y   = now.getFullYear();
  const m   = String(now.getMonth() + 1).padStart(2, '0');
  const d   = String(now.getDate()).padStart(2, '0');
  const dow = now.getDay();
  const bar = document.getElementById('currentDateBar');
  if (bar) bar.textContent = `${y}.${m}.${d}  ${EN_DAYS[dow]}  ${CN_DAYS[dow]}`;
}

setInterval(updateCurrentDateBar, 60000);

window.addEventListener('DOMContentLoaded', () => {
  currentMonday = getMondayOf(new Date());
  updateCurrentDateBar();
  loadWeek();
});

function changeWeek(delta) {
  animateWeekChange(delta);
}

function goToday() {
  if (savesInFlight > 0) { toast('Saving… please wait', 'warn'); return; }
  const todayMon = getMondayOf(new Date());
  if (currentMonday === todayMon) return;
  const delta = todayMon > currentMonday ? 1 : -1;
  const grid = document.getElementById('grid');
  slideGrid(grid, delta, () => {
    currentMonday = todayMon;
    loadWeek();
  });
}

function loadWeek() {
  showLoader(true);
  updateHeader();
  return Promise.all([
    apiFetch('getWeekEvents', { date: currentMonday }),
    apiFetch('getStatuses',   { weekStart: currentMonday })
  ]).then(([evts, sts]) => {
    weekEvents = evts;
    statuses   = sts;
    renderGrid();
  }).catch(err => {
    console.error(err);
    document.getElementById('grid').innerHTML =
      `<div class="error-box" style="grid-column:1/-1">
        <h2>&#9888; Could not load data</h2>
        <p>Make sure the Apps Script is deployed correctly.<br><br>Error: ${err.message}</p>
      </div>`;
  }).finally(() => {
    showLoader(false);
  });
}

function renderGrid() {
  const grid     = document.getElementById('grid');
  const todayD   = new Date();
  const todayStr = fmt(todayD);
  const todayTime = new Date(todayStr + 'T00:00:00').getTime();
  
  grid.innerHTML = '';
  
  const banner = document.getElementById('todayBanner');
  if (banner) banner.style.display = 'none';
  
  let total = 0, done = 0;

  const giantCheckSVG = `
    <svg class="giant-check" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <path d="M18 52 L40 76 L82 24" stroke="var(--text)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </svg>
  `;

  for (let i = 0; i < 6; i++) {
    const d = new Date(currentMonday + 'T00:00:00');
    d.setDate(d.getDate() + i);
    const dateStr = fmt(d);
    
    const events = weekEvents[dateStr] || [];
    
    // ONLY KEEP THE VERY LAST CLASS OF THE DAY
    const lastEventOnly = events.length > 0 ? [events[events.length - 1]] : [];
    const isToday = dateStr === todayStr;
    
    const sentCount = lastEventOnly.filter(ev => statuses[`${dateStr}|${ev.title}`] === true).length;
    const allDone   = lastEventOnly.length > 0 && sentCount === lastEventOnly.length;

    total += lastEventOnly.length;
    done  += sentCount;

    // Track end time of the last class
    let endTimeHtml = '';
    if (lastEventOnly.length > 0) {
      const lastEvent = lastEventOnly[0];
      const topicName = cleanName(lastEvent.title);
      
      let endTimeStr = '';
      
      // If backend passes 'endTime' directly, use it. Otherwise attempt to split from 'time'
      if (lastEvent.endTime) {
         endTimeStr = lastEvent.endTime;
      } else {
         const parts = lastEvent.time.split(/[-~]| to /i);
         endTimeStr = parts.length > 1 ? parts[parts.length - 1].trim() : lastEvent.time.trim();
      }
      
      endTimeHtml = `<div class="card-end-time">最後結束 ${endTimeStr}</div>`;
      
      // If it's today, show the prominent banner exactly as requested
      if (isToday && banner) {
        banner.innerHTML = `
          今天最後一堂課程結束於 <span class="highlight-time">${endTimeStr}</span>
          <div class="today-topic">Topic ${topicName}</div>
        `;
        banner.style.display = 'block';
      }
    } else {
      endTimeHtml = `<div class="card-end-time">無課程</div>`;
      if (isToday && banner) {
        banner.innerHTML = `今天沒有課程`;
        banner.style.display = 'block';
      }
    }

    // Skip past days entirely so they are hidden from the visual interface
    if (d.getTime() < todayTime) {
      continue;
    }

    const card = document.createElement('div');
    card.className = `card${isToday ? ' today' : ''}${allDone ? ' done' : ''}`;
    card.id = `card-${dateStr}`;

    const badgeLabel = lastEventOnly.length === 0 ? '—' : `${sentCount}/${lastEventOnly.length}`;

    card.innerHTML = `
      <div class="card-head">
        <div class="day-label">
          <span class="day-en">${DAY_NAMES[i]}</span>
          <span class="day-zh">${DAY_NAMES_ZH[i]}</span>
          <span class="badge">${badgeLabel}</span>
        </div>
        <div class="day-num">${d.getMonth()+1}/${d.getDate()}</div>
        ${endTimeHtml}
      </div>
      <div class="student-list" id="list-${dateStr}">
        ${lastEventOnly.length > 0 ? giantCheckSVG : ''}
        ${lastEventOnly.length === 0
          ? '<div class="no-class">NO CLASS</div>'
          : lastEventOnly.map(ev => studentRow(dateStr, ev)).join('')}
      </div>`;

    grid.appendChild(card);
  }

  updateProgress(done, total);
}

function cleanName(title) {
  return title
    .replace(/\s*(English\s*(Class|Lesson|Course)?|英文課?|英語課?|的?英文|的?英語)\s*/gi, '')
    .trim() || title;
}

function studentRow(dateStr, ev) {
  const key         = `${dateStr}|${ev.title}`;
  const sent        = statuses[key] === true;
  const rid         = rowId(key);
  const displayName = cleanName(ev.title);
  return `
    <div class="s-row${sent ? ' sent' : ''}" id="${rid}"
         onclick="toggle('${dateStr}','${esc(ev.title)}','${rid}')">
      <div class="checkbox">${sent ? '&#10003;' : ''}</div>
      <div class="s-info">
        <div class="s-name">${displayName}</div>
        <div class="s-time">${ev.time}</div>
      </div>
    </div>`;
}

function toggle(dateStr, studentName, rid) {
  const key    = `${dateStr}|${studentName}`;
  const newVal = !(statuses[key] === true);
  statuses[key] = newVal;

  const row = document.getElementById(rid);
  if (row) {
    row.className = 's-row saving-row' + (newVal ? ' sent' : '');
    row.querySelector('.checkbox').innerHTML = newVal ? '&#10003;' : '';
    row.style.pointerEvents = 'none';
  }
  refreshCard(dateStr);
  refreshProgress();
  incSave();

  apiFetch('setStatus', { key, value: newVal })
    .then(() => {
      decSave();
      if (row) { row.classList.remove('saving-row'); row.style.pointerEvents = ''; }
      toast(newVal ? '&#10003; Saved' : '&#8629; Unmarked', 'ok');
    })
    .catch(() => {
      decSave();
      statuses[key] = !newVal;
      if (row) {
        row.className = 's-row' + (!newVal ? ' sent' : '');
        row.querySelector('.checkbox').innerHTML = !newVal ? '&#10003;' : '';
        row.classList.remove('saving-row');
        row.style.pointerEvents = '';
      }
      refreshCard(dateStr);
      refreshProgress();
      toast('Save failed', 'fail');
    });
}

function refreshCard(dateStr) {
  const card   = document.getElementById(`card-${dateStr}`);
  const events = weekEvents[dateStr] || [];
  const lastEventOnly = events.length > 0 ? [events[events.length - 1]] : [];
  
  if (!card || !lastEventOnly.length) return;
  const sent    = lastEventOnly.filter(ev => statuses[`${dateStr}|${ev.title}`] === true).length;
  const allDone = sent === lastEventOnly.length;
  const badge   = card.querySelector('.badge');
  if (badge) badge.textContent = `${sent}/${lastEventOnly.length}`;
  card.classList.toggle('done', allDone);
}

function refreshProgress() {
  let total = 0, done = 0;
  Object.keys(weekEvents).forEach(ds => {
    const evs = weekEvents[ds] || [];
    if (evs.length > 0) {
      const lastEvent = evs[evs.length - 1]; // Only calculate progress based on the final class
      total++;
      if (statuses[`${ds}|${lastEvent.title}`] === true) done++;
    }
  });
  updateProgress(done, total);
}

function updateProgress(done, total) {
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('summaryPill').textContent =
    total === 0 ? 'No classes' : `${done}/${total} sent · ${pct}%`;
}

function updateHeader() {
  const mon = new Date(currentMonday + 'T00:00:00');
  const sat = new Date(currentMonday + 'T00:00:00');
  sat.setDate(mon.getDate() + 5);
  document.getElementById('weekLabel').textContent =
    `${mon.getMonth()+1}/${mon.getDate()} – ${sat.getMonth()+1}/${sat.getDate()}`;
  
  // Disable moving backward to previous weeks, but allow future schedules
  document.getElementById('prevBtn').disabled = currentMonday <= getMondayOf(new Date());
  document.getElementById('nextBtn').disabled = false;
}

function apiFetch(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const url = new URL(API);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', cbName);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
    const script = document.createElement('script');
    script.src = url.toString();
    const cleanup = () => { delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); };
    const timer = setTimeout(() => { cleanup(); reject(new Error('Request timed out')); }, 15000);
    window[cbName] = (json) => { clearTimeout(timer); cleanup(); if (json.error) reject(new Error(json.error)); else resolve(json.data); };
    script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('Network error')); };
    document.head.appendChild(script);
  });
}

/* ── SLIDE ANIMATION ───────────────────────────────────────── */
function slideGrid(grid, direction, callback) {
  const outX = direction > 0 ? '-110%' : '110%';
  const inX  = direction > 0 ?  '110%' : '-110%';

  grid.style.transition = 'transform 0.25s cubic-bezier(.4,0,.2,1), opacity 0.25s';
  grid.style.transform  = `translateX(${outX})`;
  grid.style.opacity    = '0.2';

  setTimeout(() => {
    callback();
    grid.style.transition = 'none';
    grid.style.transform  = `translateX(${inX})`;
    grid.style.opacity    = '0';
    void grid.offsetWidth; // force reflow
    grid.style.transition = 'transform 0.28s cubic-bezier(.2,.8,.3,1), opacity 0.28s';
    grid.style.transform  = 'translateX(0)';
    grid.style.opacity    = '1';
  }, 220);
}

function animateWeekChange(delta) {
  if (savesInFlight > 0) { toast('Saving… please wait', 'warn'); return; }
  const todayMon = getMondayOf(new Date());
  if (delta < 0 && currentMonday <= todayMon) return; // Prevent viewing past weeks manually
  const grid = document.getElementById('grid');
  slideGrid(grid, delta, () => {
    const d = new Date(currentMonday + 'T00:00:00');
    d.setDate(d.getDate() + delta * 7);
    currentMonday = fmt(d);
    loadWeek();
  });
}

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return fmt(d);
}

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function rowId(key) { return 'r_' + key.replace(/[^a-zA-Z0-9]/g, '_'); }
function esc(s)     { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function showLoader(show) { document.getElementById('loader').classList.toggle('out', !show); }

let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.className = ['show', type].filter(Boolean).join(' ');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2600);
}
</script>
