<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tony線上美語家教 - 課程方案</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f0f2f5; margin: 0; padding: 0; }
    #embedding-container { font-family: 'Noto Sans TC', -apple-system, sans-serif; }

    /* 手機版全寬度處理 */
    .product-widget { 
        max-width: 560px; 
        width: 100%; 
        margin: 0 auto; 
        background-color: white; 
        overflow: hidden; 
    }

    @media (min-width: 768px) {
        .product-widget { margin: 40px auto; border-radius: 12px; box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1); }
    }

    .product-info { padding: 24px 16px; position: relative; }
    
    /* 標題與文案樣式 */
    .brand-title { font-size: 32px; font-weight: 900; color: #1a1a1a; margin-bottom: 8px; }
    .brand-description { font-size: 16px; font-weight: 500; color: #4b5563; line-height: 1.6; margin-bottom: 24px; }
    .highlight-text { color: #d93025; font-weight: 700; }

    /* 定價卡片 */
    .pricing-card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px 16px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
    }
    
    .pricing-card.selected { 
        border: 2.5px solid #d93025 !important; 
        background-color: #fff8f8 !important; 
    }

    .plan-title { font-size: 20px; font-weight: 800; color: #000; }
    .price-text { font-size: 24px; font-weight: 900; color: #000; }
    .selected .price-text { color: #d93025; }

    .promo-badge {
        position: absolute;
        top: -10px;
        right: 12px;
        background-color: #d93025;
        color: white;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        z-index: 2;
    }

    .session-info {
        font-size: 24px;
        font-weight: 900;
        color: #000;
        text-align: center;
        margin: 25px 0;
    }

    #add-to-cart-btn { width: 100%; background-color: #1a1a1a; color: white; border: none; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; }
    
    /* 購物車面板 */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.5s; }
    .cart-overlay.open { opacity: 1; visibility: visible; }
    .cart-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 800px; height: 100%; background: #f9f9f9; z-index: 1001; transition: 0.5s ease-in-out; display: flex; flex-direction: column; }
    .cart-panel.open { right: 0; }
    .cart-body { display: flex; flex-grow: 1; padding: 16px; gap: 20px; overflow-y: auto; flex-direction: column; }
    .cart-left, .cart-right { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; }

    @media (min-width: 768px) {
        .cart-body { flex-direction: row; padding: 32px; gap: 40px; }
        .cart-panel { width: 90%; }
    }
  </style>
</head>
<body>

<div id="embedding-container">
  <div id="product-page">
    <div class="product-widget">
        <div class="product-info">
            <div id="cart-icon" class="absolute top-6 right-4 text-4xl cursor-pointer">🛒<span id="cart-count" class="absolute -top-1 -right-2 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center scale-0 transition-transform">0</span></div>
            
            <h1 class="brand-title">Tony線上美語家教</h1>
            <div class="brand-description">
                升學檢定、口說寫作、商用觀光、外商面試<br>
                <span class="highlight-text">提供您的全方位家教。聽說讀寫。</span>
            </div>

            <div id="plan-selection">
                <div class="pricing-card" onclick="selectPlan('course-1', this)">
                    <div class="plan-title">1堂課程</div>
                    <div class="price-text">NT$ 800</div>
                </div>
                <div class="pricing-card" onclick="selectPlan('course-6', this)">
                    <div class="plan-title">6堂課程</div>
                    <div class="price-text">NT$ 4,200</div>
                </div>
                <div class="pricing-card" onclick="selectPlan('course-10', this)">
                    <div class="plan-title">10堂課程</div>
                    <div class="price-text">NT$ 6,600</div>
                </div>
                <div class="pricing-card" onclick="selectPlan('course-16', this)">
                    <div class="plan-title">16堂課程</div>
                    <div class="price-text">NT$ 10,000</div>
                </div>
                <div class="pricing-card selected" onclick="selectPlan('course-20', this)">
                    <div class="promo-badge">★ 最優惠</div>
                    <div class="plan-title">20堂課程</div>
                    <div class="price-text">NT$ 12,000</div>
                </div>
            </div>

            <div class="session-info">每堂50分鐘</div>

            <select id="course-options" style="display:none;">
                <option value="course-1">1堂課程 NT$ 800</option>
                <option value="course-6">6堂課程 NT$ 4,200</option>
                <option value="course-10">10堂課程 NT$ 6,600</option>
                <option value="course-16">16堂課程 NT$ 10,000</option>
                <option value="course-20" selected>20堂課程 NT$ 12,000</option>
            </select>

            <button id="add-to-cart-btn"></button>
        </div>
    </div>

    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="cart-panel" class="cart-panel">
        <div class="cart-body">
            <div class="cart-left">
                <h3 class="text-xl font-bold mb-4">購物車 <button class="float-right" id="close-cart-btn-main">×</button></h3>
                <div id="cart-items-container"></div>
                <div class="mt-6 pt-4 border-t-2 border-black">
                    <div class="flex justify-between text-2xl font-bold">
                        <span>總計</span><span id="total-price">NT$0</span>
                    </div>
                </div>
            </div>
            <div class="cart-right">
                <h3 class="text-xl font-bold mb-4">結帳</h3>
                <form id="checkout-form">
                    <p class="mb-2">請輸入電子信箱。</p>
                    <input type="email" id="email" required class="w-full p-3 border rounded mb-4">
                    <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="block text-center font-bold text-green-600 mb-4">請加入Line: Myavalon</a>
                    <button type="submit" class="w-full bg-black text-white p-4 rounded font-bold">確認結帳</button>
                </form>
            </div>
        </div>
    </div>
  </div>

  <div id="thank-you-page" style="display:none; padding:40px; background:white; text-align:center; min-height:100vh;">
      <h2 style="font-size:32px; color:#27ae60; font-weight:bold;">✓ 感謝您的訂購！</h2>
      <p id="ty-customer-email" class="my-4 text-gray-600"></p>
      <div id="ty-cart-items-container" class="my-4 border-y py-4"></div>
      <p class="text-xl">訂單編號: <span id="ty-order-id" class="font-bold text-blue-600"></span></p>
      <button onclick="location.reload()" class="mt-8 bg-gray-200 px-6 py-2 rounded">返回</button>
  </div>
</div>

<script>
    const products = [
        { id: 'course-1', name: '1堂課程', price: 800 },
        { id: 'course-6', name: '6堂課程', price: 4200 },
        { id: 'course-10', name: '10堂課程', price: 6600 },
        { id: 'course-16', name: '16堂課程', price: 10000 },
        { id: 'course-20', name: '20堂課程', price: 12000 }
    ];

    let cart = {};

    function selectPlan(id, el) {
        document.querySelectorAll('.pricing-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('course-options').value = id;
        updateButton();
    }

    function updateButton() {
        const id = document.getElementById('course-options').value;
        const p = products.find(prod => prod.id === id);
        document.getElementById('add-to-cart-btn').textContent = `NT$ ${p.price.toLocaleString()} | 加入購物車`;
    }

    function handleAddToCart() {
        const id = document.getElementById('course-options').value;
        const p = products.find(prod => prod.id === id);
        if (cart[id]) { cart[id].quantity += 1; } else { cart[id] = { ...p, quantity: 1 }; }
        updateCartDisplay();
        document.getElementById('cart-overlay').classList.add('open');
        document.getElementById('cart-panel').classList.add('open');
    }

    function updateCartDisplay() {
        const container = document.getElementById('cart-items-container');
        let total = 0; let count = 0;
        container.innerHTML = '';
        Object.entries(cart).forEach(([id, item]) => {
            total += item.price * item.quantity;
            count += item.quantity;
            container.innerHTML += `<div class="flex justify-between mb-2">
                <span>${item.name} x ${item.quantity}</span>
                <span>NT$ ${(item.price * item.quantity).toLocaleString()}</span>
            </div>`;
        });
        document.getElementById('total-price').textContent = `NT$ ${total.toLocaleString()}`;
        const badge = document.getElementById('cart-count');
        badge.textContent = count;
        badge.classList.toggle('scale-100', count > 0);
        badge.classList.toggle('scale-0', count === 0);
    }

    document.getElementById('add-to-cart-btn').onclick = handleAddToCart;
    document.getElementById('cart-icon').onclick = () => {
        document.getElementById('cart-overlay').classList.add('open');
        document.getElementById('cart-panel').classList.add('open');
    };
    document.getElementById('close-cart-btn-main').onclick = () => {
        document.getElementById('cart-overlay').classList.remove('open');
        document.getElementById('cart-panel').classList.remove('open');
    };

    document.getElementById('checkout-form').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        document.getElementById('product-page').style.display = 'none';
        document.getElementById('thank-you-page').style.display = 'block';
        document.getElementById('ty-customer-email').textContent = "訂單確認信已寄至: " + email;
        document.getElementById('ty-order-id').textContent = "#" + Math.random().toString(36).substr(2, 5).toUpperCase();
    };

    updateButton();
</script>
</body>
</html>
