<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tony線上美語家教 - 課程方案</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f0f2f5; margin: 0; padding: 0; scroll-behavior: smooth; }
    #embedding-container { font-family: 'Noto Sans TC', -apple-system, sans-serif; }

    .product-widget { 
        max-width: 700px; 
        width: 100%; 
        margin: 0 auto; 
        background-color: white; 
        overflow: hidden; 
    }

    @media (min-width: 768px) {
        .product-widget { margin: 40px auto; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
    }

    .product-info { padding: 32px 16px; position: relative; }
    
    .brand-title { font-size: 36px; font-weight: 900; color: #1a1a1a; margin-bottom: 12px; }
    .brand-description { font-size: 18px; font-weight: 500; color: #4b5563; line-height: 1.8; margin-bottom: 28px; }
    .highlight-text { color: #d93025; font-weight: 800; border-bottom: 2px solid #d93025; padding-bottom: 2px; }

    /* 卡片樣式：加強陰影與區隔感 */
    .pricing-card {
        background: white;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 26px 20px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        /* 基礎陰影 */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    .pricing-card:hover { 
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        border-color: #cbd5e1;
    }
    
    .pricing-card.selected { 
        border: 2.5px solid #d93025 !important; 
        background-color: #fff8f8 !important; 
        box-shadow: 0 10px 15px -3px rgba(217, 48, 37, 0.2);
    }

    .plan-title { font-size: 22px; font-weight: 800; color: #000; }
    .price-text { font-size: 26px; font-weight: 900; color: #000; }
    .selected .price-text { color: #d93025; }

    .promo-badge {
        position: absolute;
        top: -12px;
        right: 15px;
        background-color: #d93025;
        color: white;
        padding: 3px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
        z-index: 2;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .session-info {
        font-size: 26px;
        font-weight: 900;
        color: #000;
        text-align: center;
        margin: 30px 0;
    }

    #add-to-cart-btn { 
        width: 100%; 
        background-color: #1a1a1a; 
        color: white; 
        border: none; 
        padding: 22px; 
        font-size: 22px; 
        font-weight: bold; 
        border-radius: 10px; 
        cursor: pointer;
        transition: all 0.2s;
    }
    #add-to-cart-btn:hover { background-color: #333; }
    
    /* 購物車面板樣式 */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.4s; }
    .cart-overlay.open { opacity: 1; visibility: visible; }
    .cart-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 800px; height: 100%; background: #f9f9f9; z-index: 1001; transition: 0.4s ease-in-out; display: flex; flex-direction: column; }
    .cart-panel.open { right: 0; }
    .cart-body { display: flex; flex-grow: 1; padding: 16px; gap: 20px; overflow-y: auto; flex-direction: column; }
    .cart-left, .cart-right { background: white; padding: 24px; border-radius: 12px; border: 1px solid #e0e0e0; }

    @media (min-width: 768px) {
        .cart-body { flex-direction: row; padding: 32px; gap: 40px; }
        .cart-panel { width: 90%; }
        .product-info { padding: 40px; }
    }
  </style>
</head>
<body>

<div id="embedding-container">
  <div id="product-page">
    <div class="product-widget">
        <div class="product-info">
            <div id="cart-icon" class="absolute top-8 right-6 text-4xl cursor-pointer">🛒<span id="cart-count" class="absolute -top-1 -right-2 bg-red-600 text-white text-xs rounded-full w-6 h-6 flex items-center justify-center scale-0 transition-transform">0</span></div>
            
            <h1 class="brand-title">Tony線上美語家教</h1>
            <div class="brand-description">
                升學、檢定、口說、寫作、商用觀光、外商、面試<br>
                <span class="highlight-text">提供您的全方位家教。聽、說、讀、寫。</span>
            </div>

            <div id="plan-selection">
                <div class="pricing-card" onclick="selectPlan('course-1', this)">
                    <div class="plan-title">1堂課程</div>
                    <div class="price-text">NT$ 800</div>
                </div>
                <div class="pricing-card" onclick="selectPlan('course-6', this)">
                    <div class="plan-title">6堂課程</div>
                    <div class="price-text">NT$ 4,200</div>
                </div>
                <div class="pricing-card" onclick="selectPlan('course-10', this)">
                    <div class="plan-title">10堂課程</div>
                    <div class="price-text">NT$ 6,600</div>
                </div>
                <div class="pricing-card" onclick="selectPlan('course-16', this)">
                    <div class="plan-title">16堂課程</div>
                    <div class="price-text">NT$ 10,000</div>
                </div>
                <div class="pricing-card selected" onclick="selectPlan('course-20', this)">
                    <div class="promo-badge">★ 最優惠</div>
                    <div class="plan-title">20堂課程</div>
                    <div class="price-text">NT$ 12,000</div>
                </div>
            </div>

            <div class="session-info">每堂50分鐘</div>

            <select id="course-options" style="display:none;">
                <option value="course-1">1堂課程 NT$ 800</option>
                <option value="course-6">6堂課程 NT$ 4,200</option>
                <option value="course-10">10堂課程 NT$ 6,600</option>
                <option value="course-16">16堂課程 NT$ 10,000</option>
                <option value="course-20" selected>20堂課程 NT$ 12,000</option>
            </select>

            <button id="add-to-cart-btn"></button>
        </div>
    </div>

    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="cart-panel" class="cart-panel">
        <div class="cart-body">
            <div class="cart-left">
                <h3 class="text-2xl font-bold mb-6">您的購物車 <button class="float-right text-3xl" id="close-cart-btn-main">×</button></h3>
                <div id="cart-items-container"></div>
                <div class="mt-8 pt-4 border-t-2 border-black text-2xl font-bold flex justify-between">
                    <span>總計金額</span><span id="total-price">NT$0</span>
                </div>
            </div>
            <div class="cart-right">
                <h3 class="text-2xl font-bold mb-6">結帳資訊</h3>
                <form id="checkout-form">
                    <p class="mb-3 text-gray-600 font-medium">請輸入聯絡電子信箱：</p>
                    <input type="email" id="email" required class="w-full p-4 border-2 rounded-lg mb-6 outline-none focus:border-black">
                    <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="block text-center font-bold text-green-600 mb-6 text-lg">💬 加入 Line 客服: Myavalon</a>
                    <button type="submit" class="w-full bg-black text-white p-5 rounded-lg font-bold text-xl hover:bg-gray-800 transition">確認結帳</button>
                </form>
            </div>
        </div>
    </div>
  </div>

  <div id="thank-you-page" style="display:none; padding:60px 20px; background:white; text-align:center; min-height:100vh;">
      <h2 style="font-size:36px; color:#27ae60; font-weight:900;">✓ 訂單已受理！</h2>
      <p id="ty-customer-email" class="my-6 text-xl text-gray-600"></p>
      <div id="ty-cart-items-container" class="max-w-md mx-auto my-6 border-y py-6"></div>
      <p class="text-2xl font-medium">訂單編號: <span id="ty-order-id" class="font-black text-blue-600"></span></p>
      <button onclick="location.reload()" class="mt-10 bg-gray-900 text-white px-10 py-3 rounded-full font-bold">返回首頁</button>
  </div>
</div>

<script>
    const products = [
        { id: 'course-1', name: '1堂課程', price: 800 },
        { id: 'course-6', name: '6堂課程', price: 4200 },
        { id: 'course-10', name: '10堂課程', price: 6600 },
        { id: 'course-16', name: '16堂課程', price: 10000 },
        { id: 'course-20', name: '20堂課程', price: 12000 }
    ];

    let cart = {};

    function selectPlan(id, el) {
        // 移除其他選中狀態
        document.querySelectorAll('.pricing-card').forEach(c => c.classList.remove('selected'));
        // 加入選中狀態
        el.classList.add('selected');
        // 同步隱藏的 select
        document.getElementById('course-options').value = id;
        updateButton();
        
        // 關鍵功能：自動滾動到加入購物車按鈕
        document.getElementById('add-to-cart-btn').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function updateButton() {
        const id = document.getElementById('course-options').value;
        const p = products.find(prod => prod.id === id);
        document.getElementById('add-to-cart-btn').textContent = `NT$ ${p.price.toLocaleString()} | 加入購物車`;
    }

    function handleAddToCart() {
        const id = document.getElementById('course-options').value;
        const p = products.find(prod => prod.id === id);
        if (cart[id]) { cart[id].quantity += 1; } else { cart[id] = { ...p, quantity: 1 }; }
        updateCartDisplay();
        document.getElementById('cart-overlay').classList.add('open');
        document.getElementById('cart-panel').classList.add('open');
    }

    function updateCartDisplay() {
        const container = document.getElementById('cart-items-container');
        let total = 0; let count = 0;
        container.innerHTML = '';
        Object.entries(cart).forEach(([id, item]) => {
            total += item.price * item.quantity;
            count += item.quantity;
            container.innerHTML += `<div class="flex justify-between items-center mb-4 text-lg">
                <span class="font-bold">${item.name} <span class="text-gray-400 text-sm">x ${item.quantity}</span></span>
                <span class="font-black">NT$ ${(item.price * item.quantity).toLocaleString()}</span>
            </div>`;
        });
        document.getElementById('total-price').textContent = `NT$ ${total.toLocaleString()}`;
        const badge = document.getElementById('cart-count');
        badge.textContent = count;
        badge.classList.toggle('scale-100', count > 0);
        badge.classList.toggle('scale-0', count === 0);
    }

    document.getElementById('add-to-cart-btn').onclick = handleAddToCart;
    document.getElementById('cart-icon').onclick = () => {
        document.getElementById('cart-overlay').classList.add('open');
        document.getElementById('cart-panel').classList.add('open');
    };
    document.getElementById('close-cart-btn-main').onclick = () => {
        document.getElementById('cart-overlay').classList.remove('open');
        document.getElementById('cart-panel').classList.remove('open');
    };

    document.getElementById('checkout-form').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        document.getElementById('product-page').style.display = 'none';
        document.getElementById('thank-you-page').style.display = 'block';
        document.getElementById('ty-customer-email').textContent = "訂單確認信已寄至: " + email;
        document.getElementById('ty-order-id').textContent = "#" + Math.random().toString(36).substr(2, 6).toUpperCase();
        
        let tyItems = "";
        Object.values(cart).forEach(i => tyItems += `<p>${i.name} x ${i.quantity}</p>`);
        document.getElementById('ty-cart-items-container').innerHTML = tyItems;
        window.scrollTo(0,0);
    };

    updateButton();
</script>
</body>
</html>
