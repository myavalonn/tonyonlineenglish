    <!-- Tubes Cursor 特效腳本 -->
    <script type="module">
      import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";

      const app = TubesCursor(document.getElementById('canvas'), {
        tubes: {
          colors:["#f967fb", "#53bc28", "#6958d5"],
          lights: {
            intensity: 200,
            colors:["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
          }
        }
      });

      document.body.addEventListener('click', () => {
        const colors = randomColors(3);
        const lightsColors = randomColors(4);
        app.tubes.setColors(colors);
        app.tubes.setLightsColors(lightsColors);
      });

      function randomColors (count) {
          return new Array(count)
              .fill(0)
              .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'));
      }
    </script>

    <!-- 引入 GSAP 動畫核心庫 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <!-- 開場動畫控制腳本 -->
    <script>
      function initTonyLoadingAnimation() {
        const container = document.querySelector(".tony-loader-section");
        const loadingLetter = container.querySelectorAll(".tony__letter");
        const box = container.querySelectorAll(".tony-loader__box");
        const growingBox = container.querySelectorAll(".tony__growing-box");
        const headingStart = container.querySelectorAll(".tony__h1-start");
        const headingEnd = container.querySelectorAll(".tony__h1-end");
        const coverTextExtra = container.querySelectorAll(".tony__cover-text-extra");

        const tl = gsap.timeline({
          defaults: { ease: "expo.inOut" },
          onStart: () => {
            document.body.classList.add('is--loading');
          },
          onComplete: () => {
            // 在藍色全螢幕淡出前夕，觸發下方網頁內容的進場動畫
            document.querySelector('.hero').classList.add('start-animations');
            
            // 將整個 Loader 背景漸進淡出
            gsap.to(container, {
              opacity: 0,
              duration: 1.2,
              ease: "power2.inOut",
              onComplete: () => {
                container.style.display = 'none'; // 隱藏 Loader 讓背景點擊可以生效
                document.body.classList.remove('is--loading'); // 恢復正常滾動
              }
            });
          }
        });
        
        // 1. 巨大文字從底部滑入
        if (loadingLetter.length) {
          tl.from(loadingLetter, { yPercent: 100, stagger: 0.03, duration: 1.25 });
        }
        
        // 2. 中間撐開空間
        if (box.length) {
          tl.fromTo(box, { width: "0em" }, { width: "1.5em", duration: 1.25 }, "< 1");
        }

        // 3. 顯示帶有背景色的盒子
        if (growingBox.length) {
          tl.fromTo(growingBox, { width: "0%" }, { width: "100%", duration: 1.25 }, "<");
        }
        
        // 4. 文字往兩側微推提供呼吸感
        if (headingStart.length) {
          tl.fromTo(headingStart, { x: "0em" }, { x: "-0.05em", duration: 1.25 }, "<");
        }
        if (headingEnd.length) {
          tl.fromTo(headingEnd, { x: "0em" }, { x: "0.05em", duration: 1.25 }, "<");
        }

        // 5. 中間文字逐格閃爍替換
        if (coverTextExtra.length) {
          tl.fromTo(coverTextExtra, { opacity: 1 }, {
            opacity: 0,
            duration: 0.05,
            ease: "none",
            stagger: 0.6
          }, "-=0.2"); 
        }
          
        // 6. 最終將盒子放大至全螢幕填滿
        if (growingBox.length) {
          tl.to(growingBox, {
            width: "100vw",
            height: "100vh",
            borderRadius: "0px",
            duration: 1.5,
            ease: "power3.inOut"
          }, "+=0.2");
        }
        
        if (box.length) {
          tl.to(box, { width: "100vw", duration: 1.5, ease: "power3.inOut" }, "<");
        }

        // 稍微將最終停留文字放大
        const finalCoverText = document.querySelector(".tony__cover-text:not(.tony__cover-text-extra)");
        if (finalCoverText) {
          tl.to(finalCoverText, { scale: 1.5, duration: 1.5, ease: "power3.inOut" }, "<");
        }
        
        // 在全螢幕展開的過程中，將背後的巨型文字隱藏
        if (loadingLetter.length) {
          tl.to(loadingLetter, { opacity: 0, duration: 0.5 }, "< 0.2");
        }
      }

      // 等待 DOM 讀取完畢後初始化
      document.addEventListener('DOMContentLoaded', () => {
        initTonyLoadingAnimation();
      });
    </script>
