    <!-- Tubes Cursor 特效腳本 -->
    <script type="module">
      import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";

      const app = TubesCursor(document.getElementById('canvas'), {
        tubes: {
          colors:["#f967fb", "#53bc28", "#6958d5"],
          lights: {
            intensity: 200,
            colors:["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
          }
        }
      });

      document.body.addEventListener('click', () => {
        const colors = randomColors(3);
        const lightsColors = randomColors(4);
        app.tubes.setColors(colors);
        app.tubes.setLightsColors(lightsColors);
      });

      function randomColors (count) {
          return new Array(count)
              .fill(0)
              .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'));
      }
    </script>

    <!-- 引入 GSAP 動畫核心庫 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <!-- 開場動畫控制腳本 -->
    <script>
      function initTonyLoadingAnimation() {
        const loaderSection = document.querySelector(".tony-loader-section");
        const loaderContent = document.querySelector(".tony-loader-content");
        const lettersInner = document.querySelectorAll(".tony__letter-inner");
        const tickerLines = document.querySelectorAll(".tony__ticker-line");
        const hero = document.querySelector(".hero");

        // 移除載入前的隱藏狀態
        gsap.set(loaderContent, { opacity: 1, visibility: 'visible' });

        const mainTl = gsap.timeline({
          onComplete: () => {
            gsap.to(loaderSection, {
              opacity: 0,
              duration: 1,
              ease: "power2.inOut",
              onStart: () => {
                hero.classList.add('start-animations');
              },
              onComplete: () => {
                loaderSection.style.display = 'none'; 
                document.body.style.overflow = 'auto'; // 解除鎖定滾動
              }
            });
          }
        });
        
        // 1. "Tony線上美語家教" 由下往上冒出
        mainTl.fromTo(lettersInner, 
          { yPercent: 120 }, 
          { yPercent: 0, stagger: 0.05, duration: 0.9, ease: "back.out(1.4)" }
        );
        
        // 2. 橘色上方橫條動畫：速度提升 1.5 倍
        const tickerTl = gsap.timeline();
        
        tickerLines.forEach((line, index) => {
          tickerTl
            .fromTo(line, 
              { yPercent: -100, opacity: 0 }, 
              { yPercent: 0, opacity: 1, duration: 0.2, ease: "power2.out" }
            )
            .to(line, 
              { yPercent: 100, opacity: 0, duration: 0.2, ease: "power2.in" }, 
              "+=0.25" // 停留切換時間
            );
        });

        // 加入到主時間軸，在主標題冒出後執行
        mainTl.add(tickerTl, "-=0.2");
      }

      document.addEventListener('DOMContentLoaded', () => {
        initTonyLoadingAnimation();
      });
    </script>
