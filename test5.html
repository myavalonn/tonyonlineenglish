    <!-- Tubes Cursor 特效腳本 -->
    <script type="module">
      import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";

      const app = TubesCursor(document.getElementById('canvas'), {
        tubes: {
          colors:["#f967fb", "#53bc28", "#6958d5"],
          lights: {
            intensity: 200,
            colors:["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
          }
        }
      });

      document.body.addEventListener('click', () => {
        const colors = randomColors(3);
        const lightsColors = randomColors(4);
        app.tubes.setColors(colors);
        app.tubes.setLightsColors(lightsColors);
      });

      function randomColors (count) {
          return new Array(count)
              .fill(0)
              .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'));
      }
    </script>

    <!-- 引入 GSAP 動畫核心庫 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <!-- 開場動畫控制腳本 -->
    <script>
      function initTonyLoadingAnimation() {
        const tl = gsap.timeline({
          onStart: () => {
            document.body.classList.add('is--loading');
          }
        });

        // ==========================================
        // 1. "Tony線上美語家教" 滑順進場 (不再有切斷問題)
        // ==========================================
        const letters = document.querySelectorAll('.tony__letter');
        gsap.set(letters, { y: 60, opacity: 0 }); // 透過 y 位移與透明度控制，不依賴 overflow hidden

        tl.to(letters, {
          y: 0,
          opacity: 1,
          duration: 0.8,
          stagger: 0.04,
          ease: "back.out(1.5)"
        });

        // ==========================================
        // 2. 上方文字列「由上往下」切換效果
        // ==========================================
        const tickerItems = document.querySelectorAll('.ticker-item');
        gsap.set(tickerItems, { yPercent: -150, opacity: 0 }); // 初始位置在上方

        const tickerDuration = 0.35; // 下降切換的速度
        const stayDuration = 0.55;   // 每次停留在畫面的時間

        tickerItems.forEach((item, i) => {
          const isLast = i === tickerItems.length - 1;

          // (A) 從上方進入中央
          tl.to(item, {
            yPercent: 0,
            opacity: 1,
            duration: tickerDuration,
            ease: "power2.out"
          }, i === 0 ? "-=0.2" : "-=0.05"); // 微妙的重疊時間讓動畫更絲滑

          if (!isLast) {
            // (B) 如果不是最後一條，則往下離開
            tl.to(item, {
              yPercent: 120,
              opacity: 0,
              duration: tickerDuration,
              ease: "power2.in"
            }, `+=${stayDuration}`);
          } 
        });

        // ==========================================
        // 3. 所有動畫完畢，整體 Loader 向上淡出，觸發主網頁
        // ==========================================
        tl.to('.loader-content', {
          y: -40,
          opacity: 0,
          duration: 0.8,
          ease: "power2.inOut"
        }, `+=${stayDuration}`); // 讓最後一條文字停留一下再收起

        tl.to('.tony-loader-section', {
          opacity: 0,
          duration: 0.6,
          onStart: () => {
            // 觸發原始網頁的進場動畫
            document.querySelector('.hero').classList.add('start-animations');
          },
          onComplete: () => {
            document.querySelector('.tony-loader-section').style.display = 'none';
            document.body.classList.remove('is--loading'); // 釋放滾動條
          }
        }, "-=0.4");
      }

      // 等待 DOM 讀取完畢後初始化
      document.addEventListener('DOMContentLoaded', () => {
        initTonyLoadingAnimation();
      });
    </script>
