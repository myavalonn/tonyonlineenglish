<body>
  <div class="container">
    <!-- Header -->

        </span>

      </h1>
      <p>Practice your speaking skills with 6 comprehensive test rounds</p>
      <div class="round-selection">
        <span class="round-selection-label">Select Round 請下滑按下開始</span>
        <div class="round-buttons" id="roundButtons"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="top-controls">
      <div class="font-buttons">
        <button onclick="changeFontSize(1)"><img src="https://ik.imagekit.io/lql1uveoc/Speaking%20Test/IMG_3684.png"></button>
        <button onclick="changeFontSize(-1)"><img src="https://ik.imagekit.io/lql1uveoc/Speaking%20Test/IMG_3683.png"></button>
      </div>
      <div class="timer" id="timerDisplay">0</div>
    </div>
    <div class="label" id="stageLabel"></div>

    <!-- Start Card -->
    <div class="action-buttons">
      <button id="startButton" onclick="startTest()">
          <img src="https://ik.imagekit.io/lql1uveoc/Speaking%20Test/IMG_5039.png" class="start-icon">
          <span class="start-text">請戴上耳機作答</span>
          <div class="start-cta-badge">
              <img src="https://ik.imagekit.io/lql1uveoc/Speaking%20Test/click.png">
              <img src="https://ik.imagekit.io/lql1uveoc/Speaking%20Test/IMG_3682.png">
              <span>Start 請點選</span>
          </div>
      </button>
    </div>

    <div id="dynamicContentDisplay" class="dynamic-content" style="display: none;"></div>
    <div id="passagesContainer"></div>
    <div class="status-wrapper" id="statusWrapper">
        <div id="statusMessage"></div>
        <canvas id="waveCanvas" width="160" height="40"></canvas>
    </div>

    <audio id="instructionAudio" preload="auto"></audio>
    <div class="bottom-controls" style="display:none;"><button id="stopButton" onclick="stopRecordingByUser()" disabled>Stop</button></div>

    <!-- Form -->
    <div id="submission-form-container" class="form-container">
        <div class="animation-overlay" id="uploadAnimation"></div>
        <h3>填寫資訊提交錄音</h3>
        <form id="contactForm">
            <div class="form-group"><label>Name 姓名*</label><input type="text" id="userName" required></div>
            <div class="form-group"><label>Line (可空白)</label><input type="text" id="userLine"></div>
            <div class="form-group"><label>Email*</label><input type="email" id="userEmail" required></div>
            <button type="submit" class="submit-btn">提交錄音</button>
        </form>
    </div>
  </div>

  <script>
    let fontSize = 32;
    function changeFontSize(delta) { fontSize += delta; applyFonts(); }
    function applyFonts() {
        document.querySelectorAll('p, .dynamic-content').forEach(el => el.style.fontSize = fontSize + 'px');
        document.querySelectorAll('.passage-row').forEach(el => el.style.fontSize = (fontSize * 0.8) + 'px');
    }

    let mediaRecorder, audioChunks = [], activeTimers = [], isRecordingStoppedByUser = false;
    let audioContext, analyser, microphone, visualizerAnimationId;
    const waveCanvas = document.getElementById('waveCanvas'), waveCtx = waveCanvas.getContext('2d');

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNLJW5kw3HAM4EAY6rJvW4wvKSakQoXM2e-x5aBTgut06z1XbtgCL6PliF2Vfo5EDmKQ/exec";

    const stageLabel = document.getElementById('stageLabel'),
          timerDisplay = document.getElementById('timerDisplay'),
          instructionAudio = document.getElementById('instructionAudio'),
          startButton = document.getElementById('startButton'),
          statusMessage = document.getElementById('statusMessage'),
          statusWrapper = document.getElementById('statusWrapper'),
          dynamicContentDisplay = document.getElementById('dynamicContentDisplay'),
          passagesContainer = document.getElementById('passagesContainer'),
          contactForm = document.getElementById('contactForm'),
          uploadAnimation = document.getElementById('uploadAnimation'),
          startWrapper = document.querySelector('.action-buttons'); 

    let processedBlob = null, selectedRound = 1;

    instructionAudio.onended = () => { if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); };

    function clearActiveTimers() { activeTimers.forEach(id => clearTimeout(id)); activeTimers.forEach(id => clearInterval(id)); activeTimers = []; }
    
    function initVisualizer(stream) {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);
        analyser.fftSize = 128;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        waveCanvas.style.display = 'block'; 
        function draw() {
            visualizerAnimationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray); 
            waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
            waveCtx.fillStyle = '#BD00FF';
            let x = 0;
            for(let i = 0; i < bufferLength; i++) {
                let barHeight = (dataArray[i] / 255) * waveCanvas.height;
                waveCtx.fillRect(x, (waveCanvas.height - barHeight)/2, 2, barHeight);
                x += 3;
            }
        }
        draw();
    }

    async function startTest() {
        startWrapper.style.display = 'none';
        statusWrapper.style.display = 'flex';
        instructionAudio.src = {
            1: "https://ik.imagekit.io/lql1uveoc/GEPT%20%E5%88%9D%E7%B4%9A%E5%8F%A3%E8%AA%AA%E6%B8%AC%E9%A9%97%20%E5%85%AD%E5%9B%9E/1",

            5: "https://ik.imagekit.io/lql1uveoc/GEPT%20%E5%88%9D%E7%B4%9A%E5%8F%A3%E8%AA%AA%E6%B8%AC%E9%A9%97%20%E5%85%AD%E5%9B%9E/%E5%85%A8%E6%B0%91%E8%8B%B1%E6%AA%A2%E5%88%9D%E7%B4%9A%E5%8F%A3%E8%AA%AA6-5B%20%E7%AC%AC%E4%BA%94%E5%9B%9E.mp3",
            6: "https://ik.imagekit.io/lql1uveoc/GEPT%20%E5%88%9D%E7%B4%9A%E5%8F%A3%E8%AA%AA%E6%B8%AC%E9%A9%97%20%E5%85%AD%E5%9B%9E/%E5%85%A8%E6%B0%91%E8%8B%B1%E6%AA%A2%E5%88%9D%E7%B4%9A%E5%8F%A3%E8%AA%AA6-6B%20%E7%AC%AC%E5%85%AD%E5%9B%9E.mp3"
        }[selectedRound];
        clearActiveTimers(); hideAllContent();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            initVisualizer(stream);
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = []; 
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                cancelAnimationFrame(visualizerAnimationId); waveCanvas.style.display = 'none';
                processedBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                statusMessage.textContent = "測驗結束，請提交錄音。";
                document.getElementById('submission-form-container').scrollIntoView({ behavior: 'smooth' });
            };
            mediaRecorder.start(); instructionAudio.play(); runFullTestSequence();
        } catch (err) { alert("請允許麥克風權限"); }
    }

    function hideAllContent() { dynamicContentDisplay.style.display = 'none'; passagesContainer.style.display = 'none'; }
    function setDynamicContent(c, h=false) { dynamicContentDisplay.style.display='flex'; if(h) dynamicContentDisplay.innerHTML=c; else dynamicContentDisplay.textContent=c; applyFonts(); }
    function countdownTimer(duration, initialLabel, endCallback) {
        let seconds = duration; timerDisplay.textContent = seconds; stageLabel.textContent = initialLabel;
        const intervalId = setInterval(() => {
            seconds--; timerDisplay.textContent = seconds;
            if (seconds <= 0) { clearInterval(intervalId); if (endCallback) endCallback(); }
        }, 1000);
        activeTimers.push(intervalId);
    }

        } else if (selectedRound === 3) { roundConfig = { introDelay: 19, part1End: 149, part2Intro: 150, readingStart: 187, recordingPreMessage: 247, recordingStart: 252, part2End: 312, part3Intro: 321, part3End: 351, questions: [ { show: 352, ans: 362, label: "Question 1", ansLabel: "Q1請作答" }, { show: 378, ans: 396, label: "Question 2", ansLabel: "Q2請作答" }, { show: 413, ans: 425, label: "Question 3", ansLabel: "Q3請作答" }, { show: 442, ans: 451, label: "Question 4", ansLabel: "Q4請作答" }, { show: 467, ans: 478, label: "Question 5", ansLabel: "Q5請作答" }, { show: 494, ans: 522, label: "Question 6", ansLabel: "Q6請作答" }, { show: 538, ans: 558, label: "Question 7", ansLabel: "Q7請作答" } ] };

    function closeUploadAnimation() { uploadAnimation.classList.remove('visible'); }

    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userInfo = { name: document.getElementById('userName').value, line: document.getElementById('userLine').value, email: document.getElementById('userEmail').value };
        uploadAnimation.innerHTML = `<img src="https://ik.imagekit.io/lql1uveoc/Upload%20files%20Animations/upload-2.gif?updatedAt=1761541965813" alt="Uploading"><p>上傳中... Uploading</p><div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>`;
        uploadAnimation.classList.add('visible');
        let progress = 0; const progBar = document.getElementById('progressBar');
        const progInterval = setInterval(() => { if (progress < 90) { progress += Math.random() * 12; if (progress > 90) progress = 90; progBar.style.width = progress + '%'; } }, 200);
        try {
            const reader = new FileReader(); reader.readAsDataURL(processedBlob);
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify({ filename: `R${selectedRound}_${userInfo.name}.mp4`, data: base64Data, name: userInfo.name, email: userInfo.email, line: userInfo.line, round: selectedRound }) });
                const result = await res.json();
                clearInterval(progInterval); progBar.style.width = '100%';
                setTimeout(() => {
                    uploadAnimation.innerHTML = `
                        <button class="close-btn" onclick="closeUploadAnimation()">✖</button>
                        <img src="https://ik.imagekit.io/lql1uveoc/Upload%20files%20Animations/verified.gif?updatedAt=1761541965780" style="max-width:80px;">
                        <div class="success-info">
                            <p style="margin:5px 0;">Upload Successfully</p>
                            <p style="margin:5px 0;">Name: ${userInfo.name}</p>
                            <p style="margin:5px 0; color:#007bff; font-size:1.5em; font-weight:900;">ID: ${result.submissionId || '#---'}</p>
                            <p class="success-email-text">確認信已傳至: ${userInfo.email}</p>
                        </div>
                    `;
                    contactForm.reset();
                }, 500);
            };
        } catch (error) { alert("上傳失敗"); uploadAnimation.classList.remove('visible'); }
    });

    function generateRoundButtons() {
        const container = document.getElementById('roundButtons');
        for (let i = 1; i <= 6; i++) {
            const btn = document.createElement('div');
            btn.className = 'round-button' + (i === 1 ? ' selected' : '');
            btn.textContent = i;
            btn.onclick = () => { document.querySelectorAll('.round-button').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedRound = i; };
            container.appendChild(btn);
        }
    }

    document.addEventListener('DOMContentLoaded', () => { 
        generateRoundButtons(); 
        applyFonts();
        setTimeout(() => {
            const titleElement = document.querySelector('.speaking-test-header h1');
            if (titleElement) {
                // **修改部分：針對不同裝置調整滾動邏輯**
                if (window.innerWidth < 768) {
                    // 手機版：計算元素位置並留出 15px 的間距
                    const offsetTop = titleElement.getBoundingClientRect().top + window.scrollY;
                    window.scrollTo({
                        top: offsetTop - 15, // 滾動到標題上方 15px 的位置
                        behavior: 'smooth'
                    });
                } else {
                    // 平板和桌機版：維持原有對齊頂部的行為
                    titleElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }, 100);
    });
