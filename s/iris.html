<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Online English - 學員登入</title>
    <!-- 引入 Supabase 官方 SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f5; margin: 0; min-height: 100vh;}
        #login-section, #error-section { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .login-btn { background: #4285F4; color: white; border: none; padding: 16px 32px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; transition: transform 0.2s; }
        #loading { display: none; text-align: center; padding-top: 20vh; font-size: 18px; color: #666; }
        /* 載入的 HTML 內容 CSS */
        .container { max-width: 600px; width: 100%; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .content { padding: 20px 25px 40px 25px; }
        .logout-btn { background: #f0f0f0; border: none; padding: 8px 12px; border-radius: 6px; font-size: 14px; color: #555; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <div id="loading">驗證身份中，請稍候...</div>

    <div id="login-section" style="display: none;">
        <div class="login-card">
            <h1>Tony Online English</h1>
            <p>這是專屬學員的私人頁面<br>請使用 Google 帳號驗證身份</p>
            <button onclick="signInWithGoogle()" class="login-btn">以 Google 帳號登入</button>
        </div>
    </div>

    <div id="course-content" style="display: none;"></div>

    <div id="error-section" style="display: none;">
        <h1>⛔</h1>
        <h2>存取受限</h2>
        <p>您的帳號不在授權名單內。</p>
        <button onclick="signOut()">切換帳號或登出</button>
    </div>

    <script>
        const supabaseUrl = 'https://ifmtjzixuuxgjsoebmkg.supabase.co';
        const supabaseKey = 'sb_publishable_2QqSMgGZImY-xIDmmqVT0Q_aKagrdwg';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = async function() {
            document.getElementById('loading').style.display = 'block';
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                checkAccess(session.user.email);
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        async function signInWithGoogle() {
            await supabase.auth.signInWithOAuth({ provider: 'google' });
        }

        async function checkAccess(email) {
            const { data, error } = await supabase
                .from('allowed_users')
                .select('course_html')
                .eq('email', email);

            document.getElementById('loading').style.display = 'none';

            if (data && data.length > 0 && data[0].course_html) {
                document.getElementById('course-content').innerHTML = data[0].course_html;
                document.getElementById('course-content').style.display = 'block';
            } else {
                document.getElementById('error-section').style.display = 'flex';
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.reload();
        }
    </script>
</body>
</html>
