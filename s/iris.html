<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony Online English - Secure Access</title>
<script src="layout-manager.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* 基礎樣式 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 10px; }
  .container { max-width: 600px; margin: 20px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .header-image { width: 100%; height: 250px; object-fit: cover; background-color: #f0f0f0; }
  .content { padding: 30px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 5px; color: #111; }
  h2 { font-size: 16px; font-weight: normal; color: #333; margin-bottom: 25px; }
  .price-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
  .price { font-size: 42px; font-weight: 500; color: #111; line-height: 1.2; }
  .price-detail { font-size: 16px; color: #444; margin-top: 5px; }
  .info-list { list-style: none; margin-bottom: 40px; }
  .info-list li { display: flex; align-items: flex-start; margin-bottom: 15px; font-size: 15px; color: #333; }
  .icon.check { background-color: #e0e0e0; color: #555; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin-right: 12px; flex-shrink: 0; }
  .info-box { border: 1px solid #ddd; border-radius: 12px; padding: 25px; margin-top: 20px; background-color: #fff; }
  .info-header h3 { font-size: 28px; font-weight: 400; color: #222; margin-bottom: 5px; }

  /* 登入遮罩 */
  #login-overlay {
    position: fixed; inset: 0; background: #ffffff; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
  }
  .login-btn {
    padding: 15px 35px; font-size: 18px; cursor: pointer;
    background: #4285F4; color: white; border: none; border-radius: 8px;
    font-weight: bold; margin-top: 20px; transition: 0.3s;
  }
  .login-btn:hover { background: #357ae8; }
  #main-content { display: none; } /* 預設隱藏內容 */
  .logout-link { margin-top: 15px; color: #666; cursor: pointer; text-decoration: underline; font-size: 14px; }
</style>
</head>
<body>

<div id="login-overlay">
    <h1 style="margin-bottom: 10px;">Tony Online English</h1>
    <p id="instruction-text">這是專屬學員的私人頁面，請先登入驗證身份。</p>
    <div id="auth-actions">
      <button class="login-btn" onclick="login()">使用 Google 帳號登入</button>
    </div>
    <p id="status-text" style="margin-top: 25px; color: #666; font-size: 15px; max-width: 80%;"></p>
</div>

<div id="main-content" class="container">
  <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1000&auto=format&fit=crop" alt="Students" class="header-image">
  <div class="content">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <h1>For Iris Liu Only 劉雅芳</h1>
        <h2>多益課程TOEIC - 600分 / 訂閱制 / 2026</h2>
      </div>
      <button onclick="logout()" style="font-size: 12px; padding: 5px; cursor: pointer;">登出</button>
    </div>
    
    <div class="price-section">
      <div class="price">NT$ 9,000</div>
      <div class="price-detail">大約20堂課 （每堂50分鐘）</div>
    </div>
    
    <ul class="info-list">
        <li><span class="icon check">✓</span><span>預約制或固定時段上課</span></li>
        <li><span class="icon check">✓</span><span>客製化教材與進度追蹤</span></li>
    </ul>
    
    <div class="info-box">
      <div class="info-header">
        <h3>上課時間 + 點數須知</h3>
        <p>Tony線上美語家教</p>
      </div>
    </div>
  </div>
</div>

<script>
  // --- 配置區 ---
  const supabaseUrl = 'https://ifmtjzixuuxgjsoebmkg.supabase.co';
  const supabaseKey = 'sb_publishable_2QqSMgGZImY-xIDmmqVT0Q_aKagrdwg'; 

  const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // 1. 核心邏輯：監聽登入狀態變化
  _supabase.auth.onAuthStateChange((event, session) => {
    console.log("Auth Event:", event);
    if (session && session.user) {
      verifyUser(session.user.email);
    } else {
      showLoginUI();
    }
  });

  // 2. 驗證資料庫名單
  async function verifyUser(email) {
    document.getElementById('status-text').innerText = "正在確認您的學員身份...";
    
    try {
      const { data, error } = await _supabase
        .from('allowed_users')
        .select('email')
        .eq('email', email)
        .maybeSingle();

      if (data) {
        // 在名單中
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } else {
        // 不在名單中
        document.getElementById('status-text').innerHTML = 
          `<span style="color:red; font-weight:bold;">抱歉，您的帳號 (${email}) 不在授權名單內。</span><br>請聯絡 Tony 老師開啟權限。`;
        document.getElementById('auth-actions').innerHTML = 
          `<button class="login-btn" onclick="logout()">切換帳號登入</button>`;
      }
    } catch (err) {
      console.error(err);
      document.getElementById('status-text').innerText = "連線發生錯誤，請稍後再試。";
    }
  }

  // 3. 登入動作
  async function login() {
    const { error } = await _supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { 
        redirectTo: window.location.origin + window.location.pathname 
      }
    });
    if (error) alert("登入失敗: " + error.message);
  }

  // 4. 登出動作
  async function logout() {
    await _supabase.auth.signOut();
    location.reload(); // 登出後刷新頁面回到初始狀態
  }

  function showLoginUI() {
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('status-text').innerText = "";
  }
</script>

</body>
</html>
