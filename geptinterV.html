<!-- SECURE GATEWAY - GEPT Elementary Writing (Email Version) -->
<div id="secure-container" style="width: 100%; max-width: 100%; margin: 0; padding: 0;">
  <style>
    /* 確保容器全寬度 */
    #secure-container {
      width: 100%;
      display: block;
    }
    
    /* 登入介面樣式 */
    #secure-login-box { 
      width: 100%;
      max-width: 420px; 
      margin: 60px auto; 
      padding: 40px 30px; 
      border: 1px solid #e2e8f0; 
      border-radius: 16px; 
      text-align: center; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      box-sizing: border-box;
    }
    #secure-login-box h3 {
      margin-top: 0;
      color: #343a40; 
      font-size: 24px;
      margin-bottom: 10px;
    }
    #secure-login-box p {
      color: #6c757d;
      font-size: 15px;
      margin-bottom: 25px;
    }
    #secure-login-box input { 
      width: 100%; 
      padding: 14px; 
      margin-top: 5px; 
      box-sizing: border-box; 
      border: 2px solid #e2e8f0; 
      border-radius: 10px; 
      font-size: 16px; 
      transition: 0.2s;
      outline: none;
      text-align: center; /* Email 置中 */
    }
    #secure-login-box input:focus {
      border-color: #007bff;
    }
    #secure-login-box button { 
      width: 100%; 
      padding: 14px; 
      margin-top: 20px; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      font-size: 18px; 
      font-weight: bold;
      cursor: pointer; 
      transition: opacity 0.2s; 
    }
    #secure-login-box button:hover { opacity: 0.9; }
    #secure-login-box button:disabled { background: #cbd5e1; cursor: not-allowed; }
    #secure-msg { color: #dc3545; margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: bold;}
  </style>
  
  <div id="secure-login-box">
    <h3>🔒 全民英檢中級寫作課程</h3>
    <p>請輸入留下的 Email</p>
    <!-- 修改為 Email 類型 -->
    <input type="email" id="email-input" placeholder="name@example.com">
    <button id="unlock-btn" onclick="verifyEmail()">進入課程</button>
    <div id="secure-msg"></div>
  </div>
</div>

<script>
  // ▼▼▼ 這裡填入你部署後的 GAS 網址 ▼▼▼
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzujRhqX5GIbpK9gEiluaCSgQUZGknghAPUTYMYBSWCmsdDMgihWGSAGrFeoGn0io9T4w/exec"; 

  async function verifyEmail() {
    const emailInput = document.getElementById("email-input");
    const email = emailInput.value;
    const btn = document.getElementById("unlock-btn");
    const msg = document.getElementById("secure-msg");

    if (!email) { msg.innerText = "請輸入 Email"; return; }
    if (!email.includes("@")) { msg.innerText = "Email 格式不正確"; return; }

    btn.disabled = true;
    btn.innerText = "驗證中...";
    msg.innerText = "";

    // 1. 嘗試抓取 IP
    let userIp = "未知";
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipJson = await ipRes.json();
      userIp = ipJson.ip;
    } catch(e) {
      console.log("IP fetch failed", e);
    }

    try {
      // 2. 傳送 Email 和 IP 給後端
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ email: email, ip: userIp })
      });
      const data = await response.json();

      if (data.success) {
        // 驗證成功！
        const container = document.getElementById("secure-container");
        container.innerHTML = data.html;
        
        // 確保新內容也是全寬度
        container.style.width = "100%";
        
        // 執行內容中的 scripts
        executeScripts(container); 
      } else {
        msg.innerText = data.message;
        btn.disabled = false;
        btn.innerText = "進入課程";
        emailInput.style.borderColor = "#dc3545";
        setTimeout(() => emailInput.style.borderColor = "#e2e8f0", 500);
      }
    } catch (e) {
      console.error(e);
      msg.innerText = "連線錯誤，請稍後再試";
      btn.disabled = false;
      btn.innerText = "進入課程";
    }
  }

  function executeScripts(element) {
    const scripts = element.querySelectorAll("script");
    scripts.forEach(oldScript => {
      const newScript = document.createElement("script");
      Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
      newScript.appendChild(document.createTextNode(oldScript.innerHTML));
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }
  
  // 支援 Enter 鍵送出
  document.getElementById("email-input").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        verifyEmail();
    }
  });
</script>
