  <style>

    #secure-msg { color: #dc3545; margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: bold;}
  </style>
  
  <div id="secure-login-box">
    <h3>🔒 全民英檢中級寫作課程</h3>
    <p>請輸入留下的 Email</p>
    <!-- 修改為 Email 類型 -->
    <input type="email" id="email-input" placeholder="name@example.com">
    <button id="unlock-btn" onclick="verifyEmail()">進入課程</button>
    <div id="secure-msg"></div>
  </div>
</div>

<script>
  // ▼▼▼ 這裡填入你部署後的 GAS 網址 ▼▼▼
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzujRhqX5GIbpK9gEiluaCSgQUZGknghAPUTYMYBSWCmsdDMgihWGSAGrFeoGn0io9T4w/exec"; 

  async function verifyEmail() {
    const emailInput = document.getElementById("email-input");
    const email = emailInput.value;
    const btn = document.getElementById("unlock-btn");
    const msg = document.getElementById("secure-msg");

    if (!email) { msg.innerText = "請輸入 Email"; return; }
    if (!email.includes("@")) { msg.innerText = "Email 格式不正確"; return; }

    btn.disabled = true;
    btn.innerText = "驗證中...";
    msg.innerText = "";

    // 1. 嘗試抓取 IP
    let userIp = "未知";
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipJson = await ipRes.json();
      userIp = ipJson.ip;
    } catch(e) {
      console.log("IP fetch failed", e);
    }

    try {
      // 2. 傳送 Email 和 IP 給後端
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ email: email, ip: userIp })
      });
      const data = await response.json();

      if (data.success) {
        // 驗證成功！
        const container = document.getElementById("secure-container");
        container.innerHTML = data.html;
        
        // 確保新內容也是全寬度
        container.style.width = "100%";
        
        // 執行內容中的 scripts
        executeScripts(container); 
      } else {
        msg.innerText = data.message;
        btn.disabled = false;
        btn.innerText = "進入課程";
        emailInput.style.borderColor = "#dc3545";
        setTimeout(() => emailInput.style.borderColor = "#e2e8f0", 500);
      }
    } catch (e) {
      console.error(e);
      msg.innerText = "連線錯誤，請稍後再試";
      btn.disabled = false;
      btn.innerText = "進入課程";
    }
  }

  function executeScripts(element) {
    const scripts = element.querySelectorAll("script");
    scripts.forEach(oldScript => {
      const newScript = document.createElement("script");
      Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
      newScript.appendChild(document.createTextNode(oldScript.innerHTML));
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }
  
  // 支援 Enter 鍵送出
  document.getElementById("email-input").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        verifyEmail();
    }
  });
</script>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwEt1tyYZ1Tcgox8g3Jxya2qjI_UckbFr-oklntx6o5HhlKLbk_aOcBITQUpX6D_nTzCg/exec";

        const uploaderForm = document.getElementById('file-uploader-form');
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('uploader-file');
        const fileList = document.getElementById('file-list');
        const uploadError = document.getElementById('upload-error');
        const submitButton = document.getElementById('submit-button');
        const uploadingAnimation = document.getElementById('uploading-animation');
        const successAnimation = document.getElementById('success-animation');
        const successMessage = document.getElementById('success-message');
        const progressBar = document.getElementById('progressBar');
        const progressPercentage = document.getElementById('progressPercentage');
        const nameError = document.getElementById('name-error');
        const lineIdError = document.getElementById('lineId-error');
        
        let progressInterval;
        let uploadedFiles = [];

        uploadArea.addEventListener('click', (e) => {
            if (e.target.closest('#browse-btn') || e.target.closest('#file-list-container')) { return; }
            if (!uploadArea.classList.contains('uploading')) { fileInput.click(); }
        });
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => { uploadArea.addEventListener(eventName, preventDefaults, false); });
        ['dragenter', 'dragover'].forEach(eventName => uploadArea.addEventListener(eventName, () => uploadArea.classList.add('drag-over'), false));
        ['dragleave', 'drop'].forEach(eventName => uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('drag-over'), false));
        uploadArea.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files), false);
        fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });
        uploaderForm.addEventListener('submit', handleFormSubmit);

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        function handleFiles(files) {
            uploadError.textContent = '';
            if (uploadedFiles.length + files.length > 3) {
                uploadError.textContent = '總檔案數不能超過 3 個 (Total files cannot exceed 3)';
                return;
            }
            uploadedFiles.push(...Array.from(files));
            updateFileList();
        }

        function updateFileList() {
            fileList.innerHTML = '';
            uploadedFiles.forEach((file, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = file.name;
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-file-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = (e) => { e.stopPropagation(); uploadedFiles.splice(index, 1); updateFileList(); };
                listItem.appendChild(removeBtn);
                fileList.appendChild(listItem);
            });
        }

        // --- 【MODIFIED FUNCTION】 ---
        function handleFormSubmit(e) {
            e.preventDefault();
            
            nameError.textContent = '';
            lineIdError.textContent = '';
            uploadError.textContent = '';
            let isFormValid = true;
            let firstInvalidElement = null; // Variable to store the first element that fails validation

            const nameInput = document.getElementById('uploader-name');
            const lineIdInput = document.getElementById('uploader-lineId');

            // --- Check all validations first ---
            if (!nameInput.value.trim()) {
                isFormValid = false;
                nameInput.classList.add('invalid');
                nameError.textContent = '請填寫您的姓名 (Please enter your name)';
                if (!firstInvalidElement) {
                    firstInvalidElement = nameInput; // If this is the first error, store it
                }
                setTimeout(() => nameInput.classList.remove('invalid'), 1500);
            }
            if (!lineIdInput.value.trim()) {
                isFormValid = false;
                lineIdInput.classList.add('invalid');
                lineIdError.textContent = '請填寫 Line 聯繫方式 (Please enter your Line contact)';
                if (!firstInvalidElement) {
                    firstInvalidElement = lineIdInput; // If this is the first error, store it
                }
                setTimeout(() => lineIdInput.classList.remove('invalid'), 1500);
            }
            if (uploadedFiles.length === 0) {
                isFormValid = false;
                uploadError.textContent = '錯誤：請至少選擇一個檔案 (Error: Please select at least one file)';
                if (!firstInvalidElement) {
                    firstInvalidElement = uploadArea; // If files are the first error, target the upload area
                }
            }

            // --- If the form is not valid, scroll to the FIRST invalid element and stop execution ---
            if (!isFormValid) {
                if (firstInvalidElement) {
                    firstInvalidElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            // --- If form is valid, proceed with the upload process ---
            uploadArea.classList.add('uploading');
            uploadingAnimation.classList.add('visible');
            submitButton.disabled = true;
            startProgressBar();

            const filePromises = uploadedFiles.map(file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve({ fileName: file.name, mimeType: file.type, fileData: reader.result });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            }));

            Promise.all(filePromises).then(filesArray => {
                const formData = { name: nameInput.value, lineId: lineIdInput.value, email: uploaderForm['uploader-email'].value, files: filesArray };
                fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        completeProgressBar(data);
                    } else {
                        showError(data.message || 'An unknown error occurred.');
                    }
                })
                .catch(error => {
                    showError('Upload failed. Please check network connection.');
                });
            }).catch(() => showError('Failed to read files.'));
        }


        function startProgressBar() {
            let width = 0;
            clearInterval(progressInterval);
            progressBar.style.width = '0%';
            progressPercentage.textContent = '0%';
            progressInterval = setInterval(() => {
                if (width < 90) {
                    width++;
                    progressBar.style.width = width + '%';
                    progressPercentage.textContent = width + '%';
                } else {
                    clearInterval(progressInterval);
                }
            }, 80);
        }

        function completeProgressBar(data) {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            progressPercentage.textContent = '100%';
            setTimeout(() => showSuccess(data), 500);
        }

        function showSuccess(data) {
            uploadingAnimation.classList.remove('visible');
            successMessage.innerHTML = `Upload Complete! / 上傳成功!<br>Your ID is / 您的編號是: <b>${data.submissionId}</b><br><span style="font-size: 0.8em; color: #555;">Please check your email for confirmation. / 請檢查您的電子信箱以獲取確認信。</span>`;
            successAnimation.classList.add('visible');
            submitButton.textContent = 'Done / 已成功上傳';
            submitButton.classList.add('done');
            submitButton.disabled = true;

            setTimeout(() => {
                successAnimation.classList.remove('visible');
                uploadArea.classList.remove('uploading');
                uploaderForm.reset();
                uploadedFiles = [];
                updateFileList();
                submitButton.textContent = 'Submit / 提交';
                submitButton.classList.remove('done');
                submitButton.disabled = false;
                progressBar.style.width = '0%';
                progressPercentage.textContent = '0%';
            }, 10000);
        }

        function showError(message) {
            clearInterval(progressInterval);
            uploadingAnimation.classList.remove('visible');
            uploadArea.classList.remove('uploading');
            uploadError.textContent = message;
            submitButton.disabled = false;
        }
    </script>
</html>

      }

      .card li::before {
        font-size: 1.4rem;
      }
    }

    /* 桌機放大 2 倍 */
    @media (min-width: 1024px) {
      .card {
        padding: 3rem;
        max-width: 1200px;
      }

      .card h2 {
        font-size: 2.4rem;
      }

      .card li {
        font-size: 2rem;
      }

      .card li::before {
        font-size: 2rem;
      }
    }
  </style>
</head>
