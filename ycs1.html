<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tony's Schedule Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #0a0a0a;
            --white: #fafafa;
            --gray-100: #f0f0f0;
            --gray-200: #e0e0e0;
            --gray-300: #c0c0c0;
            --gray-500: #888;
            --gray-700: #444;
            --accent: #0a0a0a;
            --radius: 12px;
        }

        html, body {
            margin: 0; padding: 0; width: 100%;
            background: var(--white);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        #header {
            padding: 28px 24px 20px;
            border-bottom: 1.5px solid var(--gray-200);
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        #header .logo-tony {
            font-family: 'Pacifico', cursive;
            font-size: 1.6em;
            color: var(--black);
        }
        #header .logo-sub {
            font-size: 0.9em;
            color: var(--gray-500);
            font-weight: 400;
            letter-spacing: 0.03em;
        }
        #current-date-header {
            margin-left: auto;
            font-size: 0.82em;
            color: var(--gray-500);
            font-family: 'DM Mono', monospace;
            font-weight: 400;
        }

        /* ── Main Container ── */
        #app {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ── Name Buttons Grid ── */
        #name-grid-section {
            padding: 28px 0 20px;
        }
        #name-grid-section h2 {
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 16px;
        }
        #name-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .name-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border: 1.5px solid var(--gray-200);
            border-radius: 100px;
            background: var(--white);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95em;
            font-weight: 500;
            color: var(--black);
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
            user-select: none;
        }
        .name-btn:hover {
            background: var(--gray-100);
            border-color: var(--gray-300);
        }
        .name-btn:active { transform: scale(0.96); }
        .name-btn.active {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }
        .name-btn .avatar {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--gray-200);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75em;
            font-weight: 700;
            flex-shrink: 0;
        }
        .name-btn.active .avatar {
            background: rgba(255,255,255,0.2);
            color: var(--white);
        }

        /* ── Divider ── */
        .section-divider {
            border: none;
            border-top: 1.5px solid var(--gray-200);
            margin: 8px 0 24px;
        }

        /* ── Status Banner ── */
        #status-banner {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius);
            border: 1.5px solid var(--gray-200);
            background: var(--gray-100);
            font-size: 0.88em;
            color: var(--gray-700);
            margin-bottom: 20px;
        }
        #status-banner.visible { display: flex; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--gray-300);
            border-top-color: var(--black);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Upcoming Sessions ── */
        #upcoming-sessions-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .session-item {
            flex: 1;
            min-width: 90px;
            max-width: 140px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 14px 12px;
            text-align: center;
            background: var(--white);
            transition: border-color 0.2s;
            cursor: default;
        }
        .session-item.is-today {
            border-color: var(--black);
            background: var(--black);
            color: var(--white);
        }
        .session-day { font-size: 0.72em; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-500); }
        .session-item.is-today .session-day { color: rgba(255,255,255,0.6); }
        .session-date { font-size: 1.9em; font-weight: 600; line-height: 1.1; margin: 4px 0 2px; font-family: 'DM Mono', monospace; }
        .session-time { font-size: 0.8em; color: var(--gray-500); font-family: 'DM Mono', monospace; }
        .session-item.is-today .session-time { color: rgba(255,255,255,0.65); }

        .upcoming-label {
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 12px;
        }

        /* ── Schedule List ── */
        .toggle-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius);
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 600;
            background: var(--white);
            transition: background 0.15s;
            user-select: none;
        }
        .toggle-bar:hover { background: var(--gray-100); }
        .toggle-chevron {
            transition: transform 0.25s;
            color: var(--gray-500);
            font-size: 1.1em;
        }
        .toggle-chevron.open { transform: rotate(180deg); }

        #schedule-list-details { display: none; margin-bottom: 24px; }

        .event-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 13px 16px;
            border-bottom: 1px solid var(--gray-100);
            font-size: 0.88em;
        }
        .event-row:last-child { border-bottom: none; }
        .event-row.today-row {
            background: var(--black);
            color: var(--white);
            border-radius: 8px;
            margin-bottom: 4px;
        }
        .event-date {
            font-family: 'DM Mono', monospace;
            font-size: 0.92em;
            color: var(--gray-500);
            min-width: 85px;
            flex-shrink: 0;
        }
        .event-row.today-row .event-date { color: rgba(255,255,255,0.6); }
        .event-day { font-weight: 600; min-width: 34px; flex-shrink: 0; }
        .event-time {
            font-family: 'DM Mono', monospace;
            color: var(--gray-700);
            font-size: 0.92em;
        }
        .event-row.today-row .event-time { color: rgba(255,255,255,0.8); }
        .event-title { color: var(--gray-700); font-size: 0.88em; margin-left: auto; }
        .event-row.today-row .event-title { color: rgba(255,255,255,0.7); }

        /* ── Calendar ── */
        #calendarContainer { margin-top: 10px; }
        .single-calendar { margin-bottom: 32px; }
        .month-label {
            font-size: 1em;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: var(--black);
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day-label {
            text-align: center;
            font-size: 0.68em;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-500);
            padding: 6px 2px;
        }
        .day-label.weekend-label { color: var(--gray-300); }
        .day {
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            min-height: 76px;
            padding: 7px 5px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.82em;
            transition: border-color 0.15s;
        }
        .day.empty { border-color: transparent; background: transparent; }
        .day.past-day { opacity: 0.45; background: var(--gray-100); }
        .day.today-plain { border-color: var(--black); }
        .day.today-event { border-color: var(--black); background: var(--black); color: var(--white); }
        .day.has-event { border-color: var(--gray-700); background: var(--white); }
        .day.multi-event { border-color: var(--black); background: var(--gray-100); }
        .date-number {
            font-size: 0.95em;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            margin-bottom: 4px;
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .day.today-plain .date-number,
        .day.today-event .date-number {
            background: var(--white);
            color: var(--black);
        }
        .day.today-event .date-number { }
        .day.has-event .date-number,
        .day.multi-event .date-number {
            background: var(--black);
            color: var(--white);
        }
        .cal-time {
            font-family: 'DM Mono', monospace;
            font-size: 0.8em;
            color: var(--gray-700);
            white-space: nowrap;
        }
        .day.today-event .cal-time { color: rgba(255,255,255,0.75); }
        .completed-icon { margin-top: 4px; font-size: 1em; }

        /* ── No-results / CTA ── */
        #results-cta {
            margin: 8px 0 20px;
        }
        .cta-box {
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
        }
        .cta-box .cta-title { font-size: 1.05em; font-weight: 700; margin-bottom: 6px; }
        .cta-box .cta-sub { font-size: 0.85em; color: var(--gray-500); margin-bottom: 20px; }
        .btn-book {
            display: inline-block;
            padding: 12px 28px;
            background: var(--black);
            color: var(--white);
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9em;
            text-decoration: none;
            transition: opacity 0.15s;
            margin: 4px;
        }
        .btn-book:hover { opacity: 0.75; }
        .btn-line {
            display: inline-block;
            padding: 12px 28px;
            background: var(--white);
            color: var(--black);
            border: 1.5px solid var(--black);
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9em;
            text-decoration: none;
            transition: background 0.15s;
            margin: 4px;
        }
        .btn-line:hover { background: var(--gray-100); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #header { flex-wrap: wrap; gap: 6px; }
            #current-date-header { margin-left: 0; width: 100%; }
            .day { min-height: 60px; font-size: 0.75em; }
            .session-item { min-width: 80px; max-width: 110px; }
            .session-date { font-size: 1.5em; }
        }
        @media (min-width: 1200px) {
            #app { max-width: 1100px; padding: 0 40px 80px; }
            .day { min-height: 100px; }
            .session-item { max-width: 160px; }
        }
    </style>
</head>
<body>

<div id="header">
    <span class="logo-tony">Tony</span>
    <span class="logo-sub">線上美語家教 · 課表查詢</span>
    <span id="current-date-header"></span>
</div>

<div id="app">

    <!-- Name Button Grid -->
    <div id="name-grid-section">
        <h2>Select Your Name · 點選你的名字</h2>
        <div id="name-grid"></div>
    </div>

    <hr class="section-divider">

    <!-- Loading / status -->
    <div id="status-banner">
        <div class="spinner"></div>
        <span id="status-text">查詢中 Loading…</span>
    </div>

    <!-- CTA / no-result area -->
    <div id="results-cta"></div>

    <!-- Upcoming sessions -->
    <div id="upcoming-wrapper" style="display:none;">
        <div class="upcoming-label">Upcoming Classes · 即將到來的課程</div>
        <div id="upcoming-sessions-container"></div>
        <hr class="section-divider">
    </div>

    <!-- Schedule list (collapsible) -->
    <div id="schedule-list-wrapper" style="display:none;">
        <div class="toggle-bar" onclick="toggleScheduleList()">
            <span>即將課程清單 · Upcoming Course List</span>
            <span class="toggle-chevron" id="toggle-icon">▾</span>
        </div>
        <div id="schedule-list-details"></div>
        <hr class="section-divider">
    </div>

    <!-- Calendars -->
    <div id="calendarContainer"></div>

</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxrSJS4dGWmG_GHpginXD_Nl-R8KaZq-6NHRtBjT8_Q4TWz0pp4yinVaMKibdf-Vz1ELg/exec";

    const STUDENTS = [
        { display: "Eason 新營高中", search: "Eason" },
        { display: "Kenny",      search: "Kenny" },
        { display: "Stephanie",  search: "Stephanie" },
        { display: "Cheng",      search: "Cheng" },
        { display: "Winnie",     search: "Winnie" },
        { display: "Cindy",      search: "Cindy" },
        { display: "Kai",        search: "Kai" },
        { display: "Charlotte",  search: "Charlotte" },
    ];

    const weekdaysEn  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const weekdaysZh  = ["週日","週一","週二","週三","週四","週五","週六"];
    const monthsEn    = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const monthsZh    = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

    let activeBtn = null;

    /* ── helpers ── */
    function formatTime(d) {
        let h = d.getHours(), m = d.getMinutes().toString().padStart(2,'0');
        const ap = h >= 12 ? 'pm' : 'am';
        h = h % 12 || 12;
        return `${h}:${m} ${ap}`;
    }
    function formatShortTime(d) {
        let h = d.getHours(), m = d.getMinutes();
        const ap = h >= 12 ? 'pm' : 'am';
        h = h % 12 || 12;
        return m === 0 ? `${h}${ap}` : `${h}:${m.toString().padStart(2,'0')}${ap}`;
    }

    /* ── Build name buttons ── */
    function buildNameGrid() {
        const grid = document.getElementById('name-grid');
        STUDENTS.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'name-btn';
            const initial = s.display[0].toUpperCase();
            btn.innerHTML = `<span class="avatar">${initial}</span>${s.display}`;
            btn.addEventListener('click', () => selectStudent(s, btn));
            grid.appendChild(btn);
        });
    }

    function selectStudent(student, btn) {
        if (activeBtn) activeBtn.classList.remove('active');
        btn.classList.add('active');
        activeBtn = btn;
        searchSchedule(student);
    }

    /* ── Date header ── */
    function setDateHeader() {
        const t = new Date();
        const el = document.getElementById('current-date-header');
        if (el) el.textContent = `${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,'0')}.${String(t.getDate()).padStart(2,'0')} ${weekdaysEn[t.getDay()]}`;
    }

    /* ── Toggle schedule list ── */
    function toggleScheduleList() {
        const d = document.getElementById('schedule-list-details');
        const ic = document.getElementById('toggle-icon');
        const open = d.style.display === 'block';
        d.style.display = open ? 'none' : 'block';
        ic.classList.toggle('open', !open);
    }

    /* ── Show / hide status ── */
    function showStatus(msg) {
        const b = document.getElementById('status-banner');
        document.getElementById('status-text').textContent = msg;
        b.classList.add('visible');
    }
    function hideStatus() {
        document.getElementById('status-banner').classList.remove('visible');
    }

    /* ── Main search ── */
    async function searchSchedule(student) {
        const nameLower = student.search.toLowerCase();

        // Reset UI
        hideStatus();
        document.getElementById('results-cta').innerHTML = '';
        document.getElementById('upcoming-wrapper').style.display = 'none';
        document.getElementById('schedule-list-wrapper').style.display = 'none';
        document.getElementById('upcoming-sessions-container').innerHTML = '';
        document.getElementById('schedule-list-details').innerHTML = '';
        document.getElementById('calendarContainer').innerHTML = '';
        buildCalendars([], false);

        showStatus(`查詢中 Loading ${student.display}…`);

        try {
            const url = `${GAS_URL}?action=getSchedule&name=${encodeURIComponent(student.search)}`;
            const resp = await fetch(url);
            const raw  = await resp.json();
            if (raw.error) throw new Error(raw.error);

            let data = [];
            if (Array.isArray(raw)) {
                if (nameLower === 'eason') {
                    data = raw.filter(ev => {
                        if (!ev.title) return false;
                        const t = ev.title.toLowerCase();
                        return t.includes('eason') && !t.includes('cheng') && t.includes('english class');
                    });
                } else {
                    data = raw.filter(ev => {
                        if (!ev.title) return false;
                        const t = ev.title.toLowerCase();
                        return t.includes(nameLower) && t.includes('english class');
                    });
                }
            }

            hideStatus();

            if (data.length === 0) {
                showNoClasses(student);
                buildCalendars([], true);
                return;
            }

            const now = new Date();
            const limitDate = new Date(); limitDate.setDate(now.getDate() + 60);
            const upcoming = data.filter(ev => new Date(ev.start) >= now && new Date(ev.start) <= limitDate)
                                 .sort((a,b) => new Date(a.start) - new Date(b.start));

            if (upcoming.length === 0) {
                showNoUpcoming(student);
            } else {
                buildUpcomingSessions(upcoming);
                buildScheduleList(upcoming);
            }
            buildCalendars(data, true);

        } catch(err) {
            hideStatus();
            document.getElementById('results-cta').innerHTML = `<div class="cta-box"><div class="cta-title">查詢失敗 Error</div><div class="cta-sub">${err.message}</div></div>`;
        }
    }

    /* ── No classes ── */
    function showNoClasses(student) {
        document.getElementById('results-cta').innerHTML = `
            <div class="cta-box">
                <div class="cta-title">找不到課表 · No Schedule Found</div>
                <div class="cta-sub">找不到 ${student.display} 的課程資料</div>
                <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="btn-line">LINE 諮詢</a>
            </div>`;
    }

    function showNoUpcoming(student) {
        document.getElementById('results-cta').innerHTML = `
            <div class="cta-box">
                <div class="cta-title">目前無預約課程 · No Upcoming Classes</div>
                <div class="cta-sub">${student.display}，歡迎預約下次課程！</div>
                <a href="https://tonyonlineenglish.netlify.app/25-50mbk" target="_blank" class="btn-book">預約課程 Book Now</a>
                <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="btn-line">LINE 聯繫</a>
            </div>`;
    }

    /* ── Upcoming session cards ── */
    function buildUpcomingSessions(upcoming) {
        const container = document.getElementById('upcoming-sessions-container');
        const now = new Date();
        const html = upcoming.slice(0, 3).map(ev => {
            const d = new Date(ev.start);
            const isToday = d.toDateString() === now.toDateString();
            return `
            <div class="session-item${isToday ? ' is-today' : ''}">
                <div class="session-day">${weekdaysEn[d.getDay()]}</div>
                <div class="session-date">${d.getMonth()+1}/${d.getDate()}</div>
                <div class="session-time">${formatShortTime(d)}</div>
            </div>`;
        }).join('');
        container.innerHTML = html;
        document.getElementById('upcoming-wrapper').style.display = 'block';
    }

    /* ── Schedule list ── */
    function buildScheduleList(upcoming) {
        const container = document.getElementById('schedule-list-details');
        const now = new Date();
        const html = upcoming.map(ev => {
            const d = new Date(ev.start);
            const isToday = d.toDateString() === now.toDateString();
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const dur = ev.end ? ` · ${(new Date(ev.end)-d)/60000}min` : '';
            return `
            <div class="event-row${isToday ? ' today-row' : ''}">
                <span class="event-date">${dateStr}</span>
                <span class="event-day">${weekdaysEn[d.getDay()]}</span>
                <span class="event-time">${formatTime(d)}</span>
                <span class="event-title">${ev.title || ''}${dur}</span>
            </div>`;
        }).join('');
        container.innerHTML = html;
        document.getElementById('schedule-list-wrapper').style.display = 'block';
    }

    /* ── Calendar ── */
    function buildCalendars(data, showBothMonths) {
        const container = document.getElementById('calendarContainer');
        container.innerHTML = '';
        const now = new Date();
        buildSingleCalendar(data, new Date(now.getFullYear(), now.getMonth(), 1));

        if (showBothMonths) {
            const nextM = new Date(now.getFullYear(), now.getMonth()+1, 1);
            const hasNext = data.some(ev => {
                const d = new Date(ev.start);
                return d.getFullYear() === nextM.getFullYear() && d.getMonth() === nextM.getMonth();
            });
            if (hasNext) buildSingleCalendar(data, nextM);
        }
    }

    function buildSingleCalendar(data, displayDate) {
        const container = document.getElementById('calendarContainer');
        const now = new Date();
        const today = new Date(); today.setHours(0,0,0,0);
        const month = displayDate.getMonth();
        const year  = displayDate.getFullYear();
        const firstDay = new Date(year, month, 1);
        const lastDay  = new Date(year, month+1, 0);

        // Group events by day
        const dailyData = {};
        data.forEach(ev => {
            const d = new Date(ev.start);
            if (d.getMonth() === month && d.getFullYear() === year) {
                const k = d.getDate();
                if (!dailyData[k]) dailyData[k] = [];
                dailyData[k].push(ev);
            }
        });

        let html = `<div class="single-calendar" id="calendar-${year}-${month+1}">`;
        html += `<div class="month-label">${monthsEn[month]} ${year} · ${monthsZh[month]}</div>`;
        html += `<div class="calendar">`;

        // Day labels
        weekdaysEn.forEach((d,i) => {
            html += `<div class="day-label${[0,6].includes(i) ? ' weekend-label' : ''}">${d}</div>`;
        });

        // Empty cells
        for (let i = 0; i < firstDay.getDay(); i++) html += `<div class="day empty"></div>`;

        for (let d = 1; d <= lastDay.getDate(); d++) {
            const dayDate = new Date(year, month, d);
            const evs = dailyData[d] || [];
            const hasEvs = evs.length > 0;
            const isPast = dayDate < today;
            const isToday = dayDate.toDateString() === today.toDateString();

            // Determine all events completed
            const allDone = hasEvs && evs.every(ev => {
                if (!ev.end) return false;
                const endT = new Date(ev.end);
                endT.setMinutes(endT.getMinutes()+10);
                return now > endT;
            });

            let cls = 'day';
            if (isPast) cls += ' past-day';
            else if (isToday && hasEvs) cls += ' today-event';
            else if (isToday) cls += ' today-plain';
            else if (hasEvs && evs.length >= 2) cls += ' multi-event';
            else if (hasEvs) cls += ' has-event';

            html += `<div class="${cls}" id="date-${year}-${month+1}-${d}">`;
            html += `<span class="date-number">${d}</span>`;

            if (allDone) {
                // Determine icon
                const icons = new Set();
                evs.forEach(ev => {
                    const t = (ev.title || '').toLowerCase();
                    if (t.includes('sick')) icons.add('🤒');
                    else if (ev.title && ev.title.includes('❖')) icons.add('❌');
                    else if (t.includes('12h')) icons.add('⏱');
                    else {
                        const dur = ev.end ? (new Date(ev.end)-new Date(ev.start))/60000 : 50;
                        icons.add(dur === 25 ? '✓' : '✓✓');
                    }
                });
                html += `<div class="completed-icon">${[...icons].join('')}</div>`;
            } else if (hasEvs) {
                evs.sort((a,b) => new Date(a.start)-new Date(b.start)).forEach(ev => {
                    html += `<span class="cal-time">${formatShortTime(new Date(ev.start))}</span>`;
                });
            }
            html += `</div>`;
        }
        html += `</div></div>`;
        container.innerHTML += html;
    }

    /* ── Init ── */
    function init() {
        setDateHeader();
        buildNameGrid();
        buildCalendars([], false);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
