<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tony's Schedule Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #0a0a0a;
            --white: #fafafa;
            --gray-100: #f0f0f0;
            --gray-200: #e0e0e0;
            --gray-300: #c0c0c0;
            --gray-500: #888;
            --gray-700: #444;
            --radius: 12px;

            /* Student color — set per-student by JS */
            --sc-bg:     #e8f0fe;
            --sc-border: #c5d8fc;
            --sc-text:   #1a1a1a;
            --sc-muted:  rgba(0,0,0,0.45);
        }

        html, body {
            margin: 0; padding: 0; width: 100%;
            background: var(--white);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        #header {
            padding: 28px 24px 20px;
            border-bottom: 1.5px solid var(--gray-200);
            display: flex; align-items: baseline; gap: 10px;
        }
        #header .logo-tony { font-family: 'Pacifico', cursive; font-size: 1.6em; color: var(--black); }
        #header .logo-sub  { font-size: 0.9em; color: var(--gray-500); font-weight: 400; letter-spacing: 0.03em; }
        #current-date-header {
            margin-left: auto; font-size: 0.82em;
            color: var(--gray-500); font-family: 'DM Mono', monospace; font-weight: 400;
        }

        /* ── App ── */
        #app { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

        /* ── Name Grid ── */
        #name-grid-section { padding: 28px 0 20px; }
        #name-grid-section h2 {
            font-size: 0.72em; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--gray-500);
            margin-bottom: 16px; transition: opacity 0.2s;
        }
        #name-grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

        .name-btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 10px 20px; border: 1.5px solid var(--gray-200);
            border-radius: 100px; background: var(--white);
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            font-size: 0.95em; font-weight: 500; color: var(--black);
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
            user-select: none;
        }
        .name-btn:hover { background: var(--gray-100); border-color: var(--gray-300); }
        .name-btn:active { transform: scale(0.96); }
        .name-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
        .name-btn .avatar {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--gray-200);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75em; font-weight: 700; flex-shrink: 0;
        }
        .name-btn.active .avatar { background: rgba(255,255,255,0.2); color: var(--white); }

        /* × button */
        #clear-btn {
            display: none; align-items: center; justify-content: center;
            width: 34px; height: 34px;
            border: 1.5px solid var(--gray-200); border-radius: 50%;
            background: var(--white); cursor: pointer;
            font-size: 1.1em; line-height: 1; color: var(--gray-500);
            transition: background 0.15s, color 0.15s; flex-shrink: 0;
        }
        #clear-btn:hover { background: var(--gray-100); color: var(--black); }

        /* ── Divider ── */
        .section-divider { border: none; border-top: 1.5px solid var(--gray-200); margin: 8px 0 24px; }

        /* ── Status ── */
        #status-banner {
            display: none; align-items: center; gap: 10px;
            padding: 12px 16px; border-radius: var(--radius);
            border: 1.5px solid var(--gray-200); background: var(--gray-100);
            font-size: 0.88em; color: var(--gray-700); margin-bottom: 20px;
        }
        #status-banner.visible { display: flex; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--gray-300); border-top-color: var(--black);
            border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Upcoming Sessions ── */
        #upcoming-sessions-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

        .session-item {
            flex: 1; min-width: 90px; max-width: 140px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius); padding: 14px 12px;
            text-align: center; background: var(--white); cursor: default;
        }
        .session-item.sc {
            background: var(--sc-bg);
            border-color: var(--sc-border);
            color: var(--sc-text);
        }
        .session-item.is-today {
            background: var(--black); border-color: var(--black); color: var(--white);
        }
        .session-day { font-size: 0.72em; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-500); }
        .session-item.sc .session-day       { color: var(--sc-muted); }
        .session-item.is-today .session-day { color: rgba(255,255,255,0.6); }
        .session-date { font-size: 1.9em; font-weight: 600; line-height: 1.1; margin: 4px 0 2px; font-family: 'DM Mono', monospace; }
        .session-time { font-size: 0.8em; color: var(--gray-500); font-family: 'DM Mono', monospace; }
        .session-item.sc .session-time       { color: var(--sc-muted); }
        .session-item.is-today .session-time { color: rgba(255,255,255,0.65); }

        .upcoming-label {
            font-size: 0.72em; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--gray-500); margin-bottom: 12px;
        }

        /* ── Schedule List ── */
        .toggle-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; border: 1.5px solid var(--gray-200);
            border-radius: var(--radius); cursor: pointer; margin-bottom: 8px;
            font-size: 0.9em; font-weight: 600; background: var(--white);
            transition: background 0.15s; user-select: none;
        }
        .toggle-bar:hover { background: var(--gray-100); }
        .toggle-chevron { transition: transform 0.25s; color: var(--gray-500); font-size: 1.1em; }
        .toggle-chevron.open { transform: rotate(180deg); }
        #schedule-list-details { display: none; margin-bottom: 24px; }

        .event-row {
            display: flex; align-items: baseline; gap: 10px;
            padding: 13px 16px; border-bottom: 1px solid var(--gray-100);
            font-size: 0.88em;
        }
        .event-row:last-child { border-bottom: none; }
        .event-row.sc {
            background: var(--sc-bg); color: var(--sc-text);
            border-radius: 8px; margin-bottom: 4px; border-bottom: none;
        }
        .event-row.sc .event-date  { color: var(--sc-muted); }
        .event-row.sc .event-time  { color: var(--sc-muted); }
        .event-row.sc .event-title { color: var(--sc-muted); }
        .event-row.today-row {
            background: var(--black); color: var(--white);
            border-radius: 8px; margin-bottom: 4px; border-bottom: none;
        }
        .event-row.today-row .event-date  { color: rgba(255,255,255,0.6); }
        .event-row.today-row .event-time  { color: rgba(255,255,255,0.8); }
        .event-row.today-row .event-title { color: rgba(255,255,255,0.7); }

        .event-date  { font-family: 'DM Mono', monospace; font-size: 0.92em; color: var(--gray-500); min-width: 85px; flex-shrink: 0; }
        .event-day   { font-weight: 600; min-width: 34px; flex-shrink: 0; }
        .event-time  { font-family: 'DM Mono', monospace; color: var(--gray-700); font-size: 0.92em; }
        .event-title { color: var(--gray-700); font-size: 0.88em; margin-left: auto; }

        /* ── Calendar ── */
        #calendarContainer { margin-top: 10px; }
        .single-calendar { margin-bottom: 32px; }
        .month-label {
            font-size: 1em; font-weight: 700; font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em; text-transform: uppercase;
            margin-bottom: 12px; color: var(--black);
        }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

        .day-label {
            text-align: center; padding: 6px 2px;
            display: flex; flex-direction: column; align-items: center; gap: 1px;
        }
        .day-label .dl-en {
            font-size: 0.65em; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--gray-500);
        }
        .day-label .dl-zh {
            font-size: 0.62em; font-weight: 500; color: var(--gray-300);
        }
        .day-label.weekend-label .dl-en { color: var(--gray-300); }
        .day-label.weekend-label .dl-zh { color: var(--gray-200); }

        .day {
            border: 1px solid var(--gray-200); border-radius: 8px;
            min-height: 76px; padding: 7px 5px 5px;
            display: flex; flex-direction: column; align-items: center; font-size: 0.82em;
        }
        .day.empty    { border-color: transparent; background: transparent; }
        .day.past-day { opacity: 0.45; background: var(--gray-100); }
        .day.today-plain  { border-color: var(--black); }
        .day.today-event  { border-color: var(--black); background: var(--black); color: var(--white); }
        .day.today-event .date-number { background: var(--white); color: var(--black); }
        .day.today-event .cal-time    { color: rgba(255,255,255,0.75); }

        /* Student-colored calendar cells */
        .day.has-event,
        .day.multi-event {
            border-color: var(--sc-border);
            background: var(--sc-bg);
            color: var(--sc-text);
        }
        .day.has-event .date-number,
        .day.multi-event .date-number {
            background: var(--sc-border);
            color: var(--sc-text);
        }
        .day.has-event .cal-time,
        .day.multi-event .cal-time { color: var(--sc-muted); }

        .date-number {
            font-size: 0.95em; font-family: 'DM Mono', monospace; font-weight: 500;
            margin-bottom: 4px; width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .day.today-plain .date-number { background: var(--white); color: var(--black); }

        .cal-time {
            font-family: 'DM Mono', monospace; font-size: 0.8em;
            color: var(--gray-700); white-space: nowrap;
        }
        .completed-icon { margin-top: 4px; font-size: 1em; }

        /* ── CTA ── */
        #results-cta { margin: 8px 0 20px; }
        .cta-box { border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 28px 24px; text-align: center; }
        .cta-box .cta-title { font-size: 1.05em; font-weight: 700; margin-bottom: 6px; }
        .cta-box .cta-sub   { font-size: 0.85em; color: var(--gray-500); margin-bottom: 20px; }
        .btn-book {
            display: inline-block; padding: 12px 28px; background: var(--black); color: var(--white);
            border-radius: 100px; font-weight: 600; font-size: 0.9em;
            text-decoration: none; transition: opacity 0.15s; margin: 4px;
        }
        .btn-book:hover { opacity: 0.75; }
        .btn-line {
            display: inline-block; padding: 12px 28px; background: var(--white); color: var(--black);
            border: 1.5px solid var(--black); border-radius: 100px; font-weight: 600; font-size: 0.9em;
            text-decoration: none; transition: background 0.15s; margin: 4px;
        }
        .btn-line:hover { background: var(--gray-100); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #header { flex-wrap: wrap; gap: 6px; }
            #current-date-header { margin-left: 0; width: 100%; }
            .day { min-height: 60px; font-size: 0.75em; }
            .session-item { min-width: 80px; max-width: 110px; }
            .session-date { font-size: 1.5em; }
        }
        @media (min-width: 1200px) {
            #app { max-width: 1100px; padding: 0 40px 80px; }
            .day { min-height: 100px; }
            .session-item { max-width: 160px; }
        }
    </style>
</head>
<body>

<div id="header">
    <span class="logo-tony">Tony</span>
    <span class="logo-sub">線上美語家教 · 課表查詢</span>
    <span id="current-date-header"></span>
</div>

<div id="app">
    <div id="name-grid-section">
        <h2 id="name-grid-label">Select Your Name · 點選你的名字</h2>
        <div id="name-grid"></div>
    </div>
    <hr class="section-divider">
    <div id="status-banner"><div class="spinner"></div><span id="status-text">查詢中 Loading…</span></div>
    <div id="results-cta"></div>
    <div id="upcoming-wrapper" style="display:none;">
        <div class="upcoming-label">Upcoming Classes · 即將到來的課程</div>
        <div id="upcoming-sessions-container"></div>
        <hr class="section-divider">
    </div>
    <div id="schedule-list-wrapper" style="display:none;">
        <div class="toggle-bar" onclick="toggleScheduleList()">
            <span>即將課程清單 · Upcoming Course List</span>
            <span class="toggle-chevron" id="toggle-icon">▾</span>
        </div>
        <div id="schedule-list-details"></div>
        <hr class="section-divider">
    </div>
    <div id="calendarContainer"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxrSJS4dGWmG_GHpginXD_Nl-R8KaZq-6NHRtBjT8_Q4TWz0pp4yinVaMKibdf-Vz1ELg/exec";

    // ── Student colour palette ──────────────────────────────────────────────
    // Males: blue family  |  Females: pink/rose family
    // bg = light tint, border = slightly deeper, text always #1a1a1a, muted = rgba
    const PALETTE = {
        male: [
            { bg: '#dbeafe', border: '#93c5fd' }, // sky blue
            { bg: '#e0f2fe', border: '#7dd3fc' }, // light cyan-blue
            { bg: '#ede9fe', border: '#a5b4fc' }, // soft indigo
            { bg: '#ddf4ff', border: '#80caff' }, // pale azure
        ],
        female: [
            { bg: '#fce7f3', border: '#f9a8d4' }, // rose pink
            { bg: '#fef3c7', border: '#fcd34d' }, // soft peach-gold
            { bg: '#ffe4e6', border: '#fda4af' }, // blush
            { bg: '#f0fdf4', border: '#86efac' }, // mint (for variety)
        ],
    };

    const STUDENTS = [
        { display: "Eason 新營高中", search: "Eason",     gender: "male"   },
        { display: "Kenny",          search: "Kenny",     gender: "male"   },
        { display: "Stephanie",      search: "Stephanie", gender: "female" },
        { display: "Cheng",          search: "Cheng",     gender: "male"   },
        { display: "Winnie",         search: "Winnie",    gender: "female" },
        { display: "Cindy",          search: "Cindy",     gender: "female" },
        { display: "Kai",            search: "Kai",       gender: "male"   },
        { display: "Charlotte",      search: "Charlotte", gender: "female" },
    ];

    // Assign palette colours round-robin within each gender
    (function assignColors() {
        let mi = 0, fi = 0;
        STUDENTS.forEach(s => {
            if (s.gender === 'male') {
                s.color = PALETTE.male[mi % PALETTE.male.length]; mi++;
            } else {
                s.color = PALETTE.female[fi % PALETTE.female.length]; fi++;
            }
        });
    })();

    const weekdaysEn = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const weekdaysZh = ["日","一","二","三","四","五","六"];
    const monthsEn   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const monthsZh   = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

    let activeBtn     = null;
    let activeStudent = null;

    /* ── helpers ── */
    function formatTime(d) {
        let h = d.getHours(), m = d.getMinutes().toString().padStart(2,'0');
        const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
        return `${h}:${m} ${ap}`;
    }
    function formatShortTime(d) {
        let h = d.getHours(), m = d.getMinutes();
        const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
        return m === 0 ? `${h}${ap}` : `${h}:${m.toString().padStart(2,'0')}${ap}`;
    }

    /* ── Apply student colour to CSS vars ── */
    function applyColor(student) {
        const c = student ? student.color : { bg: 'transparent', border: 'transparent' };
        const r = document.documentElement;
        r.style.setProperty('--sc-bg',    c.bg);
        r.style.setProperty('--sc-border', c.border);
        r.style.setProperty('--sc-text',   '#1a1a1a');
        r.style.setProperty('--sc-muted',  'rgba(0,0,0,0.45)');
    }

    /* ── Build name buttons ── */
    function buildNameGrid() {
        const grid = document.getElementById('name-grid');
        STUDENTS.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'name-btn';
            btn.innerHTML = `<span class="avatar">${s.display[0].toUpperCase()}</span>${s.display}`;
            btn.addEventListener('click', () => selectStudent(s, btn));
            grid.appendChild(btn);
        });
        const x = document.createElement('button');
        x.id = 'clear-btn'; x.textContent = '×'; x.title = '切換學生';
        x.addEventListener('click', clearSelection);
        grid.appendChild(x);
    }

    function selectStudent(student, btn) {
        if (activeBtn) activeBtn.classList.remove('active');
        btn.classList.add('active');
        activeBtn = btn; activeStudent = student;
        document.querySelectorAll('#name-grid .name-btn').forEach(b => {
            b.style.display = b === btn ? '' : 'none';
        });
        document.getElementById('clear-btn').style.display = 'flex';
        document.getElementById('name-grid-label').style.opacity = '0.45';
        searchSchedule(student);
    }

    function clearSelection() {
        if (activeBtn) activeBtn.classList.remove('active');
        activeBtn = null; activeStudent = null;
        applyColor(null);
        document.querySelectorAll('#name-grid .name-btn').forEach(b => b.style.display = '');
        document.getElementById('clear-btn').style.display = 'none';
        document.getElementById('name-grid-label').style.opacity = '1';
        hideStatus();
        document.getElementById('results-cta').innerHTML = '';
        document.getElementById('upcoming-wrapper').style.display = 'none';
        document.getElementById('schedule-list-wrapper').style.display = 'none';
        document.getElementById('upcoming-sessions-container').innerHTML = '';
        document.getElementById('schedule-list-details').innerHTML = '';
        buildCalendars([], false);
    }

    /* ── Date header ── */
    function setDateHeader() {
        const t = new Date();
        document.getElementById('current-date-header').textContent =
            `${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,'0')}.${String(t.getDate()).padStart(2,'0')} ${weekdaysEn[t.getDay()]}`;
    }

    /* ── Toggle list ── */
    function toggleScheduleList() {
        const d = document.getElementById('schedule-list-details');
        const ic = document.getElementById('toggle-icon');
        const open = d.style.display === 'block';
        d.style.display = open ? 'none' : 'block';
        ic.classList.toggle('open', !open);
    }

    /* ── Status ── */
    function showStatus(msg) {
        document.getElementById('status-text').textContent = msg;
        document.getElementById('status-banner').classList.add('visible');
    }
    function hideStatus() { document.getElementById('status-banner').classList.remove('visible'); }

    /* ── Main search ── */
    async function searchSchedule(student) {
        const nameLower = student.search.toLowerCase();
        hideStatus();
        document.getElementById('results-cta').innerHTML = '';
        document.getElementById('upcoming-wrapper').style.display = 'none';
        document.getElementById('schedule-list-wrapper').style.display = 'none';
        document.getElementById('upcoming-sessions-container').innerHTML = '';
        document.getElementById('schedule-list-details').innerHTML = '';
        buildCalendars([], false);
        showStatus(`查詢中 Loading ${student.display}…`);

        try {
            const resp = await fetch(`${GAS_URL}?action=getSchedule&name=${encodeURIComponent(student.search)}`);
            const raw  = await resp.json();
            if (raw.error) throw new Error(raw.error);

            let data = [];
            if (Array.isArray(raw)) {
                if (nameLower === 'eason') {
                    data = raw.filter(ev => {
                        if (!ev.title) return false;
                        const t = ev.title.toLowerCase();
                        return t.includes('eason') && !t.includes('cheng') && t.includes('english class');
                    });
                } else {
                    data = raw.filter(ev => {
                        if (!ev.title) return false;
                        const t = ev.title.toLowerCase();
                        return t.includes(nameLower) && t.includes('english class');
                    });
                }
            }

            hideStatus();
            applyColor(student);

            if (data.length === 0) { showNoClasses(student); buildCalendars([], true); return; }

            const now   = new Date();
            const limit = new Date(); limit.setDate(now.getDate() + 60);
            const upcoming = data
                .filter(ev => new Date(ev.start) >= now && new Date(ev.start) <= limit)
                .sort((a,b) => new Date(a.start) - new Date(b.start));

            if (upcoming.length === 0) { showNoUpcoming(student); }
            else { buildUpcomingSessions(upcoming); buildScheduleList(upcoming); }
            buildCalendars(data, true);

        } catch(err) {
            hideStatus();
            document.getElementById('results-cta').innerHTML =
                `<div class="cta-box"><div class="cta-title">查詢失敗 Error</div><div class="cta-sub">${err.message}</div></div>`;
        }
    }

    function showNoClasses(s) {
        document.getElementById('results-cta').innerHTML = `
            <div class="cta-box">
                <div class="cta-title">找不到課表 · No Schedule Found</div>
                <div class="cta-sub">找不到 ${s.display} 的課程資料</div>
                <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="btn-line">LINE 諮詢</a>
            </div>`;
    }
    function showNoUpcoming(s) {
        document.getElementById('results-cta').innerHTML = `
            <div class="cta-box">
                <div class="cta-title">目前無預約課程 · No Upcoming Classes</div>
                <div class="cta-sub">${s.display}，歡迎預約下次課程！</div>
                <a href="https://tonyonlineenglish.netlify.app/25-50mbk" target="_blank" class="btn-book">預約課程 Book Now</a>
                <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="btn-line">LINE 聯繫</a>
            </div>`;
    }

    /* ── Upcoming cards ── */
    function buildUpcomingSessions(upcoming) {
        const now = new Date();
        document.getElementById('upcoming-sessions-container').innerHTML =
            upcoming.slice(0, 3).map(ev => {
                const d = new Date(ev.start);
                const isToday = d.toDateString() === now.toDateString();
                const cls = isToday ? 'session-item is-today' : 'session-item sc';
                return `<div class="${cls}">
                    <div class="session-day">${weekdaysEn[d.getDay()]}</div>
                    <div class="session-date">${d.getMonth()+1}/${d.getDate()}</div>
                    <div class="session-time">${formatShortTime(d)}</div>
                </div>`;
            }).join('');
        document.getElementById('upcoming-wrapper').style.display = 'block';
    }

    /* ── Schedule list ── */
    function buildScheduleList(upcoming) {
        const now = new Date();
        document.getElementById('schedule-list-details').innerHTML =
            upcoming.map(ev => {
                const d = new Date(ev.start);
                const isToday = d.toDateString() === now.toDateString();
                const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const dur = ev.end ? ` · ${(new Date(ev.end)-d)/60000}min` : '';
                const cls = isToday ? 'event-row today-row' : 'event-row sc';
                return `<div class="${cls}">
                    <span class="event-date">${dateStr}</span>
                    <span class="event-day">${weekdaysEn[d.getDay()]}</span>
                    <span class="event-time">${formatTime(d)}</span>
                    <span class="event-title">${ev.title || ''}${dur}</span>
                </div>`;
            }).join('');
        document.getElementById('schedule-list-wrapper').style.display = 'block';
    }

    /* ── Calendars ── */
    function buildCalendars(data, showBothMonths) {
        document.getElementById('calendarContainer').innerHTML = '';
        const now = new Date();
        buildSingleCalendar(data, new Date(now.getFullYear(), now.getMonth(), 1));
        if (showBothMonths) {
            const nextM = new Date(now.getFullYear(), now.getMonth()+1, 1);
            const hasNext = data.some(ev => {
                const d = new Date(ev.start);
                return d.getFullYear() === nextM.getFullYear() && d.getMonth() === nextM.getMonth();
            });
            if (hasNext) buildSingleCalendar(data, nextM);
        }
    }

    function buildSingleCalendar(data, displayDate) {
        const container = document.getElementById('calendarContainer');
        const now   = new Date();
        const today = new Date(); today.setHours(0,0,0,0);
        const month = displayDate.getMonth();
        const year  = displayDate.getFullYear();
        const firstDay = new Date(year, month, 1);
        const lastDay  = new Date(year, month+1, 0);

        const dailyData = {};
        data.forEach(ev => {
            const d = new Date(ev.start);
            if (d.getMonth() === month && d.getFullYear() === year) {
                const k = d.getDate();
                if (!dailyData[k]) dailyData[k] = [];
                dailyData[k].push(ev);
            }
        });

        let html = `<div class="single-calendar">`;
        html += `<div class="month-label">${monthsEn[month]} ${year} · ${monthsZh[month]}</div>`;
        html += `<div class="calendar">`;

        // Bilingual day headers: Sun 日, Mon 一, …
        weekdaysEn.forEach((en, i) => {
            const isWknd = [0,6].includes(i);
            html += `<div class="day-label${isWknd ? ' weekend-label' : ''}">
                <span class="dl-en">${en}</span>
                <span class="dl-zh">${weekdaysZh[i]}</span>
            </div>`;
        });

        for (let i = 0; i < firstDay.getDay(); i++) html += `<div class="day empty"></div>`;

        for (let d = 1; d <= lastDay.getDate(); d++) {
            const dayDate = new Date(year, month, d);
            const evs    = dailyData[d] || [];
            const hasEvs = evs.length > 0;
            const isPast  = dayDate < today;
            const isToday = dayDate.toDateString() === today.toDateString();

            const allDone = hasEvs && evs.every(ev => {
                if (!ev.end) return false;
                const endT = new Date(ev.end);
                endT.setMinutes(endT.getMinutes()+10);
                return now > endT;
            });

            let cls = 'day';
            if (isPast)                         cls += ' past-day';
            else if (isToday && hasEvs)         cls += ' today-event';
            else if (isToday)                   cls += ' today-plain';
            else if (hasEvs && evs.length >= 2) cls += ' multi-event';
            else if (hasEvs)                    cls += ' has-event';

            html += `<div class="${cls}"><span class="date-number">${d}</span>`;

            if (allDone) {
                const icons = new Set();
                evs.forEach(ev => {
                    const t = (ev.title || '').toLowerCase();
                    if (t.includes('sick'))                      icons.add('🤒');
                    else if (ev.title && ev.title.includes('❖')) icons.add('❌');
                    else if (t.includes('12h'))                  icons.add('⏱');
                    else {
                        const dur = ev.end ? (new Date(ev.end)-new Date(ev.start))/60000 : 50;
                        icons.add(dur === 25 ? '✓' : '✓✓');
                    }
                });
                html += `<div class="completed-icon">${[...icons].join('')}</div>`;
            } else if (hasEvs) {
                evs.sort((a,b) => new Date(a.start)-new Date(b.start)).forEach(ev => {
                    html += `<span class="cal-time">${formatShortTime(new Date(ev.start))}</span>`;
                });
            }
            html += `</div>`;
        }
        html += `</div></div>`;
        container.innerHTML += html;
    }

    /* ── Init ── */
    function init() { setDateHeader(); buildNameGrid(); buildCalendars([], false); }
    document.readyState === 'loading'
        ? document.addEventListener('DOMContentLoaded', init) : init();
</script>
