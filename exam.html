<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony 線上美語家教 — Quiz System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --orange: #f97316;
    --orange-dim: #7c3a0d;
    --text: #f0f0f0;
    --text-muted: #888;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  .header {
    width: 100%;
    max-width: 760px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--orange); letter-spacing: 0.03em; }
  .logo span { color: var(--text-muted); font-weight: 400; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 100%;
    max-width: 760px;
  }
  .start-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
  .start-sub { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }
  .section-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 6px 14px;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; font-weight: 500; }
  label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
  input[type=text], input[type=email] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  input:focus { border-color: var(--orange); }
  .notice {
    background: rgba(249,115,22,0.08);
    border: 1px solid rgba(249,115,22,0.25);
    border-radius: 8px;
    color: #fdba74;
    font-size: 0.83rem;
    padding: 10px 14px;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .btn {
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    padding: 12px 28px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 12px 28px;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
  .progress-wrap { margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
  .progress-track { background: var(--surface2); border-radius: 99px; height: 5px; overflow: hidden; }
  .progress-fill { background: var(--orange); height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .section-badge {
    display: inline-block;
    background: var(--orange-dim);
    color: var(--orange);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .question-block { margin-bottom: 28px; }
  .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--orange);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    min-width: 40px;
    padding: 4px 8px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text { font-size: 0.97rem; line-height: 1.65; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    gap: 10px;
    padding: 11px 14px;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .option-btn:hover { border-color: var(--orange); background: rgba(249,115,22,0.06); }
  .option-btn.selected { border-color: var(--orange); background: rgba(249,115,22,0.12); color: #fff; }
  .opt-letter {
    background: var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    min-width: 24px;
    padding: 2px 6px;
    text-align: center;
  }
  .option-btn.selected .opt-letter { background: var(--orange); color: #fff; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .nav-info { color: var(--text-muted); font-size: 0.82rem; }
  .result-header { text-align: center; margin-bottom: 32px; }
  .score-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 4px solid var(--orange);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .score-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--orange); }
  .score-denom { font-size: 0.8rem; color: var(--text-muted); }
  .result-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  .result-sub { color: var(--text-muted); font-size: 0.88rem; }
  .wrong-section { margin-top: 24px; }
  .wrong-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--red); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .wrong-item {
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.18);
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.6;
    margin-bottom: 10px;
    padding: 12px 14px;
  }
  .wrong-item .wi-q { color: var(--text-muted); margin-bottom: 4px; }
  .wrong-item .wi-yours { color: var(--red); }
  .wrong-item .wi-correct { color: var(--green); }
  .status-msg {
    border-radius: 8px;
    font-size: 0.88rem;
    margin-top: 16px;
    padding: 10px 14px;
    display: none;
  }
  .status-msg.success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); color: #86efac; display: block; }
  .status-msg.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; display: block; }
  .status-msg.loading { background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.2); color: #fdba74; display: block; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Tony <span>線上美語家教</span></div>
</div>

<!-- START SCREEN -->
<div class="card" id="startScreen">
  <div class="start-title">English Quiz System</div>
  <p class="start-sub">Choose which exam section(s) to take, enter your name, and begin.</p>
  <div style="margin-bottom:20px">
    <label style="margin-bottom:10px;display:block;font-size:0.9rem;color:var(--text)">Select Exam Section</label>
    <div class="section-tabs">
      <button class="tab-btn active" data-section="vocab">Vocabulary &amp; Phrases (100 Qs)</button>
      <button class="tab-btn" data-section="grammar">Grammar Focus (50 Qs)</button>
      <button class="tab-btn" data-section="both">Both Sections (150 Qs)</button>
    </div>
  </div>
  <label for="studentName">Student Name <span style="color:var(--red)">*</span></label>
  <input type="text" id="studentName" placeholder="e.g. William">
  <label for="studentEmail">Email (optional)</label>
  <input type="email" id="studentEmail" placeholder="student@example.com">
  <div class="notice">&#128231; If you provide an email, you will receive a copy of your results automatically.</div>
  <button class="btn" onclick="startQuiz()">Start Quiz &#8594;</button>
  <div id="startError" style="color:var(--red);font-size:0.85rem;margin-top:10px;display:none">Please enter your name to continue.</div>
</div>

<!-- QUIZ SCREEN -->
<div class="card hidden" id="quizScreen">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">Page 1 of 20</span>
      <span id="answeredCount">0 / 100 answered</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="section-badge" id="sectionBadge">Vocabulary &amp; Phrases</div>
  <div id="questionsContainer"></div>
  <hr class="divider">
  <div class="nav-row">
    <button class="btn-ghost" id="btnBack" onclick="changePage(-1)">&#8592; Back</button>
    <span class="nav-info" id="navInfo"></span>
    <button class="btn" id="btnNext" onclick="changePage(1)">Next &#8594;</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="card hidden" id="resultScreen">
  <div class="result-header">
    <div class="score-ring">
      <span class="score-num" id="scoreNum">&#8212;</span>
      <span class="score-denom" id="scoreDenom">/ 100</span>
    </div>
    <div class="result-name" id="resultName"></div>
    <div class="result-sub" id="resultSub"></div>
  </div>
  <div class="wrong-section" id="wrongSection"></div>
  <div id="submitStatus" class="status-msg"></div>
  <div style="margin-top:20px">
    <button class="btn" onclick="location.reload()">Take Again</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzErryf4UOZ5nmOv7Y1HlNlq_dp7srIWrzdbFHasYHw6EOJliHP15EO4mSYfW5d1Lzf/exec";

const vocabQuestions = [
  {id:1,section:"Vocabulary & Phrases",q:"The two politicians refused to reach an agreement and continued to ________ the issue of capital punishment in front of a live audience.",opts:["surrender","debate","devour","worship"],ans:"B"},
  {id:2,section:"Vocabulary & Phrases",q:"The judge declared that the ________ for committing such a violent crime would be life imprisonment without the possibility of parole.",opts:["rumor","guilt","penalty","companion"],ans:"C"},
  {id:3,section:"Vocabulary & Phrases",q:"After ten years behind bars, the ________ was finally released after new evidence proved he had been wrongly convicted.",opts:["resident","prisoner","companion","murderer"],ans:"B"},
  {id:4,section:"Vocabulary & Phrases",q:"The activist ________ that the policy violated basic human rights, but the government refused to listen to her argument.",opts:["claimed","relieved","preserved","transported"],ans:"A"},
  {id:5,section:"Vocabulary & Phrases",q:"Despite heavy opposition from local residents, the city council continued to ________ that the new highway was necessary for economic development.",opts:["abandon","insist","drown","acquire"],ans:"B"},
  {id:6,section:"Vocabulary & Phrases",q:"The elderly couple had accumulated a great deal of ________, including several buildings in the city center and a large plot of farmland.",opts:["mission","property","volume","session"],ans:"B"},
  {id:7,section:"Vocabulary & Phrases",q:"The young scholar's loyal ________ traveled with him across three continents, sharing both hardship and discovery throughout the long journey.",opts:["prisoner","murderer","companion","resident"],ans:"C"},
  {id:8,section:"Vocabulary & Phrases",q:"After weeks of stress, the therapist helped her address the ________ strain caused by years of overwork and emotional neglect.",opts:["arched","solar","muddy","mental"],ans:"D"},
  {id:9,section:"Vocabulary & Phrases",q:"The hungry child ________ the entire bowl of rice within minutes, as if she had not eaten a proper meal for several days.",opts:["abandoned","devoured","resisted","surrendered"],ans:"B"},
  {id:10,section:"Vocabulary & Phrases",q:"The researcher published a multi-________ study on the history of urbanization, which took her more than a decade to complete.",opts:["panel","session","volume","mission"],ans:"C"},
  {id:11,section:"Vocabulary & Phrases",q:"Living abroad for two years allowed her to ________ a level of fluency in French that formal classroom instruction had never provided.",opts:["acquire","abandon","preserve","flood"],ans:"A"},
  {id:12,section:"Vocabulary & Phrases",q:"The professor offered ________ insights into the relationship between poverty and crime that challenged many commonly held assumptions.",opts:["vain","sufficient","profound","muddy"],ans:"C"},
  {id:13,section:"Vocabulary & Phrases",q:"The old merchant was extremely ________, owning dozens of ships and warehouses filled with goods imported from across the globe.",opts:["resistant","urgent","practical","wealthy"],ans:"D"},
  {id:14,section:"Vocabulary & Phrases",q:"The detective was filled with ________ when she realized that an innocent man had been imprisoned because of a false testimony she had once believed.",opts:["abundance","urgency","guilt","relief"],ans:"C"},
  {id:15,section:"Vocabulary & Phrases",q:"The press spread an unfounded ________ that the CEO had resigned, which caused the company's stock price to plummet within hours.",opts:["penalty","rumor","claim","mission"],ans:"B"},
  {id:16,section:"Vocabulary & Phrases",q:"The soldiers moved ________ across the field, carrying supplies in one direction while evacuating the wounded in the other.",opts:["around the clock","by no means","back and forth","at a time"],ans:"C"},
  {id:17,section:"Vocabulary & Phrases",q:"The rescue teams worked ________ without any rest to search for survivors buried beneath the rubble after the devastating earthquake.",opts:["in the end","at a time","around the clock","all in all"],ans:"C"},
  {id:18,section:"Vocabulary & Phrases",q:"It never ________ her that the documents she had signed might be used against her in a court of law.",opts:["crossed her mind","wore on","made waves","struck a balance"],ans:"A"},
  {id:19,section:"Vocabulary & Phrases",q:"The weeks ________ slowly as the family waited anxiously for news about their missing son from the search and rescue team.",opts:["wore on","made waves","cleared out","rose above"],ans:"A"},
  {id:20,section:"Vocabulary & Phrases",q:"The scientist's groundbreaking research into cancer treatment really ________ in the medical community, drawing both praise and heated criticism from experts worldwide.",opts:["wore on","made waves","depended on","made way"],ans:"B"},
  {id:21,section:"Vocabulary & Phrases",q:"Achieving success in business is ________ easy; it demands persistence, strategic thinking, and a willingness to face repeated failure.",opts:["indeed","by no means","at a time","all in all"],ans:"B"},
  {id:22,section:"Vocabulary & Phrases",q:"The heavy rain caused severe ________ in low-lying areas, forcing thousands of residents to evacuate their homes immediately.",opts:["resistance","flooding","imprisonment","urgency"],ans:"B"},
  {id:23,section:"Vocabulary & Phrases",q:"The company decided to ________ solar panels on the rooftops of all its factories to significantly reduce its dependence on fossil fuels.",opts:["transport","resist","install","conclude"],ans:"C"},
  {id:24,section:"Vocabulary & Phrases",q:"The students gathered in a study ________ every Friday afternoon to review vocabulary and prepare for their upcoming national exam.",opts:["panel","session","mission","volume"],ans:"B"},
  {id:25,section:"Vocabulary & Phrases",q:"The city council issued a new ________ warning about the dangers of poor sanitation in densely populated neighborhoods during the summer months.",opts:["nutrition","hygiene","productivity","finance"],ans:"B"},
  {id:26,section:"Vocabulary & Phrases",q:"Some varieties of bacteria have become ________ to common antibiotics, making it increasingly difficult for doctors to treat certain infections.",opts:["practical","sufficient","resistant","abundant"],ans:"C"},
  {id:27,section:"Vocabulary & Phrases",q:"The factory's ________ dropped sharply after several key workers resigned, and management scrambled to recruit qualified replacements.",opts:["acquisition","productivity","resistance","preservation"],ans:"B"},
  {id:28,section:"Vocabulary & Phrases",q:"The funding provided by the government was not ________ to cover the enormous costs of rebuilding the infrastructure damaged by the typhoon.",opts:["urgent","sufficient","promising","geographical"],ans:"B"},
  {id:29,section:"Vocabulary & Phrases",q:"The family's monthly ________ from the small farm was barely enough to pay for food, school fees, and essential medical care.",opts:["wealth","income","abundance","guilt"],ans:"B"},
  {id:30,section:"Vocabulary & Phrases",q:"Running a business in a remote location involves a high ________ of failure due to limited access to markets, poor infrastructure, and shortage of skilled workers.",opts:["barrier","risk","mission","campaign"],ans:"B"},
  {id:31,section:"Vocabulary & Phrases",q:"The mountain range formed a natural ________ between the two countries, making trade and communication extremely difficult for centuries.",opts:["barrier","panel","arch","session"],ans:"A"},
  {id:32,section:"Vocabulary & Phrases",q:"The government launched a nationwide ________ to promote awareness about the importance of recycling and reducing plastic waste in daily life.",opts:["rumor","campaign","issue","mission"],ans:"B"},
  {id:33,section:"Vocabulary & Phrases",q:"After examining all the evidence carefully, the jury was able to ________ that the defendant had acted with full knowledge and premeditation.",opts:["resist","conclude","spare","relieve"],ans:"B"},
  {id:34,section:"Vocabulary & Phrases",q:"The town is ________ at the foot of a steep mountain, making it a popular destination for hikers and nature lovers during the spring season.",opts:["arched","situated","muddy","fond"],ans:"B"},
  {id:35,section:"Vocabulary & Phrases",q:"The medication successfully ________ the patient's chronic back pain, allowing her to resume daily activities that she had given up years ago.",opts:["relieved","resisted","acquired","preserved"],ans:"A"},
  {id:36,section:"Vocabulary & Phrases",q:"The government was under pressure to address the ________ housing shortage in urban centers before more families were forced to live in poverty.",opts:["sufficient","intentional","severe","promising"],ans:"C"},
  {id:37,section:"Vocabulary & Phrases",q:"The volunteers spent the weekend helping ________ old documents from the flooded archive so that future generations could still access them.",opts:["endanger","preserve","transport","project"],ans:"B"},
  {id:38,section:"Vocabulary & Phrases",q:"The exhibit offered visitors a rare ________ into the daily life of ancient civilizations, with artifacts carefully arranged to tell a vivid human story.",opts:["glimpse","campaign","panel","arch"],ans:"A"},
  {id:39,section:"Vocabulary & Phrases",q:"Growing up in two different cultures gave her a complex sense of ________ that she struggled to define even as an adult living abroad.",opts:["identity","abundance","resistance","urgency"],ans:"A"},
  {id:40,section:"Vocabulary & Phrases",q:"The museum's collection contained countless ________ from past dynasties, including golden crowns, ceremonial swords, and rare painted scrolls.",opts:["residents","treasures","barriers","companions"],ans:"B"},
  {id:41,section:"Vocabulary & Phrases",q:"The city decided to ________ the aging bus fleet with modern electric vehicles to reduce air pollution and improve public transportation efficiency.",opts:["endanger","replace","abandon","situate"],ans:"B"},
  {id:42,section:"Vocabulary & Phrases",q:"Unregulated development along the coastline could seriously ________ the habitats of rare sea turtles that have nested there for thousands of years.",opts:["endanger","transport","spare","project"],ans:"A"},
  {id:43,section:"Vocabulary & Phrases",q:"The forest offered an ________ of wild herbs, rare mushrooms, and medicinal plants that local communities had relied on for generations.",opts:["urgency","abundance","glimpse","mission"],ans:"B"},
  {id:44,section:"Vocabulary & Phrases",q:"Goods are ________ by ship from the southern port to warehouses along the northern coast, a journey that typically takes four to five days.",opts:["concluded","surrendered","transported","endangered"],ans:"C"},
  {id:45,section:"Vocabulary & Phrases",q:"The floodwaters ________ the entire lower floor of the community center, destroying furniture, records, and equipment that had been stored there.",opts:["drowned","flooded","spared","projected"],ans:"B"},
  {id:46,section:"Vocabulary & Phrases",q:"The government's quick action in distributing food aid ________ many rural families from experiencing the worst effects of the prolonged drought.",opts:["spared","claimed","projected","resisted"],ans:"A"},
  {id:47,section:"Vocabulary & Phrases",q:"The ancient jade sculpture was considered ________ by collectors worldwide, as it represented a unique artistic achievement that could never be reproduced.",opts:["promising","priceless","sufficient","urgent"],ans:"B"},
  {id:48,section:"Vocabulary & Phrases",q:"The long-awaited news that the surgery had been successful brought enormous ________ to the patient's family who had been waiting anxiously outside the operating room.",opts:["disgust","guilt","relief","identity"],ans:"C"},
  {id:49,section:"Vocabulary & Phrases",q:"The rapid development of the downtown area has attracted many new ________, transforming what was once a quiet neighborhood into a busy commercial district.",opts:["prisoners","residents","murderers","companions"],ans:"B"},
  {id:50,section:"Vocabulary & Phrases",q:"Addressing the climate crisis is ________ and requires immediate cooperation among all nations, regardless of their economic or political differences.",opts:["practical","urgent","abundant","intentional"],ans:"B"},
  {id:51,section:"Vocabulary & Phrases",q:"The young diplomat was assigned an ________ mission to negotiate peace between two nations that had been at war for more than two decades.",opts:["enormous","muddy","arched","vain"],ans:"A"},
  {id:52,section:"Vocabulary & Phrases",q:"She had ________ memories of the long summers spent at her grandmother's house, where the smell of baked bread filled the entire cottage every morning.",opts:["guilty","resistant","fond","urban"],ans:"C"},
  {id:53,section:"Vocabulary & Phrases",q:"The policy team recommended that the city ________ a careful balance between economic growth and the protection of green spaces for public wellbeing.",opts:["make waves","make way","strike a balance","rise above"],ans:"C"},
  {id:54,section:"Vocabulary & Phrases",q:"The old warehouse was ________ to ________ for a new community park and playground that local families had been requesting for years.",opts:["cleared out / make way","worn on / depend on","risen above / make waves","struck a balance / clear out"],ans:"A"},
  {id:55,section:"Vocabulary & Phrases",q:"Whether the project will succeed or fail entirely ________ how effectively the team manages its limited budget and human resources over the next six months.",opts:["depends on","rises above","wears on","makes way for"],ans:"A"},
  {id:56,section:"Vocabulary & Phrases",q:"Despite losing his job and his savings, he managed to ________ the hardship and rebuild his life through sheer determination and the support of his family.",opts:["depend on","rise above","make waves","clear out"],ans:"B"},
  {id:57,section:"Vocabulary & Phrases",q:"The mayor asked residents to donate their old furniture and belongings, which would be ________ to make room for emergency shelter units during the flood crisis.",opts:["cleared out","struck a balance","risen above","worn on"],ans:"A"},
  {id:58,section:"Vocabulary & Phrases",q:"The ________ of the new bridge resting over the river gave the city skyline an elegant and historic feel that tourists frequently stopped to photograph.",opts:["panel","arch","session","mission"],ans:"B"},
  {id:59,section:"Vocabulary & Phrases",q:"The engineer ________ the blueprints onto the white wall so that the entire construction team could review and discuss the building plan together.",opts:["installed","projected","concluded","issued"],ans:"B"},
  {id:60,section:"Vocabulary & Phrases",q:"The government ________ new guidelines on food labeling so that consumers could more easily identify products that meet basic nutritional standards.",opts:["abandoned","drowned","issued","treasured"],ans:"C"},

  {id:62,section:"Vocabulary & Phrases",q:"The farmer's hard work throughout the growing season finally resulted in the ________ of a successful harvest that fed the entire village through the winter.",opts:["the fruit of","in the end","all in all","by no means"],ans:"A"},

  {id:67,section:"Vocabulary & Phrases",q:"________, the program was considered a success, even though it faced significant financial challenges and delays in its early stages of implementation.",opts:["Back and forth","All in all","Around the clock","In need of"],ans:"B"},

let activeQuestions = [];
let answers = {};
let currentPage = 0;
const PAGE_SIZE = 5;
let studentName = "";
let studentEmail = "";
let selectedSection = "vocab";

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedSection = btn.dataset.section;
  });
});

function startQuiz() {
  studentName = document.getElementById("studentName").value.trim();
  if (!studentName) { document.getElementById("startError").style.display = "block"; return; }
  document.getElementById("startError").style.display = "none";
  studentEmail = document.getElementById("studentEmail").value.trim();
  if (selectedSection === "vocab") activeQuestions = [...vocabQuestions];
  else if (selectedSection === "grammar") activeQuestions = [...grammarQuestions];
  else activeQuestions = [...vocabQuestions, ...grammarQuestions];
  answers = {};
  currentPage = 0;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderPage();
}

function renderPage() {
  const total = activeQuestions.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = currentPage * PAGE_SIZE;
  const pageQs = activeQuestions.slice(start, start + PAGE_SIZE);
  const answered = Object.keys(answers).length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = "Page " + (currentPage + 1) + " of " + totalPages;
  document.getElementById("answeredCount").textContent = answered + " / " + total + " answered";
  document.getElementById("sectionBadge").textContent = pageQs[0] ? pageQs[0].section : "";
  document.getElementById("btnBack").style.visibility = currentPage === 0 ? "hidden" : "visible";
  const isLast = currentPage === totalPages - 1;
  const btnNext = document.getElementById("btnNext");
  btnNext.textContent = isLast ? "Submit \u2713" : "Next \u2192";
  btnNext.onclick = isLast ? submitQuiz : function(){ changePage(1); };
  document.getElementById("navInfo").textContent = (start + 1) + "\u2013" + Math.min(start + PAGE_SIZE, total) + " / " + total;
  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";
  pageQs.forEach(function(q, i) {
    const div = document.createElement("div");
    div.className = "question-block";
    const letters = ["A","B","C","D"];
    let optsHtml = q.opts.map(function(opt, oi) {
      const sel = answers[q.id] === letters[oi] ? " selected" : "";
      return '<button class="option-btn' + sel + '" onclick="selectAnswer(' + q.id + ',\'' + letters[oi] + '\',this)">' +
        '<span class="opt-letter">' + letters[oi] + '</span><span>' + opt + '</span></button>';
    }).join("");
    div.innerHTML = '<div class="q-header"><div class="q-num">' + q.id + '</div><div class="q-text">' + q.q + '</div></div>' +
      '<div class="options">' + optsHtml + '</div>' +
      (i < pageQs.length - 1 ? '<hr class="divider">' : "");
    container.appendChild(div);
  });
  window.scrollTo({top:0,behavior:"smooth"});
}

function selectAnswer(qid, letter, btn) {
  answers[qid] = letter;
  const opts = btn.closest(".options").querySelectorAll(".option-btn");
  opts.forEach(function(b){ b.classList.remove("selected"); });
  btn.classList.add("selected");
  const total = activeQuestions.length;
  const answered = Object.keys(answers).length;
  document.getElementById("progressFill").style.width = Math.round((answered/total)*100) + "%";
  document.getElementById("answeredCount").textContent = answered + " / " + total + " answered";
}

function changePage(dir) {
  const totalPages = Math.ceil(activeQuestions.length / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
  renderPage();
}

function submitQuiz() {
  const unanswered = activeQuestions.filter(function(q){ return !answers[q.id]; });
  if (unanswered.length > 0) {
    if (!confirm("You have " + unanswered.length + " unanswered question(s). Submit anyway?")) return;
  }
  let correct = 0;
  const wrongList = [];
  const letters = ["A","B","C","D"];
  activeQuestions.forEach(function(q) {
    const given = answers[q.id] || "—";
    if (given === q.ans) { correct++; }
    else {
      wrongList.push({
        id: q.id,
        section: q.section,
        question: q.q,
        yourAnswer: given === "—" ? "Not answered" : given + ": " + (letters.indexOf(given) >= 0 ? q.opts[letters.indexOf(given)] : ""),
        correct: q.ans + ": " + q.opts[letters.indexOf(q.ans)]
      });
    }
  });
  const total = activeQuestions.length;
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  document.getElementById("scoreNum").textContent = correct;
  document.getElementById("scoreDenom").textContent = "/ " + total;
  document.getElementById("resultName").textContent = studentName;
  const pct = Math.round((correct/total)*100);
  document.getElementById("resultSub").textContent = "Score: " + correct + "/" + total + " (" + pct + "%) \u2014 " +
    (pct >= 80 ? "Great work! \uD83C\uDF89" : pct >= 60 ? "Keep it up! \uD83D\uDCAA" : "Review the mistakes below \uD83D\uDCDA");
  const ws = document.getElementById("wrongSection");
  if (wrongList.length === 0) {
    ws.innerHTML = '<div style="color:var(--green);font-size:0.95rem;font-weight:600">\uD83C\uDFAF Perfect score! All answers correct.</div>';
  } else {
    ws.innerHTML = '<div class="wrong-title">\u2717 Incorrect Answers (' + wrongList.length + ')</div>' +
      wrongList.map(function(w){
        return '<div class="wrong-item"><div class="wi-q"><strong>Q' + w.id + '</strong> [' + w.section + '] \u2014 ' + w.question + '</div>' +
          '<div class="wi-yours">\u2717 Your answer: ' + w.yourAnswer + '</div>' +
          '<div class="wi-correct">\u2713 Correct: ' + w.correct + '</div></div>';
      }).join("");
  }
  sendToGAS(correct, total, wrongList);
  window.scrollTo({top:0,behavior:"smooth"});
}

async function sendToGAS(correct, total, wrongList) {
  const statusEl = document.getElementById("submitStatus");
  statusEl.className = "status-msg loading";
  statusEl.textContent = "\u23F3 Sending results...";
  const payload = {
    name: studentName,
    email: studentEmail,
    score: correct + "/" + total,
    section: selectedSection,
    wrongAnswers: wrongList
  };
  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    statusEl.className = "status-msg success";
    statusEl.textContent = "\u2713 Results sent successfully!" + (studentEmail ? " A copy has been emailed to you." : "");
  } catch(err) {
    statusEl.className = "status-msg error";
    statusEl.textContent = "\u26A0 Could not send results. Please inform your teacher.";
  }
}
