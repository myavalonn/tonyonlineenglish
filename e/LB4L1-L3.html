        // 用來存放分類後的資料
        const questions = {
            vocab: [],
            phrase: []
        };

        // 狀態管理
        let currentCategory = 'vocab';
        let currentIndex = 0;

        // 解析原始資料
        function parseData() {
            // 利用分隔線將每一題切開
            const blocks = rawData.split(/-{10,}|={10,}/);
            
            blocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length === 0) return;

                // 找標題行 e.g., "Q1  ✓ B  debate"
                const headerIdx = lines.findIndex(l => /^Q\d+\s+✓/.test(l));
                if (headerIdx === -1) return;

                const headerMatch = lines[headerIdx].match(/^Q(\d+)\s+✓\s+([A-D])\s+(.+)$/);
                if (!headerMatch) return;

                const qNum = headerMatch[1];
                const ansLetter = headerMatch[2];
                const ansWord = headerMatch[3].trim();

                const engSentence = lines[headerIdx + 1];
                const chiSentence = lines[headerIdx + 2];

                // 找選項
                const optA = lines.find(l => l.startsWith('(A)'));
                const optB = lines.find(l => l.startsWith('(B)'));
                const optC = lines.find(l => l.startsWith('(C)'));
                const optD = lines.find(l => l.startsWith('(D)'));

                const options = [];
                [optA, optB, optC, optD].forEach(opt => {
                    if (opt) {
                        // 移除選項裡的打勾符號與多餘空白
                        const cleanOpt = opt.replace(/✓/g, '').trim();
                        options.push({
                            text: cleanOpt,
                            isCorrect: cleanOpt.startsWith(`(${ansLetter})`)
                        });
                    }
                });

                // 自動分類邏輯：若答案包含「空白」或「斜線」(如 back and forth, make way)，則歸類為語法片語
                const isPhrase = ansWord.includes(' ') || ansWord.includes('/');
                const category = isPhrase ? 'phrase' : 'vocab';

                questions[category].push({
                    qNum: `Q${qNum}`,
                    ansLetter,
                    ansWord,
                    engSentence,
                    chiSentence,
                    options
                });
            });
        }

        // 初始化選單
        function initSelect() {
            const select = document.getElementById('q-select');
            select.innerHTML = '';
            
            const list = questions[currentCategory];
            list.forEach((q, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${q.qNum} (${q.ansWord})`;
                select.appendChild(option);
            });
            
            select.value = currentIndex;
        }

        // 渲染題目
        function renderQuestion() {
            const list = questions[currentCategory];
            if (list.length === 0) return;

            const q = list[currentIndex];

            // 更新內容
            document.getElementById('q-number').textContent = `${q.qNum} 正確答案：${q.ansLetter}`;
            document.getElementById('q-english').textContent = q.engSentence;
            document.getElementById('q-chinese').textContent = q.chiSentence;

            // 渲染選項
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = `option ${opt.isCorrect ? 'correct' : ''}`;
                div.textContent = opt.text;
                optsContainer.appendChild(div);
            });

            // 更新下拉選單狀態
            document.getElementById('q-select').value = currentIndex;

            // 更新按鈕狀態
            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            document.getElementById('btn-next').disabled = (currentIndex === list.length - 1);
        }

        // 切換類別 (單字 / 語法)
        function switchCategory(category) {
            currentCategory = category;
            currentIndex = 0; // 重置回第一題

            // 處理標籤樣式
            document.getElementById('tab-vocab').classList.remove('active');
            document.getElementById('tab-phrase').classList.remove('active');
            document.getElementById(`tab-${category}`).classList.add('active');

            initSelect();
            renderQuestion();
        }

        // 下一題
        function nextQuestion() {
            if (currentIndex < questions[currentCategory].length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        // 上一題
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // 透過選單跳轉
        function jumpToQuestion() {
            const select = document.getElementById('q-select');
            currentIndex = parseInt(select.value, 10);
            renderQuestion();
        }

        // 網頁載入時執行
        window.onload = () => {
            parseData();
            initSelect();
            renderQuestion();
        };

        // 支援鍵盤左右鍵切換
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft') prevQuestion();
        });
    </script>
