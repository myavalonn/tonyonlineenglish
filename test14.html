<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教 - 雙場景聯名更新</title>
    
    <!-- 引入中文字體與AI科技感英文字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-orange: #FF6B00;
            --light-orange: #FFA94D;
            --ai-gray: #475569;
            --bg-white: #ffffff;
        }

        body {
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }

        /* 9:16 手機版框架 */
        .mobile-frame {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 9 / 16;
            background-color: var(--bg-white);
            box-shadow: 0 25px 50px -12px rgba(255, 107, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 讓文字內容靠下 */
            padding: 2.5rem 2rem;
            z-index: 1;
        }

        /* --- AI 科技感白色背景 --- */
        .ai-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--light-orange) 1.5px, transparent 1.5px);
            background-size: 24px 24px; opacity: 0.15; z-index: -2;
        }

        .glow-orb {
            position: absolute; border-radius: 50%; filter: blur(70px); z-index: -1;
            animation: pulseOrb 6s infinite alternate ease-in-out;
        }
        .orb-top { width: 250px; height: 250px; background: rgba(255, 107, 0, 0.15); top: -50px; right: -80px; }
        .orb-bottom { width: 300px; height: 300px; background: rgba(255, 169, 77, 0.15); bottom: -50px; left: -80px; animation-delay: -3s; }

        .scanner-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-orange), transparent);
            box-shadow: 0 0 10px var(--primary-orange); opacity: 0.5;
            animation: scanAI 3s infinite linear;
        }

        /* --- 場景 1 & 轉場 動畫設定 (Intro Sequence) --- */
        
        /* 基礎頭像外框 */
        .avatar-box {
            position: absolute;
            width: 160px; height: 160px;
            padding: 6px;
            z-index: 20;
        }

        .avatar-box img {
            width: 100%; height: 100%; object-fit: cover;
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            background-color: #fff; box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
        }

        /* HUD 科技角框 */
        .avatar-box::before, .avatar-box::after {
            content: ''; position: absolute; width: 20px; height: 20px; border: 3px solid var(--primary-orange);
        }
        .avatar-box::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .avatar-box::after { bottom: 0; right: 0; border-left: none; border-top: none; }

        /* 頭像 1 (上方 ➔ 縮小至左上) */
        .avatar-1 {
            animation: sceneTransition1 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes sceneTransition1 {
            0%   { opacity: 0; top: 22%; left: 50%; transform: translate(-50%, -50%) scale(0.3); }
            12%  { opacity: 1; top: 22%; left: 50%; transform: translate(-50%, -50%) scale(1.1); }
            16%  { opacity: 1; top: 22%; left: 50%; transform: translate(-50%, -50%) scale(1); }
            70%  { opacity: 1; top: 22%; left: 50%; transform: translate(-50%, -50%) scale(1); } /* 停留 Scene 1 */
            100% { opacity: 1; top: 15%; left: 22%; transform: translate(-50%, -50%) scale(0.5); } /* 移動到 Scene 2 */
        }

        /* 中間發光的 X (中間 ➔ 縮小至中上) */
        .cross-mark {
            position: absolute;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 900; color: var(--primary-orange);
            z-index: 20;
            animation: sceneTransitionX 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes sceneTransitionX {
            0%, 17% { opacity: 0; top: 50%; left: 50%; font-size: 5.5rem; transform: translate(-50%, -50%) scale(0) rotate(-90deg); }
            25% { opacity: 1; top: 50%; left: 50%; font-size: 5.5rem; transform: translate(-50%, -50%) scale(1.2) rotate(10deg); text-shadow: 0 0 35px orange; }
            29% { opacity: 1; top: 50%; left: 50%; font-size: 5.5rem; transform: translate(-50%, -50%) scale(1) rotate(0deg); text-shadow: 0 0 15px rgba(255,107,0,0.6); }
            70% { opacity: 1; top: 50%; left: 50%; font-size: 5.5rem; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            100% { opacity: 1; top: 15%; left: 50%; font-size: 5.5rem; transform: translate(-50%, -50%) scale(0.4) rotate(0deg); text-shadow: 0 0 10px rgba(255,107,0,0.4); }
        }

        /* 頭像 2 (下方 ➔ 縮小至右上) */
        .avatar-2 {
            animation: sceneTransition2 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes sceneTransition2 {
            0%, 35% { opacity: 0; top: 78%; left: 50%; transform: translate(-50%, -50%) scale(0.3); }
            43% { opacity: 1; top: 78%; left: 50%; transform: translate(-50%, -50%) scale(1.1); }
            47% { opacity: 1; top: 78%; left: 50%; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; top: 78%; left: 50%; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; top: 15%; left: 78%; transform: translate(-50%, -50%) scale(0.5); }
        }


        /* --- 場景 2：主要文字內容 (等場景 1 結束才飛入) --- */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 130px; /* 避開 Scene 2 上方的縮小頭像 */
        }

        .en-text { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 2px; color: var(--primary-orange); display: block; }

        /* 品牌區塊 (4.2秒後飛入) */
        .brand-section {
            opacity: 0; transform: translateX(-30px);
            animation: flyInLeft 1.2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards 4.2s;
        }
        .brand-zh { font-size: 1.8rem; font-weight: 900; color: var(--ai-gray); line-height: 1.2; }
        .brand-zh span { color: var(--primary-orange); }
        .brand-en { font-size: 0.9rem; font-weight: 700; margin-top: 4px; }

        /* 更新標題 (4.6秒後飛入) */
        .update-section {
            opacity: 0; transform: translateX(30px); text-align: right; border-right: 4px solid var(--primary-orange); padding-right: 15px;
            animation: flyInRight 1.2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards 4.6s;
        }
        .update-zh { font-size: 2.2rem; font-weight: 900; color: #0f172a; line-height: 1.2; }
        .update-en { font-size: 0.95rem; font-weight: 700; margin-top: 5px; }

        /* 功能框 (5.0秒後飛入) */
        .feature-box {
            position: relative; background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 107, 0, 0.3);
            backdrop-filter: blur(10px); padding: 1.8rem 1rem; text-align: center; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.1); opacity: 0; transform: translateY(30px);
            animation: flyInUp 1.2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards 5.0s;
        }

        .feature-box::before, .feature-box::after {
            content: ''; position: absolute; width: 30px; height: 30px; border: 4px solid var(--primary-orange);
        }
        .feature-box::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .feature-box::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .feature-zh { font-size: 2.5rem; font-weight: 900; color: #000; display: block; line-height: 1.1; }
        .feature-en { font-size: 1.1rem; font-weight: 700; margin-top: 8px; color: var(--ai-gray); }

        .plus-sign { font-size: 2.2rem; font-weight: 900; color: var(--primary-orange); margin: 0.5rem 0; display: block; animation: aiPulse 1.5s infinite; }

        .sys-code {
            position: absolute; top: 15px; left: 15px; font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem; color: var(--light-orange); letter-spacing: 1px; opacity: 0.7; z-index: 50;
        }

        /* --- 文字飛入動畫 --- */
        @keyframes flyInLeft { 0% { opacity: 0; transform: translateX(-30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes flyInRight { 0% { opacity: 0; transform: translateX(30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes flyInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes aiPulse { 0%, 100% { transform: scale(1); text-shadow: 0 0 5px rgba(255,107,0,0.2); } 50% { transform: scale(1.2); text-shadow: 0 0 20px rgba(255,107,0,0.8); } }
        @keyframes pulseOrb { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }
        @keyframes scanAI { 0% { top: 0; opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { top: 100%; opacity: 0; } }

        /* 小螢幕響應式微調 */
        @media (max-width: 380px) {
            .feature-zh { font-size: 2.2rem; }
            .update-zh { font-size: 1.8rem; }
            .brand-zh { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <!-- 背景裝飾 -->
        <div class="ai-grid"></div>
        <div class="glow-orb orb-top"></div>
        <div class="glow-orb orb-bottom"></div>
        <div class="scanner-line"></div>
        <div class="sys-code">SYS.UPDATE.V2.0 // COLLAB</div>

        <!-- 照片 Scene 1 ➔ Scene 2 轉場區塊 (絕對定位) -->
        <div class="avatar-box avatar-1">
            <img src="https://ik.imagekit.io/lql1uveoc/IMG_9614.PNG?updatedAt=1750437382543" alt="Photo 1">
        </div>
        
        <div class="cross-mark">X</div>
        
        <div class="avatar-box avatar-2">
            <img src="https://ik.imagekit.io/lql1uveoc/IMG_9040.PNG" alt="Photo 2">
        </div>

        <!-- 場景 2：主要文字內容 -->
        <div class="content-wrapper">
            <!-- 品牌區塊 -->
            <div class="brand-section">
                <h2 class="brand-zh"><span>Tony</span>線上美語家教</h2>
                <span class="en-text brand-en">Tony Online English Tutoring</span>
            </div>
            
            <!-- 更新標題區塊 -->
            <div class="update-section">
                <h1 class="update-zh">線上預約系統<br>新增</h1>
                <span class="en-text update-en">New Booking System Update</span>
            </div>
            
            <!-- 功能區塊 -->
            <div class="feature-box">
                <div>
                    <span class="feature-zh">課程查詢</span>
                    <span class="en-text feature-en">Class Inquiry</span>
                </div>
                <span class="plus-sign">＋</span>
                <div>
                    <span class="feature-zh">取消功能</span>
                    <span class="en-text feature-en">Cancellation</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
