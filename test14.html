<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 網頁標題與 SEO Meta Tags (已針對 GEPT 問卷微調) -->
<title>GEPT 全民英檢考後回饋問卷｜初級・中級・中高級 | Tony線上美語家教</title>

<meta name="keywords" content="全民英檢, GEPT, 考後回饋, GEPT初級, GEPT中級, GEPT中高級, Tony線上美語家教, 英文檢定">

<!-- Open Graph / 社群分享預覽圖 (Line, FB) -->
<meta property="og:title" content="GEPT 全民英檢考後回饋問卷 | Tony線上美語家教">
<meta property="og:description" content="完成 GEPT 考試了嗎？請填寫考後反饋，幫助我們針對你的弱點進行精準的課程調整！">
<meta property="og:url" content="https://tonyonlineenglish.netlify.app/gept-survey">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/highschool2.png">

<!-- 你的外部腳本 -->
<script src="layout-manager.js"></script>

<!-- Google 字體 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
    --white: #ffffff; --off: #faf9f7; --stone-50: #f7f5f2; --stone-100: #ede9e4; --stone-200: #d6cfc6; 
    --stone-400: #9a9085; --stone-700: #4a4540; --ink: #1a1714; --orange: #f07020; --orange-lt: #f5934a; 
    --gold: #b8934a; --gold-light: #d4aa6a; --gold-pale: #f5eedd; --green: #27ae60; 
    --f-display: 'Cormorant Garamond', Georgia, serif; --f-body: 'Noto Sans TC', system-ui, sans-serif;
    --r-sm: 8px; --r-md: 16px; --r-lg: 24px; --r-pill: 999px;
    --sh-sm: 0 1px 4px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04); 
    --sh-md: 0 4px 20px rgba(0,0,0,.09);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--stone-50); color: var(--ink); font-family: var(--f-body); line-height: 1.7; }

/* 動畫 */
@keyframes fadeUp { 
    from { opacity: 0; transform: translateY(30px); } 
    to { opacity: 1; transform: translateY(0); } 
}

/* 頂部標題區 */
.survey-header {
    background: #111110;
    color: var(--white);
    padding: 60px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.survey-eyebrow {
    font-family: var(--f-body); font-weight: 700; font-size: .9rem; letter-spacing: .1em;
    padding: 6px 16px; border-radius: var(--r-pill); margin-bottom: 20px; display: inline-block;
    border: 1.5px solid rgba(255,255,255,.4); background: rgba(0,0,0,0.2); color: var(--gold-light);
    animation: fadeUp .6s ease forwards;
}
.survey-title {
    font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; margin-bottom: 10px;
    animation: fadeUp .6s ease forwards 0.1s; opacity: 0;
}
.survey-subtitle {
    font-size: 1.1rem; color: rgba(255,255,255,0.7);
    animation: fadeUp .6s ease forwards 0.2s; opacity: 0;
}

/* 問卷主體 */
.survey-container {
    max-width: 800px;
    margin: -30px auto 60px;
    background: var(--white);
    padding: 50px;
    border-radius: var(--r-lg);
    box-shadow: var(--sh-md);
    position: relative;
    z-index: 10;
    animation: fadeUp .6s ease forwards 0.3s; opacity: 0;
}

.form-group { margin-bottom: 32px; text-align: left; }
.form-group label.question-title { 
    display: block; font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; color: var(--ink); 
    border-left: 4px solid var(--gold); padding-left: 10px;
}
.form-group .sub-label {
    display: block; font-size: 0.9rem; color: var(--stone-400); margin-top: -8px; margin-bottom: 12px; padding-left: 14px;
}

/* 文字輸入框 */
.form-group input[type="text"], 
.form-group input[type="email"], 
.form-group textarea { 
    width: 100%; padding: 14px 18px; border: 1.5px solid var(--stone-200); border-radius: 8px; 
    font-family: var(--f-body); font-size: 1rem; transition: border-color .2s; background: var(--off);
}
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); background: var(--white);}

/* 自訂 Radio / Checkbox 按鈕 */
.radio-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px;
}
.scale-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; text-align: center;
}
.custom-radio input[type="radio"], .custom-radio input[type="checkbox"] { display: none; }
.custom-radio .radio-btn {
    display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px;
    border: 1.5px solid var(--stone-200); border-radius: 8px; cursor: pointer;
    font-weight: 500; color: var(--stone-700); transition: all 0.2s; text-align: center;
}
.custom-radio .radio-btn:hover { border-color: var(--gold-light); background: var(--stone-50); }
.custom-radio input:checked + .radio-btn {
    border-color: var(--gold); background: var(--gold-pale); color: var(--gold); font-weight: 700;
    box-shadow: 0 2px 8px rgba(184,147,74,.15);
}

/* 難度量表文字標籤 */
.scale-labels { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--stone-400); margin-top: 8px; padding: 0 5px;}

/* 提交按鈕 */
.btn-submit { 
    width: 100%; font-size: 1.15rem; padding: 18px; margin-top: 20px; cursor: pointer; border: none; 
    font-family: var(--f-body); font-weight: 700; color: #ffffff; background: var(--orange); 
    border-radius: var(--r-pill); box-shadow: 0 6px 24px rgba(240,112,32,.4); transition: all 0.2s;
}
.btn-submit:hover { transform: translateY(-2px); background: var(--orange-lt); box-shadow: 0 10px 32px rgba(240,112,32,.5); }
.btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

/* 成功訊息 */
#success-msg { display: none; text-align: center; padding: 40px 20px; }
.success-icon {
    width: 80px; height: 80px; background: var(--gold-pale); color: var(--gold);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; margin: 0 auto 20px;
}
#success-msg h3 { font-size: 1.8rem; margin-bottom: 10px; color: var(--ink); }
#success-msg p { color: var(--stone-700); font-size: 1.1rem; }

/* 手機版適配 */
@media (max-width: 768px) {
    .survey-container { margin: -20px 15px 40px; padding: 30px 20px; width: auto; }
    .radio-grid { grid-template-columns: 1fr; }
    .scale-grid { gap: 4px; }
    .custom-radio .radio-btn { padding: 10px; font-size: 0.95rem; }
    .scale-labels { font-size: 0.75rem; }
}
</style>
</head>
<body>

    <!-- 標題區 -->
    <header class="survey-header">
        <span class="survey-eyebrow">Student Feedback</span>
        <h1 class="survey-title">GEPT 全民英檢考後回饋</h1>
        <p class="survey-subtitle">恭喜你完成考試！請與 Tony 老師分享你的考試狀況，幫助我們調整未來的學習方針。</p>
    </header>

    <!-- 問卷表單區 -->
    <main class="survey-container">
        <form id="gept-feedback-form" onsubmit="submitSurvey(event)">
            
            <!-- 基本資料 -->
            <div class="form-group">
                <label class="question-title">姓名 Name *</label>
                <input type="text" id="student-name" placeholder="請輸入你的名字" required>
            </div>

            <!-- 報考級別 -->
            <div class="form-group">
                <label class="question-title">1. 你這次參加的是哪個級別？ *</label>
                <div class="radio-grid">
                    <label class="custom-radio">
                        <input type="radio" name="gept-level" value="初級" required>
                        <div class="radio-btn">初級 (Elementary)</div>
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="gept-level" value="中級">
                        <div class="radio-btn">中級 (Intermediate)</div>
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="gept-level" value="中高級">
                        <div class="radio-btn">中高級 (High-Intermediate)</div>
                    </label>
                </div>
            </div>

            <!-- 報考階段 -->
            <div class="form-group">
                <label class="question-title">2. 本次參加的考試階段為？ *</label>
                <div class="radio-grid">
                    <label class="custom-radio">
                        <input type="radio" name="gept-stage" value="初試" required>
                        <div class="radio-btn">初試 (聽力與閱讀)</div>
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="gept-stage" value="複試">
                        <div class="radio-btn">複試 (口說與寫作)</div>
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="gept-stage" value="一日考">
                        <div class="radio-btn">聽讀說寫一日考</div>
                    </label>
                </div>
            </div>

            <!-- 難度評分 -->
            <div class="form-group">
                <label class="question-title">3. 相比我們平時的練習，你覺得這次考試難度如何？ *</label>
                <div class="scale-grid">
                    <label class="custom-radio"><input type="radio" name="difficulty" value="1" required><div class="radio-btn">1</div></label>
                    <label class="custom-radio"><input type="radio" name="difficulty" value="2"><div class="radio-btn">2</div></label>
                    <label class="custom-radio"><input type="radio" name="difficulty" value="3"><div class="radio-btn">3</div></label>
                    <label class="custom-radio"><input type="radio" name="difficulty" value="4"><div class="radio-btn">4</div></label>
                    <label class="custom-radio"><input type="radio" name="difficulty" value="5"><div class="radio-btn">5</div></label>
                </div>
                <div class="scale-labels">
                    <span>非常簡單</span>
                    <span>跟練習差不多</span>
                    <span>非常困難</span>
                </div>
            </div>

            <!-- 遇到的挑戰 (可複選) -->
            <div class="form-group">
                <label class="question-title">4. 考試中，你覺得最具挑戰的部分是？ (可複選)</label>
                <div class="radio-grid">
                    <label class="custom-radio"><input type="checkbox" name="challenges" value="聽力速度太快"><div class="radio-btn">聽力速度太快</div></label>
                    <label class="custom-radio"><input type="checkbox" name="challenges" value="閱讀時間不夠"><div class="radio-btn">閱讀時間不夠</div></label>
                    <label class="custom-radio"><input type="checkbox" name="challenges" value="單字量不足"><div class="radio-btn">單字量不足/看不懂</div></label>
                    <label class="custom-radio"><input type="checkbox" name="challenges" value="寫作想不出點子"><div class="radio-btn">寫作想不出點子</div></label>
                    <label class="custom-radio"><input type="checkbox" name="challenges" value="口說容易緊張卡詞"><div class="radio-btn">口說容易緊張卡詞</div></label>
                    <label class="custom-radio"><input type="checkbox" name="challenges" value="其他"><div class="radio-btn">其他狀況</div></label>
                </div>
            </div>

            <!-- 考題回憶與心得分享 -->
            <div class="form-group">
                <label class="question-title">5. 考題回憶與心得分享</label>
                <span class="sub-label">請盡量分享你記得的「寫作題目」、「口說情境」或「閱讀主題」。有沒有遇到平時沒準備到的題型？</span>
                <textarea id="student-feedback" rows="5" placeholder="例如：寫作考了關於環保的圖表題，口說有一題問到最喜歡的節日..."></textarea>
            </div>

            <!-- 想對老師說的話 -->
            <div class="form-group">
                <label class="question-title">6. 接下來的課程，希望老師加強哪方面的訓練？</label>
                <textarea id="student-wishes" rows="3" placeholder="例如：希望多練習寫作句型、加強聽力抓關鍵字的技巧..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">送出回饋問卷</button>
        </form>

        <!-- 送出成功畫面 -->
        <div id="success-msg">
            <div class="success-icon">✓</div>
            <h3>辛苦了！回饋已成功送出</h3>
            <p>Tony 老師已經收到你的考後反饋。<br>接下來好好放鬆休息一下，我們下堂課見！</p>
        </div>
    </main>

<script>
function submitSurvey(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.innerText = "傳送中...";
    btn.disabled = true;

    // 收集表單資料
    const formData = {
        name: document.getElementById('student-name').value,
        level: document.querySelector('input[name="gept-level"]:checked').value,
        stage: document.querySelector('input[name="gept-stage"]:checked').value,
        difficulty: document.querySelector('input[name="difficulty"]:checked').value,
        challenges: Array.from(document.querySelectorAll('input[name="challenges"]:checked')).map(cb => cb.value).join(', '),
        feedback: document.getElementById('student-feedback').value,
        wishes: document.getElementById('student-wishes').value
    };

    console.log("收集到的問卷資料:", formData);

    // ==========================================
    // 這裡可以串接你的 Google Apps Script (GAS) URL
    // const GAS_URL = "你的 Google App Script 網址"; 
    // ==========================================
    
    /* 
    fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        body: new URLSearchParams(formData)
    }).then(() => {
        showSuccess();
    }).catch(err => {
        alert("傳送失敗，請檢查網路連線。");
        btn.innerText = "送出回饋問卷";
        btn.disabled = false;
    });
    */

    // 這裡用 setTimeout 模擬網路傳輸等待時間 (1.5秒後顯示成功)
    setTimeout(() => {
        document.getElementById('gept-feedback-form').style.display = 'none';
        const successMsg = document.getElementById('success-msg');
        successMsg.style.display = 'block';
        successMsg.style.animation = 'fadeUp 0.6s ease forwards';
    }, 1500);
}
</script>

</body>
</html>
