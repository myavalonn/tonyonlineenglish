<div id="assignment-login-container" style="width: 100%; display: block; font-family: sans-serif;">
  
  <style>
    /* Ensure the box doesn't get squeezed on mobile */
    #assignment-login-container {
      width: 100%;
      display: block;
      padding: 10px; /* Gives a tiny bit of breathing room on the very edge of screens */
      box-sizing: border-box;
    }

    /* === Login Box Styles (Mobile First) === */
    #assign-login-box { 
      width: 100%; 
      max-width: 450px; 
      margin: 40px auto; 
      padding: 30px 20px; /* Slightly reduced horizontal padding for small screens */
      border: 1px solid #cbd5e1; 
      border-radius: 12px; 
      text-align: center; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
      background: #ffffff;
      box-sizing: border-box; 
    }
    
    #assign-login-box h3 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 22px;
      margin-bottom: 15px;
      line-height: 1.4;
    }
    
    .title-line {
      display: block;
      width: 100%;
    }

    #assign-login-box p {
      color: #64748b;
      font-size: 15px; /* Slightly larger for readability */
      margin-bottom: 20px;
    }
    
    /* Fixed Input Field for Mobile */
    #assign-email-input { 
      width: 100%; 
      display: block; /* Ensures it takes up its own line */
      padding: 14px; /* Increased padding for better tap target */
      box-sizing: border-box; 
      border: 2px solid #e2e8f0; 
      border-radius: 8px; 
      font-size: 16px; /* 16px prevents iOS from auto-zooming on focus */
      outline: none;
      text-align: center;
      transition: 0.3s;
      margin-bottom: 10px;
    }
    #assign-email-input:focus { border-color: #4a90e2; }
    
    #assign-unlock-btn { 
      width: 100%; 
      padding: 14px; 
      margin-top: 5px; 
      background-color: #4a90e2; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: bold;
      cursor: pointer; 
      transition: background 0.3s; 
    }
    #assign-unlock-btn:hover { background-color: #357abd; }
    #assign-unlock-btn:disabled { background: #94a3b8; cursor: wait; }
    
    #assign-msg { 
      color: #ef4444; 
      margin-top: 15px; 
      font-size: 14px; 
      min-height: 20px; 
      font-weight: bold;
    }

    /* === Tablet & Desktop (min-width: 768px) === */
    @media (min-width: 768px) {
      #assign-login-box {
        max-width: 700px; 
        padding: 60px 50px; 
      }
      
      #assign-login-box h3 {
        font-size: 40px; 
        margin-bottom: 25px;
      }
      
      #assign-login-box p {
        font-size: 24px; 
        margin-bottom: 40px;
      }
      
      #assign-email-input {
        font-size: 28px; 
        padding: 20px;
        border-radius: 12px;
        border-width: 3px;
      }
      
      #assign-unlock-btn {
        font-size: 30px; 
        padding: 20px;
        border-radius: 12px;
        margin-top: 30px;
      }
      
      #assign-msg {
        font-size: 20px; 
        margin-top: 25px;
      }
    }
  </style>

  <div id="assign-login-box">
    <h3>
      <span class="title-line">全民英檢中級寫作</span>
      <span class="title-line">學員專屬作業區</span>
    </h3>
    
    <p>請輸入您的 Email 以開啟作業下載列表</p>
    
    <input type="email" id="assign-email-input" placeholder="name@example.com" inputmode="email">
    <button id="assign-unlock-btn" onclick="verifyAssignmentEmail()">查看作業題目</button>
    <div id="assign-msg"></div>
  </div>

</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxZ-l5JXV6Nmzl2YzxX5b2yvsZPyfUSiRCUJiwRgm8tdd7KBbvQvkkKgGwBoXWX-afZ/exec"; 

  async function verifyAssignmentEmail() {
    const emailInput = document.getElementById("assign-email-input");
    const email = emailInput.value.trim();
    const btn = document.getElementById("assign-unlock-btn");
    const msg = document.getElementById("assign-msg");

    if (!email) { msg.innerText = "請輸入 Email"; return; }
    if (!email.includes("@")) { msg.innerText = "Email 格式不正確"; return; }

    btn.disabled = true;
    btn.innerText = "驗證權限中...";
    msg.innerText = "";

    let userIp = "未知";
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipJson = await ipRes.json();
      userIp = ipJson.ip;
    } catch(e) {}

    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ email: email, ip: userIp })
      });
      const data = await response.json();

      if (data.success) {
        const container = document.getElementById("assignment-login-container");
        container.innerHTML = data.html;
        container.style.maxWidth = "100%"; 
      } else {
        msg.innerText = data.message;
        btn.disabled = false;
        btn.innerText = "查看作業題目";
      }
    } catch (e) {
      console.error(e);
      msg.innerText = "連線失敗，請稍後再試";
      btn.disabled = false;
      btn.innerText = "查看作業題目";
    }
  }
  
  document.getElementById("assign-email-input").addEventListener("keyup", function(event) {
    if (event.key === "Enter") { verifyAssignmentEmail(); }
  });
</script>
