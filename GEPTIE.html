<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<div id="assignment-login-container" style="width: 100%; display: block; font-family: sans-serif;">
  
  <style>
    #assignment-login-container * { box-sizing: border-box; }

    /* === 1. CELLPHONE MODE (The "F***ing Huge" Settings) === */
    @media (max-width: 480px) {
      #assign-login-box { 
        width: 95vw !important; /* Uses 95% of the actual screen width */
        margin: 5vh auto !important;
        /* WIDGET 5X BIGGER */
        padding: 15vh 5vw !important; 
        border: 8px solid #1e3a8a !important;
        border-radius: 40px !important;
      }
      #assign-login-box h3 { 
        font-size: 10vw !important; /* Text scales with screen width */
        margin-bottom: 40px !important; 
      }
      #assign-login-box p { 
        font-size: 6vw !important; 
        margin-bottom: 60px !important; 
      }
      
      /* COLUMN 2X BIGGER */
      #assign-email-input { 
        height: 120px !important; 
        font-size: 8vw !important; 
        border: 6px solid #e2e8f0 !important;
        margin-bottom: 40px !important;
        display: block !important;
        width: 100% !important;
      }
      #assign-unlock-btn { 
        height: 120px !important; 
        font-size: 7vw !important; 
        border-radius: 20px !important; 
      }
      #assign-msg { font-size: 5vw !important; }
    }

    /* === 2. TABLET MODE (3x Scale) === */
    @media (min-width: 481px) and (max-width: 1024px) {
      #assign-login-box {
        max-width: 90% !important;
        padding: 100px 60px !important;
        border-radius: 40px !important;
      }
      #assign-login-box h3 { font-size: 60px !important; }
      #assign-login-box p { font-size: 34px !important; }
      #assign-email-input { height: 90px !important; font-size: 36px !important; }
      #assign-unlock-btn { height: 90px !important; font-size: 36px !important; }
    }

    /* === 3. DESKTOP MODE (2.5x Scale) === */
    @media (min-width: 1025px) {
      #assign-login-box { 
        max-width: 800px !important; 
        padding: 80px 60px !important; 
        border-radius: 25px !important;
      }
      #assign-login-box h3 { font-size: 45px !important; }
      #assign-login-box p { font-size: 26px !important; }
      #assign-email-input { height: 70px !important; font-size: 28px !important; }
      #assign-unlock-btn { height: 70px !important; font-size: 28px !important; }
    }

    /* Core logic */
    #assign-login-box { text-align: center; background: #ffffff; margin: 50px auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    #assign-login-box h3 { color: #1e3a8a; line-height: 1.2; margin-top: 0; }
    #assign-email-input { width: 100%; border-radius: 15px; outline: none; text-align: center; }
    #assign-unlock-btn { width: 100%; background-color: #4a90e2; color: white; border: none; font-weight: bold; cursor: pointer; }
    .title-line { display: block; width: 100%; }
  </style>

  <div id="assign-login-box">
    <h3>
      <span class="title-line">全民英檢中級寫作</span>
      <span class="title-line">學員專屬作業區</span>
    </h3>
    <p>請輸入您的 Email 以開啟作業下載列表</p>
    <input type="email" id="assign-email-input" placeholder="name@example.com" inputmode="email">
    <button id="assign-unlock-btn" onclick="verifyAssignmentEmail()">查看作業題目</button>
    <div id="assign-msg"></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxZ-l5JXV6Nmzl2YzxX5b2yvsZPyfUSiRCUJiwRgm8tdd7KBbvQvkkKgGwBoXWX-afZ/exec"; 

  async function verifyAssignmentEmail() {
    const emailInput = document.getElementById("assign-email-input");
    const email = emailInput.value.trim();
    const btn = document.getElementById("assign-unlock-btn");
    const msg = document.getElementById("assign-msg");

    if (!email) { msg.innerText = "請輸入 Email"; return; }
    btn.disabled = true;
    btn.innerText = "驗證中...";

    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ email: email })
      });
      const data = await response.json();
      if (data.success) {
        document.getElementById("assignment-login-container").innerHTML = data.html;
      } else {
        msg.innerText = data.message;
        btn.disabled = false;
        btn.innerText = "查看作業題目";
      }
    } catch (e) {
      msg.innerText = "連線失敗";
      btn.disabled = false;
    }
  }
</script>
