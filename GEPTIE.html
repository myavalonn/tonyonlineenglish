<div id="assignment-login-container" style="width: 100%; display: block; font-family: sans-serif;">
  
  <style>
    #assignment-login-container {
      width: 100%;
      display: block;
      padding: 15px;
      box-sizing: border-box;
    }

    /* === MOBILE MODE (Default) === */
    /* Making the "Content Widget" 3x more prominent */
    #assign-login-box { 
      width: 100%; 
      max-width: 550px; 
      margin: 40px auto; 
      padding: 60px 30px; /* 3x deeper padding */
      border: 2px solid #cbd5e1; 
      border-radius: 20px; 
      text-align: center; 
      box-shadow: 0 12px 30px rgba(0,0,0,0.1); 
      background: #ffffff;
      box-sizing: border-box; 
    }
    
    /* 3x Larger Header/Text content for mobile */
    #assign-login-box h3 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 38px; /* Roughly 3x the standard base size */
      margin-bottom: 25px;
      line-height: 1.3;
    }
    
    .title-line {
      display: block;
      width: 100%;
    }

    #assign-login-box p {
      color: #64748b;
      font-size: 24px; /* 3x Larger description */
      margin-bottom: 40px;
    }
    
    /* 2x Larger Email Column for mobile */
    #assign-email-input { 
      width: 100%; 
      display: block;
      padding: 25px; /* 2x Height */
      box-sizing: border-box; 
      border: 3px solid #e2e8f0; 
      border-radius: 12px; 
      font-size: 22px; /* Large readable text */
      outline: none;
      text-align: center;
      transition: 0.3s;
      margin-bottom: 20px;
    }
    #assign-email-input:focus { border-color: #4a90e2; }
    
    /* 2x Larger Button for mobile */
    #assign-unlock-btn { 
      width: 100%; 
      padding: 25px; 
      background-color: #4a90e2; 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-size: 24px; 
      font-weight: bold;
      cursor: pointer; 
      transition: background 0.3s; 
    }
    #assign-unlock-btn:hover { background-color: #357abd; }
    
    #assign-msg { 
      color: #ef4444; 
      margin-top: 20px; 
      font-size: 20px; 
      min-height: 25px; 
      font-weight: bold;
    }

    /* === TABLET & DESKTOP MODE (min-width: 768px) === */
    /* Doubling the size of the widget content here */
    @media (min-width: 768px) {
      #assign-login-box {
        max-width: 900px; 
        padding: 100px 80px; 
        border-radius: 30px;
      }
      
      #assign-login-box h3 {
        font-size: 64px; /* 2x larger than previous desktop version */
        margin-bottom: 40px;
      }
      
      #assign-login-box p {
        font-size: 36px; /* 2x larger description */
        margin-bottom: 60px;
      }
      
      #assign-email-input {
        font-size: 40px; 
        padding: 35px;
        border-radius: 18px;
        border-width: 5px;
      }
      
      #assign-unlock-btn {
        font-size: 42px; 
        padding: 35px;
        border-radius: 18px;
        margin-top: 40px;
      }
      
      #assign-msg {
        font-size: 30px; 
        margin-top: 40px;
      }
    }
  </style>

  <div id="assign-login-box">
    <h3>
      <span class="title-line">全民英檢中級寫作</span>
      <span class="title-line">學員專屬作業區</span>
    </h3>
    
    <p>請輸入您的 Email 以開啟作業下載列表</p>
    
    <input type="email" id="assign-email-input" placeholder="name@example.com" inputmode="email">
    <button id="assign-unlock-btn" onclick="verifyAssignmentEmail()">查看作業題目</button>
    <div id="assign-msg"></div>
  </div>

</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxZ-l5JXV6Nmzl2YzxX5b2yvsZPyfUSiRCUJiwRgm8tdd7KBbvQvkkKgGwBoXWX-afZ/exec"; 

  async function verifyAssignmentEmail() {
    const emailInput = document.getElementById("assign-email-input");
    const email = emailInput.value.trim();
    const btn = document.getElementById("assign-unlock-btn");
    const msg = document.getElementById("assign-msg");

    if (!email) { msg.innerText = "請輸入 Email"; return; }
    if (!email.includes("@")) { msg.innerText = "Email 格式不正確"; return; }

    btn.disabled = true;
    const originalBtnText = btn.innerText;
    btn.innerText = "驗證權限中...";
    msg.innerText = "";

    let userIp = "未知";
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipJson = await ipRes.json();
      userIp = ipJson.ip;
    } catch(e) {}

    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ email: email, ip: userIp })
      });
      const data = await response.json();

      if (data.success) {
        const container = document.getElementById("assignment-login-container");
        container.innerHTML = data.html;
        container.style.maxWidth = "100%"; 
      } else {
        msg.innerText = data.message;
        btn.disabled = false;
        btn.innerText = originalBtnText;
      }
    } catch (e) {
      console.error(e);
      msg.innerText = "連線失敗，請稍後再試";
      btn.disabled = false;
      btn.innerText = "查看作業題目";
    }
  }
  
  document.getElementById("assign-email-input").addEventListener("keyup", function(event) {
    if (event.key === "Enter") { verifyAssignmentEmail(); }
  });
</script>
