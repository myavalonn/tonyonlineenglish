<!-- SECURE ASSIGNMENT GATEWAY -->
<div id="assignment-login-container" style="width: 100%; display: block; font-family: sans-serif;">
  
  <style>
    /* 確保容器在各種裝置上的基本設定 */
    #assignment-login-container {
      width: 100%;
      display: block;
    }

    /* === 登入框樣式 (手機版預設) === */
    #assign-login-box { 
      width: 100%; 
      max-width: 450px; 
      margin: 50px auto; 
      padding: 35px 30px; 
      border: 1px solid #cbd5e1; 
      border-radius: 12px; 
      text-align: center; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
      background: #ffffff;
      /* 確保 padding 不會撐大寬度 */
      box-sizing: border-box; 
    }
    
    #assign-login-box h3 {
      margin-top: 0;
      color: #1e3a8a; /* 深藍色標題 */
      font-size: 22px;
      margin-bottom: 15px;
      line-height: 1.4; /* 增加行距，讓兩行不要黏太緊 */
    }
    
    /* 強制標題換行的設定 */
    .title-line {
      display: block;
      width: 100%;
    }

    #assign-login-box p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 20px;
    }
    
    #assign-email-input { 
      width: 100%; 
      padding: 12px; 
      box-sizing: border-box; 
      border: 2px solid #e2e8f0; 
      border-radius: 8px; 
      font-size: 16px; 
      outline: none;
      text-align: center;
      transition: 0.3s;
    }
    #assign-email-input:focus { border-color: #4a90e2; }
    
    #assign-unlock-btn { 
      width: 100%; 
      padding: 12px; 
      margin-top: 15px; 
      background-color: #4a90e2; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: bold;
      cursor: pointer; 
      transition: background 0.3s; 
    }
    #assign-unlock-btn:hover { background-color: #357abd; }
    #assign-unlock-btn:disabled { background: #94a3b8; cursor: wait; }
    
    #assign-msg { 
      color: #ef4444; 
      margin-top: 15px; 
      font-size: 14px; 
      min-height: 20px; 
      font-weight: bold;
    }

    /* === 平板與電腦版 (寬度大於 768px 時) === */
    /* 字體與尺寸放大約 2 倍 */
    @media (min-width: 768px) {
      #assign-login-box {
        max-width: 700px; /* 容器放寬，以免大字體擠在一起 */
        padding: 60px 50px; /* 增加內距 */
      }
      
      #assign-login-box h3 {
        font-size: 40px; /* 標題放大 */
        margin-bottom: 25px;
      }
      
      #assign-login-box p {
        font-size: 24px; /* 說明文字放大 */
        margin-bottom: 40px;
      }
      
      #assign-email-input {
        font-size: 28px; /* 輸入框文字放大 */
        padding: 20px;
        border-radius: 12px;
        border-width: 3px;
      }
      
      #assign-unlock-btn {
        font-size: 30px; /* 按鈕文字放大 */
        padding: 20px;
        border-radius: 12px;
        margin-top: 30px;
      }
      
      #assign-msg {
        font-size: 20px; /* 錯誤訊息放大 */
        margin-top: 25px;
      }
    }
  </style>

  <div id="assign-login-box">
    <!-- 修改處：使用 span class="title-line" 強制分行 -->
    <h3>
      <span class="title-line">全民英檢中級寫作</span>
      <span class="title-line">學員專屬作業區</span>
    </h3>
    
    <p>請輸入您的 Email 以開啟作業下載列表</p>
    
    <input type="email" id="assign-email-input" placeholder="name@example.com">
    <button id="assign-unlock-btn" onclick="verifyAssignmentEmail()">查看作業題目</button>
    <div id="assign-msg"></div>
  </div>

</div>

<script>
  // ▼▼▼ 請在此貼上你部署後的 GAS 網址 ▼▼▼
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxZ-l5JXV6Nmzl2YzxX5b2yvsZPyfUSiRCUJiwRgm8tdd7KBbvQvkkKgGwBoXWX-afZ/exec"; 

  async function verifyAssignmentEmail() {
    const emailInput = document.getElementById("assign-email-input");
    const email = emailInput.value;
    const btn = document.getElementById("assign-unlock-btn");
    const msg = document.getElementById("assign-msg");

    if (!email) { msg.innerText = "請輸入 Email"; return; }
    if (!email.includes("@")) { msg.innerText = "Email 格式不正確"; return; }

    btn.disabled = true;
    btn.innerText = "驗證權限中...";
    msg.innerText = "";

    // 嘗試抓取 IP (選用功能)
    let userIp = "未知";
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipJson = await ipRes.json();
      userIp = ipJson.ip;
    } catch(e) {}

    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ email: email, ip: userIp })
      });
      const data = await response.json();

      if (data.success) {
        // 驗證成功：替換內容
        const container = document.getElementById("assignment-login-container");
        container.innerHTML = data.html;
        
        // 修正樣式以適應新內容
        container.style.maxWidth = "100%"; 
      } else {
        // 驗證失敗
        msg.innerText = data.message;
        btn.disabled = false;
        btn.innerText = "查看作業題目";
      }
    } catch (e) {
      console.error(e);
      msg.innerText = "連線失敗，請稍後再試";
      btn.disabled = false;
      btn.innerText = "查看作業題目";
    }
  }
  
  // 支援 Enter 鍵送出
  document.getElementById("assign-email-input").addEventListener("keyup", function(event) {
    if (event.key === "Enter") { verifyAssignmentEmail(); }
  });
</script>
