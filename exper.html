<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>預約體驗課程-Tony線上美語家教</title>
  <meta property="og:title" content="預約體驗課程-Tony線上美語家教">
  <meta property="og:description" content="預約體驗課程25/50 分鐘線上體驗課熱烈預約中！完成問卷即可安排專屬學習進度，快點擊加入 LINE 聯繫 Tony 老師。">
  <meta property="og:image" content="https://ik.imagekit.io/lql1uveoc/Abstract%20Special%20Offer%20Announcement%20Free%20Facebook%20Post.png?updatedAt=1754673537869">
  <meta property="og:url" content="https://tonyonlineenglish.netlify.app/booking">
  <meta property="og:type" content="website">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="layout-manager.js"></script>

  <style>
    :root {
      --primary-color: #3b414a;
      --accent-blue: #007bff;
      --line-green: #00B900;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* --- HERO SECTION --- */
    .hero {
      position: relative;
      height: 30vh; /* 高度為原始 60vh 的一半 */
      min-height: 200px; /* 最小高度進一步壓縮 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      overflow: hidden;
      background-color: #222;
    }
    .hero-bg {
      position: absolute;
      top: -20px; left: -20px; right: -20px; bottom: -20px;
      /* 換上新圖片 */
      background: url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/samantha-borges-EeS69TTPQ18-unsplash.jpg?updatedAt=1772773838628') no-repeat center center;
      background-size: cover;
      /* 僅模糊，不暗化 */
      filter: blur(6px);
      z-index: 0;
      animation: slideInLeftBg 1.2s ease-out forwards;
    }
    .hero-content {
      position: relative;
      z-index: 1;
    }
    .hero h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      /* 因為背景不暗化，加深文字陰影確保可讀性 */
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.6);
      animation: slideInRightGlow 1.8s ease-out forwards;
    }
    .hero p {
      font-size: 1.5rem;
      font-style: italic;
      margin: 0;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.6);
      animation: slideInTopText 1.2s ease-out forwards;
    }

    @keyframes slideInLeftBg {
      0% { transform: translateX(-100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRightGlow {
      0% { transform: translateX(100vw); opacity: 0; text-shadow: 2px 2px 8px rgba(0,0,0,0); }
      60% { transform: translateX(0); opacity: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
      80% { text-shadow: 0 0 15px #fff, 0 0 30px var(--accent-blue), 0 0 45px var(--accent-blue); transform: scale(1.02); }
      100% { transform: translateX(0) scale(1); opacity: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.6); }
    }
    @keyframes slideInTopText {
      0% { transform: translateY(-50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* --- STEPS LIST (參考圖片排版) --- */
    .steps-container {
      max-width: 800px;
      margin: -40px auto 40px;
      padding: 30px 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 25px;
      font-size: 1.6rem; /* Desktop 大字體 */
      color: #333;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .step-number {
      background-color: #000;
      color: #fff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      flex-shrink: 0;
      font-size: 1.2rem;
    }
    .step-text {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      word-break: break-word;
    }
    .line-text {
      color: var(--line-green);
      font-weight: bold;
      text-decoration: none;
    }
    .step-icon {
      height: 1.2em;
      vertical-align: middle;
      cursor: pointer;
    }

    /* --- COURSE PROMPT --- */
    .course-prompt {
      text-align: center;
      margin: 40px auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      color: #555;
    }
    .prompt-text {
      font-size: 1.1rem; /* 縮小字體 */
      font-weight: bold;
    }
    .inline-arrow {
      color: var(--accent-blue);
      animation: bounceInline 2s infinite;
    }
    @keyframes bounceInline {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-4px); }
      60% { transform: translateY(-2px); }
    }

    /* --- PRODUCT BLOCKS --- */
    .product-grid {
      max-width: 900px;
      margin: 0 auto 40px;
      display: grid;
      grid-template-columns: 1fr 1fr; /* 桌面預設為兩排 */
      gap: 30px;
      padding: 0 20px;
    }
    .course-block {
      background: white;
      border-radius: 16px;
      padding: 50px 20px;
      text-align: center;
      border: 2px solid #eee;
      transition: border-color 0.3s, transform 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }
    .course-block:hover { 
      border-color: var(--accent-blue); 
      transform: translateY(-5px);
    }
    .course-block h2 { font-size: 1.8rem; margin-bottom: 10px; }
    .course-block p { color: #666; margin-bottom: 20px; }
    .course-block .price {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent-blue);
    }

    /* --- PROMO IMAGE --- */
    .promo-image-container {
      text-align: center;
      margin: 40px 20px 60px;
    }
    .promo-image-container img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    /* --- DIRECT CHECKOUT POPUP --- */
    .email-input-field { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box;}
    .checkout-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
    .checkout-btn:hover { background: #525964; }
    
    #email-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .popup-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
    
    /* --- RESPONSIVE ADJUSTMENTS --- */
    @media (max-width: 1024px) {
      .steps-container { font-size: 1.4rem; padding: 25px 30px; } /* Tablet 保持大字體 */
    }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .steps-container { 
        font-size: 1.1rem; /* 手機版字體 */
        padding: 20px; 
        margin: -20px 20px 30px; 
        gap: 18px; 
      }
      .step-number { width: 30px; height: 30px; font-size: 1rem; }
      
      /* 手機版 25/50 mins 左右並排設計 */
      .product-grid { 
        grid-template-columns: 1fr 1fr; /* 強制保持左右兩排 */
        gap: 10px; /* 縮小間距以適應螢幕 */
        padding: 0 15px;
      }
      .course-block { padding: 20px 10px; }
      .course-block h2 { font-size: 1.2rem; margin-bottom: 5px; }
      .course-block p { font-size: 0.8rem; margin-bottom: 10px; }
      .course-block .price { font-size: 1.2rem; }
    }

    .tony-highlight { color: blue; font-weight: bold; font-style: italic; }
    .error-container { color: #d9534f; padding: 20px; }
  </style>
</head>
<body>

  <!-- HERO SECTION -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1>Tony線上美語家教</h1>
      <p>English is the Future!</p>
    </div>
  </header>

  <main id="product-page">
    <!-- STEPS (參考圖片版面) -->
    <section class="steps-container">
      <div class="step-item">
        <div class="step-number">1</div>
        <div class="step-text">
          加入Line: <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank" class="line-text">Myavalon</a> 
          <a href="https://line.me/ti/p/T9YdimtG8_" target="_blank"><img class="step-icon" src="https://ik.imagekit.io/lql1uveoc/line.png?updatedAt=1761926064215" alt="Line"></a>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">2</div>
        <div class="step-text">或是 Email: TonyOnlineEnglish@gmail.com</div>
      </div>
      <div class="step-item">
        <div class="step-number">3</div>
        <div class="step-text">
          完成 學習需求問卷 
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfk2FL_YLvCUVIJ4l03NyfoofHPxzWXP-MbODb9V5dEHWpHRw/viewform?usp=header" target="_blank"><img class="step-icon" src="https://ik.imagekit.io/lql1uveoc/external-link.png?updatedAt=1754911187731" alt="Link"></a>
        </div>
      </div>
    </section>

    <!-- PROMPT (字體縮小並放在後方) -->
    <div class="course-prompt">
      <span class="prompt-text">點選體驗課程</span>
      <svg class="inline-arrow" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
    </div>

    <!-- PRODUCT BLOCKS (Clicking opens checkout directly) -->
    <section class="product-grid">
      <div class="course-block" onclick="directCheckout('trial-25')">
        <h2>25 分鐘</h2>
        <p>適合快速口說練習</p>
        <div class="price">NT$ 350</div>
      </div>

      <div class="course-block" onclick="directCheckout('trial-50')">
        <h2>50 分鐘</h2>
        <p>完整課程深度學習</p>
        <div class="price">NT$ 550</div>
      </div>
    </section>

    <!-- PROMO IMAGE UNDER THE BOXES -->
    <div class="promo-image-container">
      <img src="https://ik.imagekit.io/lql1uveoc/Abstract%20Special%20Offer%20Announcement%20Free%20Facebook%20Post.png?updatedAt=1754673537869" alt="Special Offer">
    </div>
  </main>

  <!-- DIRECT EMAIL CHECKOUT POPUP -->
  <div id="email-popup-overlay">
    <div class="popup-content">
      <h3 id="popup-product-title" style="color: var(--accent-blue); margin-bottom: 10px;"></h3>
      <h3 style="margin-top: 0;">請輸入您的電子信箱</h3>
      <input type="email" id="popup-email-input" class="email-input-field" style="text-align:center;" placeholder="example@gmail.com">
      <button class="checkout-btn" onclick="handleCheckout()">確認結帳</button>
      <button style="margin-top:15px; background:none; border:none; color:grey; cursor:pointer;" onclick="closeEmailPopup()">取消</button>
      <p style="font-size:12px; color:#666; margin-top:15px;">付款方式：銀行轉帳或是 Line Pay (iPass Money)</p>
    </div>
  </div>

  <!-- THANK YOU PAGE -->
  <div id="thank-you-page" style="display:none; padding: 40px 20px; text-align: center;">
    <div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
      <h2 style="color: green;">✓ 感謝您的訂購！</h2>
      
      <img src="https://ik.imagekit.io/lql1uveoc/Abstract%20Special%20Offer%20Announcement%20Free%20Facebook%20Post.png?updatedAt=1754673537869" alt="Confirmation Promotion" style="width: 100%; max-width: 400px; margin: 20px auto; border-radius: 8px;">
      
      <p>訂單編號: <span id="ty-order-id" style="font-weight:bold; color:blue;"></span></p>
      <div id="ty-booking-container" style="margin: 20px 0;">
        <p>請點擊下方專屬連結預約時間：</p>
        <div id="ty-booking-links-list"></div>
      </div>
      <div style="background:#fff3cd; padding:15px; border-radius:8px; margin: 20px 0;">
        ⚠️ 預約課程只保留2小時，請儘速聯繫 <span class="tony-highlight">Tony線上美語家教</span> 繳費。
      </div>
      <a href="javascript:void(0)" onclick="returnToOriginalPage()" style="color: blue; text-decoration: underline; font-weight: bold;">回到頁面</a>
    </div>
  </div>

  <script>
    const products =[
      { id: 'trial-25', name: '體驗課程 25 分鐘', price: 350, bookingLink: 'https://tonyonlineenglish.netlify.app//25mbk' },
      { id: 'trial-50', name: '體驗課程 50 分鐘', price: 550, bookingLink: 'https://tonyonlineenglish.netlify.app/booking' }
    ];
    
    let currentCheckoutItem = null;

    function directCheckout(id) {
      currentCheckoutItem = products.find(p => p.id === id);
      if (currentCheckoutItem) {
        document.getElementById("popup-product-title").innerText = `預約 ${currentCheckoutItem.name}`;
        document.getElementById("email-popup-overlay").style.display = "flex";
      }
    }

    function closeEmailPopup() { 
      document.getElementById("email-popup-overlay").style.display = "none"; 
      currentCheckoutItem = null;
    }

    function handleCheckout() {
      const email = document.getElementById("popup-email-input").value;
      if (!email.includes("@")) return alert("請輸入有效的信箱");

      const blacklist =["8888@gmail.com", "z0970957377@gmail.com"];
      if (blacklist.includes(email.toLowerCase().trim())) {
        document.querySelector(".popup-content").innerHTML = `<div class="error-container">你無法下訂單，請聯繫 <span class="tony-highlight">Tony線上美語家教</span></div>`;
        return;
      }

      if (!currentCheckoutItem) return;

      const orderId = "#" + Math.random().toString(36).substr(2, 5).toUpperCase();
      const productName = currentCheckoutItem.name;
      const total = currentCheckoutItem.price;

      // 切換至 Thank You 頁面
      document.getElementById("product-page").style.display = "none";
      document.getElementById("email-popup-overlay").style.display = "none";
      document.getElementById("thank-you-page").style.display = "block";
      document.getElementById("ty-order-id").innerText = orderId;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      
      const linksList = document.getElementById("ty-booking-links-list");
      linksList.innerHTML = `<a href="${currentCheckoutItem.bookingLink}" target="_blank" style="display:block; background:blue; color:white; padding:10px; margin:10px 0; border-radius:5px; text-decoration:none;">前往預約：${currentCheckoutItem.name}</a>`;

      const imgUrl = "https://ik.imagekit.io/lql1uveoc/Abstract%20Special%20Offer%20Announcement%20Free%20Facebook%20Post.png?updatedAt=1754673537869";

      fetch("https://script.google.com/macros/s/AKfycbyU13Wivs341DMPupk9EKrL9u908zrHNOVqZUXri-hGezkk6qj_7loQGIf0GCfmvj_f/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ 
          orderId, 
          email, 
          productName: productName, 
          totalPrice: total, 
          status: "未付款",
          image: imgUrl,
          imageUrl: imgUrl,
          confirmationImage: imgUrl
        })
      });

      currentCheckoutItem = null;
    }

    // 回到原始頁面函數
    function returnToOriginalPage() {
      document.getElementById("thank-you-page").style.display = "none";
      document.getElementById("popup-email-input").value = "";
      document.getElementById("product-page").style.display = "block";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
