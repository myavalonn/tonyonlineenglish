<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tony線上美語家教</title>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 0;
      color: #333;
      overflow-x: hidden;
    }

    /* ---------- Hero Section ---------- */
    .hero {
      position: relative;
      height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }
    .hero-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/20191209online.jpg') center/cover;
      filter: blur(5px) brightness(0.7);
      transform: scale(1.1);
      z-index: -1;
    }
    .hero-title { font-size: 2rem; margin: 0; font-weight: bold; }
    .hero-subtitle { font-size: 1.2rem; margin-top: 8px; font-style: italic; }

    /* ---------- 步驟區 (簡化) ---------- */
    .steps-container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
    .step-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 1rem; }
    .step-num { background: #000; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 10px; font-size: 0.8rem; flex-shrink: 0; }
    .step-item a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 5px; }
    .step-item img { height: 1.1em; }
    .myavalon-text { color: #28a745; font-weight: bold; }

    /* ---------- 雙方格購物車 ---------- */
    .booking-section { max-width: 600px; margin: 30px auto; text-align: center; padding: 0 20px; }
    .booking-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
    .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .course-card { border: 2px solid #3b414a; border-radius: 10px; padding: 20px 5px; cursor: pointer; background: #fff; transition: 0.2s; }
    .course-card:hover { border-color: #007bff; background: #f9f9f9; }
    .course-time { font-size: 1rem; font-weight: bold; display: block; margin-bottom: 5px; }
    .course-price { color: #007bff; font-weight: bold; font-size: 1.1rem; }

    /* ---------- 結帳面板 (Cart Panel) ---------- */
    .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
    .cart-overlay.open { display: block; }
    .cart-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: #fff; z-index: 1001; transition: 0.4s; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
    .cart-panel.open { right: 0; }
    .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .cart-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
    
    input[type="email"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
    .checkout-btn { width: 100%; background: #3b414a; color: #fff; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; }
    .line-link { display: block; text-align: center; color: #00B900; font-weight: bold; text-decoration: none; margin: 15px 0; }

    /* ---------- 底部圖片 ---------- */
    .footer-image { width: 100%; max-width: 500px; display: block; margin: 40px auto; border-radius: 10px; padding: 0 20px; box-sizing: border-box; }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-bg"></div>
    <h1 class="hero-title">Tony線上美語家教</h1>
    <div class="hero-subtitle">English is the future.</div>
  </header>

  <div class="steps-container">
    <div class="step-item"><div class="step-num">1</div><a href="https://line.me/ti/p/T9YdimtG8_" target="_blank">加入Line: <span class="myavalon-text">Myavalon</span> <img src="https://ik.imagekit.io/lql1uveoc/line.png"></a></div>
    <div class="step-item"><div class="step-num">2</div><span>或是 Email: TonyOnlineEnglish@gmail.com</span></div>
    <div class="step-item"><div class="step-num">3</div><a href="https://docs.google.com/forms/d/e/1FAIpQLSfk2FL_YLvCUVIJ4l03NyfoofHPxzWXP-MbODb9V5dEHWpHRw/viewform" target="_blank">完成 學習需求問卷 <img src="https://ik.imagekit.io/lql1uveoc/external-link.png"></a></div>
  </div>

  <div class="booking-section">
    <div class="booking-header">點選體驗課程</div>
    <div class="grid-container">
      <div class="course-card" onclick="addToCart('trial-25', '體驗課程25分鐘', 350)">
        <span class="course-time">25分鐘</span>
        <span class="course-price">NT$350</span>
      </div>
      <div class="course-card" onclick="addToCart('trial-50', '體驗課程50分鐘', 550)">
        <span class="course-time">50分鐘</span>
        <span class="course-price">NT$550</span>
      </div>
    </div>
  </div>

  <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
  <div id="cart-panel" class="cart-panel">
    <div class="cart-header">
      <h3 style="margin:0">您的課程組合</h3>
      <button onclick="toggleCart()" style="background:none; border:none; font-size:24px; cursor:pointer">×</button>
    </div>
    <div class="cart-body">
      <div id="cart-items"></div>
      <hr>
      <p><strong>總計：<span id="total-price">NT$0</span></strong></p>
      
      <div style="margin-top:30px">
        <h3 style="margin-bottom:5px">結帳資訊</h3>
        <p style="font-size:14px; color:666">請輸入您的電子信箱：</p>
        <input type="email" id="customer-email" placeholder="example@gmail.com">
        <a class="line-link" href="https://line.me/ti/p/T9YdimtG8_" target="_blank">請務必加入 Line: Myavalon</a>
        <button class="checkout-btn" onclick="processCheckout()">確認購買</button>
      </div>
    </div>
  </div>

  <img class="footer-image" src="https://ik.imagekit.io/lql1uveoc/Abstract%20Special%20Offer%20Announcement%20Free%20Facebook%20Post.png">

  <script>
    let cart = null;

    function toggleCart() {
      document.getElementById('cart-overlay').classList.toggle('open');
      document.getElementById('cart-panel').classList.toggle('open');
    }

    function addToCart(id, name, price) {
      cart = { id, name, price }; // 簡化為一次選一個課程
      document.getElementById('cart-items').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
          <span>${name}</span>
          <strong>NT$ ${price}</strong>
        </div>`;
      document.getElementById('total-price').innerText = `NT$ ${price}`;
      
      toggleCart(); // 打開結帳面板
      setTimeout(() => {
        document.getElementById('customer-email').focus(); // 自動聚焦到 Email 欄位
      }, 500);
    }

    function processCheckout() {
      const email = document.getElementById('customer-email').value;
      if (!email || !email.includes('@')) {
        alert('請輸入有效的電子信箱');
        return;
      }
      alert('訂單已送出！我們會將確認信寄至：' + email + '\n請記得加入 Line 以完成預約。');
      // 這裡可串接原本的 GAS 傳送邏輯
    }
  </script>

</body>
</html>
