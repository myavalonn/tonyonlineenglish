<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Assessment - Tony線上美語家教</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="layout-manager.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* 通用勾選圓圈樣式 */
        .radio-circle { 
            border-style: solid; 
            border-radius: 9999px; 
            flex-shrink: 0; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Desktop (桌機模式) 3 倍大 --- */
        @media (min-width: 1024px) {
            .max-w-5xl { max-width: 80% !important; }
            #question-text { font-size: 3.5rem !important; line-height: 1.2; margin-bottom: 3.5rem !important; font-weight: 700; }
            .option-text { font-size: 2.5rem !important; font-weight: 700 !important; }
            .option-btn { padding: 2.5rem 3rem !important; margin-bottom: 1.5rem !important; border-width: 3px !important; }
            #next-btn, #prev-btn { font-size: 1.8rem !important; padding: 1.5rem 3.5rem !important; border-radius: 20px; }
            #question-number { width: 4.5rem; height: 4.5rem; font-size: 2.5rem; }
            .radio-circle { width: 2.5rem; height: 2.5rem; border-width: 4px; margin-right: 1.5rem; }
            .inner-dot { width: 1.25rem; height: 1.25rem; }
        }

        /* --- Tablet (平板) 字體 2 倍，題號 2.5 倍大 --- */
        @media (min-width: 768px) and (max-width: 1023px) {
            #quiz-card { padding: 3rem !important; }
            #question-text { font-size: 2.2rem !important; line-height: 1.3; margin-bottom: 2.5rem !important; }
            .option-text { font-size: 1.6rem !important; font-weight: 700 !important; }
            .option-btn { padding: 1.5rem 2rem !important; margin-bottom: 1.25rem !important; }
            #next-btn, #prev-btn { font-size: 1.3rem !important; padding: 1.2rem 2.5rem !important; }
            #question-number { width: 5rem !important; height: 5rem !important; font-size: 2.5rem !important; border-radius: 12px !important; }
            /* 平板圓圈修正 */
            .radio-circle { width: 1.8rem !important; height: 1.8rem !important; border-width: 3px !important; margin-right: 1.2rem !important; display: flex !important; }
            .inner-dot { width: 0.9rem; height: 0.9rem; }
        }

        /* --- Mobile (手機) 放大 1.3 倍 + 緊密佈局 --- */
        @media (max-width: 640px) {
            #quiz-card { padding: 1rem !important; }
            #question-text { font-size: 1.5rem !important; margin-bottom: 1rem; line-height: 1.4; }
            #options-grid { gap: 0.4rem !important; } 
            .option-btn { padding: 0.8rem 1rem !important; margin-bottom: 0 !important; }
            .option-text { font-size: 1.25rem !important; font-weight: 700 !important; }
            #controls-area { margin-top: 0.8rem !important; padding-top: 0.8rem !important; border-top: 1px solid #e2e8f0; }
            #next-btn, #prev-btn { padding: 0.7rem 1.4rem !important; font-size: 1.1rem !important; }
            #question-number { width: 3rem; height: 3rem; font-size: 1.4rem; }
            .radio-circle { width: 1.4rem; height: 1.4rem; border-width: 2px; margin-right: 0.8rem; display: flex; }
            .inner-dot { width: 0.7rem; height: 0.7rem; }
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col">

    <header id="quiz-header" class="hidden bg-white border-b border-slate-200 py-3 px-6 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <span id="user-display" class="text-xs font-bold text-indigo-600 uppercase tracking-widest"></span>
                    <span id="timer-display" class="text-sm font-bold text-red-500">剩餘時間: 40 min</span>
                </div>
                <span id="counter" class="text-sm font-semibold text-slate-500">Question 1 / 30</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2">
                <div id="progress-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width: 3.33%"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-2 md:p-6">
        <div class="max-w-5xl w-full">
            
            <div id="reg-card" class="bg-white rounded-3xl shadow-xl p-10 md:p-20 border border-slate-200 fade-in text-center">
                <p class="text-indigo-600 font-bold tracking-widest mb-2">TONY 線上美語家教</p>
                <h2 class="text-3xl md:text-5xl font-bold mb-8 text-slate-800">TOEIC 多益測驗</h2>
                <div class="space-y-6 text-left max-w-2xl mx-auto">
                    <div>
                        <label class="block font-bold text-slate-700 mb-2 md:text-2xl">姓名 (Full Name)</label>
                        <input type="text" id="user-name" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl md:text-xl outline-none">
                    </div>
                    <div>
                        <label class="block font-bold text-slate-700 mb-2 md:text-2xl">電子郵件 (Email Address)</label>
                        <input type="email" id="user-id" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl md:text-xl outline-none">
                    </div>
                    <button onclick="startTest()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-xl md:text-3xl hover:bg-indigo-700 transition-all mt-6 shadow-lg">開始測驗</button>
                </div>
            </div>

            <div id="quiz-card" class="hidden bg-white rounded-3xl shadow-2xl border border-slate-200 p-8 md:p-16 fade-in">
                <div class="flex flex-col">
                    <div class="flex items-center gap-4 mb-6">
                        <span id="question-number" class="flex items-center justify-center bg-indigo-600 text-white font-bold shrink-0">1</span>
                        <div class="h-1 flex-grow bg-slate-100 rounded-full"></div>
                    </div>
                    <h2 id="question-text" class="text-slate-800"></h2>
                    <div id="options-grid" class="flex flex-col"></div>
                </div>
                <div id="controls-area" class="flex justify-between items-center mt-10">
                    <button id="prev-btn" onclick="prevQuestion()" class="text-slate-400 font-bold disabled:opacity-0 uppercase tracking-widest">PREV</button>
                    <button id="next-btn" onclick="nextQuestion()" class="bg-slate-900 text-white rounded-2xl font-bold uppercase shadow-xl transition-all">
                        <span id="next-text">NEXT</span>
                    </button>
                </div>
            </div>

            <div id="result-card" class="hidden bg-white rounded-3xl shadow-2xl p-16 text-center fade-in">
                <div id="loading-results">
                    <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto mb-6"></div>
                    <p class="text-2xl font-bold">正在提交結果...</p>
                </div>
                <div id="confirmation-msg" class="hidden">
                    <h2 class="text-4xl font-bold mb-6 text-green-600">提交完成</h2>
                    <p class="text-2xl">您的測驗結果已成功提交。後續可直接進行體驗課程 - Tony線上美語家教。祝您學習愉快！</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby25l2Zoblq4pBVh-P77j9id3SJIo9VoYNvFyoAftZjZu4ehKliEP_SBia70ea-4UhlfQ/exec';
        const questions = [{q:"After Ms. Park's film, viewers are encouraged to stay for a short _______.",options:["participation","discussion","attendance","concurrence"],correct:1},{q:"Ms. Guelph _______ the seminar with the results of the latest marketing survey.",options:["concluding","will conclude","was concluded","conclude"],correct:1},{q:"Takagawa Co. renovated the building by constructing a _______ outside dining area.",options:["beautifully","beautiful","beautify","beauty"],correct:1},{q:"_______ 5,000 people visited Kowloon Finance's Web site yesterday.",options:["Over","Well","Any","Other"],correct:0},{q:"The technology convention is currently _______ a significantly larger audience.",options:["calling","suggesting","happening","attracting"],correct:3},{q:"Dr. Muniz is _______ to see the patient on Thursday at 5:15 P.M.",options:["comfortable","probable","available","possible"],correct:2},{q:"According to regulations, all staff must _______ request reimbursement.",options:["formalize","formally","formality","formal"],correct:1},{q:"_______ this morning's team meeting, Mr. Insel acknowledged the need for research.",options:["Upon","Across","With","During"],correct:3},{q:"In order to make its servers instantly _______, the restaurant hired a designer.",options:["identify","identifying","identifiable","identification"],correct:2},{q:"The owner _______ responds to all reviews that visitors post on the Internet.",options:["slightly","personally","approximately","recklessly"],correct:1},{q:"Eighty percent of doctors _______ that the new wash is better than the competitors'.",options:["favor","assure","confess","agree"],correct:3},{q:"_______ the annual inspection has been completed, the crew can begin installing.",options:["With that","In order that","In that","Now that"],correct:3},{q:"Mr. Griffon examined the applications for _______ who could handle the redesign.",options:["him","ours","himself","anyone"],correct:3},{q:"The laboratory manager is required to ensure proper _______ of all chemicals.",options:["store","storable","stores","storage"],correct:3},{q:"Seeing that your rent is now two weeks _______, you must pay an additional fee.",options:["valuable","remaining","overdue","owed"],correct:2},{q:"Ms. Pangchorn will answer her e-mails when she _______ from her trip.",options:["return","returning","returns","had returned"],correct:2},{q:"The Web site will be inaccessible _______ the hours of 2 A.M. and 4 A.M.",options:["in","since","among","between"],correct:3},{q:"Ms. Driscoll has a speaking _______ on Friday, October 13.",options:["recruitment","term","topic","engagement"],correct:3},{q:"The appliances were assembled at different factories, so they arrived _______.",options:["separately","separates","separating","separate"],correct:0},{q:"All customer _______, no matter how minor, should always be answered promptly.",options:["inquiries","inquiring","inquiry","inquired"],correct:0},{q:"Sanitation standards for their production line extend _______ those of others.",options:["far","even","more","beyond"],correct:3},{q:"The legal guarantee period is five years _______ 300 thousand kilometers.",options:["plus","or", "but", "to"],correct:1},{q:"Due to a lack of time, programmers have not updated the application _______.",options:["continually","shortly","firmly","recently"],correct:3},{q:"Manufacturers are producing efficient units _______ stricter government regulations.",options:["prior to","inasmuch as","as a result of","further from"],correct:2},{q:"Randit Corporation's history of 30 years of _______ service is unique.",options:["reliable","relied","relying","rely"],correct:0},{q:"Budget changes impacting employee incentives _______ to the CEO right away.",options:["should be submitted","will be submitting","may have submitted","has been submitted"],correct:0},{q:"The city is inviting public _______ on its plan to put up a commemorative plaque.",options:["arrangement","interest","comment","order"],correct:2},{q:"Mr. Ponchartrain, _______ is away on business, left Ms. Hyun in charge.",options:["which","whose","that","who"],correct:3},{q:"For safety reasons, visitors to the plant must be _______ while on site.",options:["consulted","escorted","presented","supported"],correct:1},{q:"Duchene Investment Firm provides free consultations to help _______ owners.",options:["inexperienced","indisputable","unwilling","unfamiliar"],correct:0}];

        let currentIndex = 0, answers = new Array(30).fill(null), userName = "", userId = "";
        let timeLeft = 40, timerInterval;

        function startTest() {
            userName = document.getElementById('user-name').value.trim();
            userId = document.getElementById('user-id').value.trim();
            if(!userName || !userId.includes('@')) return alert("請輸入正確姓名與 Email。");
            document.getElementById('reg-card').classList.add('hidden');
            document.getElementById('quiz-header').classList.remove('hidden');
            document.getElementById('quiz-card').classList.remove('hidden');
            document.getElementById('user-display').innerText = `考生: ${userName}`;
            showQuestion();
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(true); }
                else { document.getElementById('timer-display').innerText = `剩餘時間: ${timeLeft} min`; }
            }, 60000);
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('question-number').innerText = currentIndex + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('counter').innerText = `Question ${currentIndex + 1} / 30`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1)/30)*100}%`;
            
            const grid = document.getElementById('options-grid'); 
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const active = answers[currentIndex] === i;
                grid.innerHTML += `
                    <button onclick="select(${i})" class="option-btn w-full flex items-center border-2 text-left transition-all ${active ? 'border-indigo-600 bg-indigo-50 shadow-md' : 'border-slate-100 hover:border-indigo-200'}">
                        <div class="radio-circle ${active ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300 bg-white'}">
                            ${active ? '<div class="inner-dot bg-white rounded-full"></div>' : ''}
                        </div>
                        <span class="option-text font-bold ${active ? 'text-indigo-900' : 'text-slate-600'}">${opt}</span>
                    </button>`;
            });
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-text').innerText = currentIndex === 29 ? 'SUBMIT' : 'NEXT';
        }

        function select(i) { answers[currentIndex] = i; showQuestion(); }
        function prevQuestion() { if(currentIndex > 0) { currentIndex--; showQuestion(); window.scrollTo(0,0); } }
        
        function nextQuestion() {
            if (answers[currentIndex] === null) { alert("請點選一個選項再繼續。"); return; }
            if(currentIndex < 29) { currentIndex++; showQuestion(); window.scrollTo(0,0); }
            else { submitTest(); }
        }

        function submitTest(isForce = false) {
            clearInterval(timerInterval);
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('quiz-header').classList.add('hidden');
            document.getElementById('result-card').classList.remove('hidden');
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: userName, id: userId, answers: answers, status: isForce ? 'Timeout' : 'Normal' }) })
            .then(() => { document.getElementById('loading-results').classList.add('hidden'); document.getElementById('confirmation-msg').classList.remove('hidden'); });
        }
    </script>
</body>
</html>
