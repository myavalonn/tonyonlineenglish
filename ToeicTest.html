<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Assessment - Tony線上美語家教</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header id="quiz-header" class="hidden bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-10 shadow-sm">
        <div class="max-w-2xl mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <span id="user-display" class="text-xs font-bold text-indigo-600 uppercase tracking-widest"></span>
                <span id="counter" class="text-sm font-semibold text-slate-500">Question 1 / 30</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2">
                <div id="progress-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width: 3.33%"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-2xl w-full">
            
            <div id="reg-card" class="bg-white rounded-2xl shadow-xl p-8 md:p-12 border border-slate-200 fade-in text-center">
                <h2 class="text-3xl font-bold mb-2 text-slate-800">TOEIC 多益測驗</h2>
                <p class="text-slate-500 mb-8">請輸入您的資訊以開始測驗</p>
                <div class="space-y-4 text-left">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">姓名 (Full Name)</label>
                        <input type="text" id="user-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="您的姓名">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">電子郵件 (Email Address)</label>
                        <input type="email" id="user-id" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="example@mail.com">
                    </div>
                    <button onclick="startTest()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg transition-all mt-4">開始測驗</button>
                </div>
            </div>

            <div id="quiz-card" class="hidden bg-white rounded-2xl shadow-xl border border-slate-200 p-8 md:p-12 min-h-[450px] flex flex-col fade-in">
                <div class="flex-grow">
                    <div class="flex items-center gap-3 mb-6">
                        <span id="question-number" class="flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold text-lg">1</span>
                        <div class="h-px flex-grow bg-slate-100"></div>
                    </div>
                    <h2 id="question-text" class="text-xl md:text-2xl font-medium leading-relaxed mb-10 text-slate-800"></h2>
                    <div id="options-grid" class="space-y-4"></div>
                </div>
                <div class="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                    <button id="prev-btn" onclick="prevQuestion()" class="flex items-center gap-2 text-slate-400 hover:text-indigo-600 font-bold disabled:opacity-0 transition-all text-sm tracking-widest">PREV</button>
                    <button id="next-btn" onclick="nextQuestion()" class="bg-slate-900 hover:bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95 text-sm tracking-widest">
                        <span id="next-text">NEXT</span>
                    </button>
                </div>
            </div>

            <div id="result-card" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center fade-in border border-slate-100">
                <div id="loading-results">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
                    <p class="text-slate-600 font-medium">正在提交測驗結果...</p>
                </div>
                <div id="confirmation-msg" class="hidden">
                    <div class="mb-6 inline-block p-4 bg-green-50 rounded-full text-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-4 text-slate-800">提交完成</h2>
                    <p class="text-lg text-slate-600 leading-relaxed">
                        您好，我已經收到你的TOEIC多益測驗。<br>
                        後續可進行體驗課程 - <strong>Tony線上美語家教</strong>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // UPDATED WITH YOUR NEW SCRIPT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycby25l2Zoblq4pBVh-P77j9id3SJIo9VoYNvFyoAftZjZu4ehKliEP_SBia70ea-4UhlfQ/exec';
        
        const questions = [
            { q: "After Ms. Park's film, viewers are encouraged to stay for a short _______.", options: ["participation", "discussion", "attendance", "concurrence"], correct: 1 },
            { q: "Ms. Guelph _______ the seminar with the results of the latest marketing survey.", options: ["concluding", "will conclude", "was concluded", "conclude"], correct: 1 },
            { q: "Takagawa Co. renovated the building by constructing a _______ outside dining area.", options: ["beautifully", "beautiful", "beautify", "beauty"], correct: 1 },
            { q: "_______ 5,000 people visited Kowloon Finance's Web site yesterday.", options: ["Over", "Well", "Any", "Other"], correct: 0 },
            { q: "The technology convention is currently _______ a significantly larger audience.", options: ["calling", "suggesting", "happening", "attracting"], correct: 3 },
            { q: "Dr. Muniz is _______ to see the patient on Thursday at 5:15 P.M.", options: ["comfortable", "probable", "available", "possible"], correct: 2 },
            { q: "According to regulations, all staff must _______ request reimbursement.", options: ["formalize", "formally", "formality", "formal"], correct: 1 },
            { q: "_______ this morning's team meeting, Mr. Insel acknowledged the need for research.", options: ["Upon", "Across", "With", "During"], correct: 3 },
            { q: "In order to make its servers instantly _______, the restaurant hired a designer.", options: ["identify", "identifying", "identifiable", "identification"], correct: 2 },
            { q: "The owner _______ responds to all reviews that visitors post on the Internet.", options: ["slightly", "personally", "approximately", "recklessly"], correct: 1 },
            { q: "Eighty percent of doctors _______ that the new wash is better than the competitors'.", options: ["favor", "assure", "confess", "agree"], correct: 3 },
            { q: "_______ the annual inspection has been completed, the crew can begin installing.", options: ["With that", "In order that", "In that", "Now that"], correct: 3 },
            { q: "Mr. Griffon examined the applications for _______ who could handle the redesign.", options: ["him", "ours", "himself", "anyone"], correct: 3 },
            { q: "The laboratory manager is required to ensure proper _______ of all chemicals.", options: ["store", "storable", "stores", "storage"], correct: 3 },
            { q: "Seeing that your rent is now two weeks _______, you must pay an additional fee.", options: ["valuable", "remaining", "overdue", "owed"], correct: 2 },
            { q: "Ms. Pangchorn will answer her e-mails when she _______ from her trip.", options: ["return", "returning", "returns", "had returned"], correct: 2 },
            { q: "The Web site will be inaccessible _______ the hours of 2 A.M. and 4 A.M.", options: ["in", "since", "among", "between"], correct: 3 },
            { q: "Ms. Driscoll has a speaking _______ on Friday, October 13.", options: ["recruitment", "term", "topic", "engagement"], correct: 3 },
            { q: "The appliances were assembled at different factories, so they arrived _______.", options: ["separately", "separates", "separating", "separate"], correct: 0 },
            { q: "All customer _______, no matter how minor, should always be answered promptly.", options: ["inquiries", "inquiring", "inquiry", "inquired"], correct: 0 },
            { q: "Sanitation standards for their production line extend _______ those of others.", options: ["far", "even", "more", "beyond"], correct: 3 },
            { q: "The legal guarantee period is five years _______ 300 thousand kilometers.", options: ["plus", "or", "but", "to"], correct: 1 },
            { q: "Due to a lack of time, programmers have not updated the application _______.", options: ["continually", "shortly", "firmly", "recently"], correct: 3 },
            { q: "Manufacturers are producing efficient units _______ stricter government regulations.", options: ["prior to", "inasmuch as", "as a result of", "further from"], correct: 2 },
            { q: "Randit Corporation's history of 30 years of _______ service is unique.", options: ["reliable", "relied", "relying", "rely"], correct: 0 },
            { q: "Budget changes impacting employee incentives _______ to the CEO right away.", options: ["should be submitted", "will be submitting", "may have submitted", "has been submitted"], correct: 0 },
            { q: "The city is inviting public _______ on its plan to put up a commemorative plaque.", options: ["arrangement", "interest", "comment", "order"], correct: 2 },
            { q: "Mr. Ponchartrain, _______ is away on business, left Ms. Hyun in charge.", options: ["which", "whose", "that", "who"], correct: 3 },
            { q: "For safety reasons, visitors to the plant must be _______ while on site.", options: ["consulted", "escorted", "presented", "supported"], correct: 1 },
            { q: "Duchene Investment Firm provides free consultations to help _______ owners.", options: ["inexperienced", "indisputable", "unwilling", "unfamiliar"], correct: 0 }
        ];

        let currentIndex = 0;
        let answers = new Array(30).fill(null);
        let userName = "", userId = "";

        function startTest() {
            userName = document.getElementById('user-name').value.trim();
            userId = document.getElementById('user-id').value.trim();
            if(!userName || !userId.includes('@')) return alert("請輸入正確姓名與 Email。");
            document.getElementById('reg-card').classList.add('hidden');
            document.getElementById('quiz-header').classList.remove('hidden');
            document.getElementById('quiz-card').classList.remove('hidden');
            document.getElementById('user-display').innerText = `考生: ${userName}`;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('question-number').innerText = currentIndex + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('counter').innerText = `Question ${currentIndex + 1} / 30`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1)/30)*100}%`;
            const grid = document.getElementById('options-grid'); 
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const active = answers[currentIndex] === i;
                grid.innerHTML += `
                    <button onclick="select(${i})" class="w-full flex items-center p-5 rounded-xl border-2 text-left transition-all ${active ? 'border-indigo-600 bg-indigo-50 shadow-sm' : 'border-slate-100 hover:border-indigo-200'}">
                        <div class="w-6 h-6 rounded-full border-2 mr-4 flex-shrink-0 flex items-center justify-center ${active ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300'}">
                            ${active ? '<div class="w-2 h-2 bg-white rounded-full"></div>' : ''}
                        </div>
                        <span class="${active ? 'font-bold text-indigo-900' : 'text-slate-600'}">${opt}</span>
                    </button>`;
            });
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-text').innerText = currentIndex === 29 ? '完成提交' : '下一題 (NEXT)';
        }

        function select(i) { answers[currentIndex] = i; showQuestion(); }
        function prevQuestion() { if(currentIndex > 0) { currentIndex--; showQuestion(); } }
        function nextQuestion() {
            if(currentIndex < 29) { currentIndex++; showQuestion(); window.scrollTo(0,0); }
            else { submitTest(); }
        }

        function submitTest() {
            if (answers.includes(null)) { if(!confirm("您還有題目尚未完成，確定要提交嗎？")) return; }
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('result-card').classList.remove('hidden');
            
            fetch(scriptURL, {
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({ name: userName, id: userId, answers: answers })
            }).then(() => {
                document.getElementById('loading-results').classList.add('hidden');
                document.getElementById('confirmation-msg').classList.remove('hidden');
            }).catch(() => alert("提交失敗，請檢查網路。"));
        }
    </script>
</body>
</html>
