<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <title>課程預約 - Tony Online English</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="layout-manager.js"></script>
  <style>
    :root {
      --primary-blue: linear-gradient(135deg, #1e3a8a, #3b82f6);
      --secondary-orange: linear-gradient(135deg, #ea580c, #fb923c);
      --accent-purple: linear-gradient(135deg, #6d28d9, #a78bfa);
      --neutral-slate: linear-gradient(135deg, #334155, #64748b);
      --success-green: #22c55e;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
    }

    .container {
      display: flex; 
      flex-direction: column; 
      align-items: center;
      padding: 40px 20px; /* 給左右留一點留白，按鈕才不會貼邊 */
      width: 100%;
      max-width: 800px; /* 電腦版最大寬度 */
      box-sizing: border-box;
    }

    .slide-button {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      color: white;
      border-radius: 999px;
      text-decoration: none;
      margin-bottom: 20px;
      padding: 16px 30px; /* 縮減內距，讓按鈕變瘦 */
      width: 90%; /* 手機版佔比，確保左右有空隙 */
      font-size: 1.15rem;
      letter-spacing: 0.05rem;
      transition: all 0.3s ease;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.6s forwards;
      box-sizing: border-box;
    }

    .slide-button img {
      margin-left: 10px;
      width: 24px; /* 手機版圖示縮小一點更精緻 */
      height: 24px;
    }

    /* 漸層與背景 */
    .btn-50 {
      background: linear-gradient(-45deg, #1e3a8a, #3b82f6, #0ea5e9, #1e3a8a);
      background-size: 300% 300%;
      animation: gradientFlow 8s ease infinite, fadeIn 0.6s forwards;
    }
    .btn-25 { background: var(--secondary-orange); }
    .btn-rules { background: var(--accent-purple); }
    .btn-schedule { background: var(--neutral-slate); }

    /* Interaction */
    .slide-button:hover {
      transform: scale(1.02) translateY(-2px);
      filter: brightness(1.1);
    }

    .slide-button:active {
      transform: scale(0.98);
    }

    /* NEW 標籤優化：在手機上縮小一點 */
    .btn-schedule::after {
      content: 'NEW';
      position: absolute;
      top: -5px;
      right: 15px;
      background-color: var(--success-green);
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 800;
      transform: rotate(5deg);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 螢幕大於 768px 時的電腦版樣式 */
    @media (min-width: 768px) {
      .slide-button {
        width: 100%; /* 回到較寬的狀態 */
        font-size: 1.6rem;
        padding: 24px 50px;
      }
      .slide-button img {
        width: 32px;
        height: 32px;
      }
    }

    /* 按鈕出現延遲 */
    .slide-button:nth-child(1) { animation-delay: 0.1s; }
    .slide-button:nth-child(2) { animation-delay: 0.25s; }
    .slide-button:nth-child(3) { animation-delay: 0.4s; }
    .slide-button:nth-child(4) { animation-delay: 0.55s; }
  </style>
</head>
<body>

  <div class="container">
    <a id="booking-link-50" class="slide-button btn-50" href="#">
      預約 50 分鐘課程
      <img src="https://ik.imagekit.io/lql1uveoc/external-link.png?updatedAt=1754911187731" alt="icon" />
    </a>

    <a class="slide-button btn-25" href="https://koalendar.com/e/TonyOnlineEnglish/" target="_blank">
      預約 25 分鐘課程
      <img src="https://ik.imagekit.io/lql1uveoc/Schedule%20information/info.png?updatedAt=1761978562177" alt="icon" />
    </a>

    <a class="slide-button btn-rules" href="https://tonyonlineenglish.netlify.app/regulations" target="_blank">
      學生請假調課規範
      <img src="https://ik.imagekit.io/lql1uveoc/external-link.png?updatedAt=1754911187731" alt="icon" />
    </a>

    <a class="slide-button btn-schedule" href="https://tonyonlineenglish.netlify.app/ycs" target="_blank">
      查詢你的課表
      <img src="https://ik.imagekit.io/lql1uveoc/external-link.png?updatedAt=1754911187731" alt="icon" />
    </a>
  </div>

  <script>
    const urls = [
      'https://appt.link/meet-with-tony-w5vuHAPR/TonyOnlineEnglish50',
      'https://appt.link/meet-with-tony-lin-jsqoaDPU/TonyOnlineEnglish',
      'https://appt.link/TonyOnlineEnglishTutoring3/web-conference/'
    ];

    const bookingLink = document.getElementById('booking-link-50');

    bookingLink.addEventListener('click', function(event) {
      event.preventDefault();
      let clickCount = parseInt(localStorage.getItem('bookingLinkClickCount') || '0');
      const targetUrl = urls[clickCount % 3];
      clickCount++;
      localStorage.setItem('bookingLinkClickCount', clickCount);
      window.location.href = targetUrl;
    });
  </script>

</body>
</html>
