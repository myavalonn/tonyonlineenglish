<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony線上美語家教 - 課程規範</title>
<meta property="og:title" content="特殊時段課程週六午晚間/週日白天-Tony線上美語家教">
<meta property="og:description" content="升學 檢定 職場 公職 高考 面試 外商 觀光美語 展場英文 翻譯">
<meta property="og:url" content="https://tonyonlineenglish.netlify.app/ssc">
<meta property="og:image" content="https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/self-regulation.png?updatedAt=1773381043506">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/self-regulation.png?updatedAt=1773381043506">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #000;
    font-family: 'Noto Sans TC', "PingFang TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.75;
  }

  .page {
    padding: 36px 20px 80px;
    max-width: 100%;
  }

  /* ── LANG TOGGLE ── */
  .lang-toggle {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 32px;
  }
  .lang-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    background: #000;
    color: #fff;
    border: none;
    padding: 8px 22px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .lang-btn:hover { background: #333; }

  /* ── HEADER ── */
  .header {
    border-bottom: 3px solid #000;
    padding-bottom: 24px;
    margin-bottom: 48px;
  }
  .header-primary {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: #000;
  }
  .header-sub {
    margin-top: 12px;
    font-size: 1rem;
    font-weight: 700;
    color: #000;
  }

  /* ── BLOCK ── */
  .block {
    border-top: 3px solid #000;
    padding: 32px 0;
  }
  .block:last-of-type {
    border-bottom: 3px solid #000;
  }

  /* section tag — same size as body text */
  .section-tag {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: #000;
  }

  /* block title — on mobile stays on one line, no <br> */
  .block-title {
    font-size: 1.45rem;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 22px;
    color: #000;
    white-space: nowrap;
  }

  .body-text {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #000;
  }

  /* list — no dividers between items */
  ul.list {
    padding-left: 0;
    list-style: none;
  }
  ul.list li {
    font-size: 1rem;
    font-weight: 700;
    padding: 6px 0;
    color: #000;
  }

  .rate-row {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .rate-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rate-label {
    font-size: 1rem;
    font-weight: 700;
    color: #000;
  }
  .rate-formula {
    font-size: 1rem;
    font-weight: 700;
    color: #000;
  }
  .rate-badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    background: #000;
    color: #fff;
    padding: 4px 14px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .note-box {
    margin-top: 22px;
    border: 2px solid #000;
    padding: 20px;
  }
  .note-title {
    font-size: 1rem;
    font-weight: 900;
    margin-bottom: 8px;
    color: #000;
  }
  .note-box p {
    font-size: 1rem;
    font-weight: 700;
    color: #000;
  }

  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 700;
    color: #000;
  }

  /* ── DESKTOP ── */
  @media (min-width: 860px) {
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 72px 64px 120px;
    }
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
      margin-bottom: 64px;
      padding-bottom: 32px;
    }
    .header-primary { font-size: 3.6rem; }
    .header-sub { font-size: 1.1rem; text-align: right; align-self: end; }

    .block {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 56px;
      padding: 52px 0;
    }

    .section-tag { font-size: 1.1rem; }
    .block-title { font-size: 2rem; margin-bottom: 0; white-space: normal; }
    .body-text { font-size: 1.2rem; }
    ul.list li { font-size: 1.2rem; }
    .rate-row { gap: 32px; }
    .rate-label { font-size: 1.2rem; }
    .rate-formula { font-size: 1.2rem; }
    .rate-badge { font-size: 1.2rem; padding: 5px 18px; }
    .note-box { padding: 28px 32px; }
    .note-title { font-size: 1.1rem; }
    .note-box p { font-size: 1.2rem; }
    .lang-btn { font-size: 1.1rem; padding: 10px 28px; }
    footer { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- LANG TOGGLE -->
  <div class="lang-toggle">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div>
      <div class="header-primary" id="headerTitle">Tony 線上美語家教</div>
    </div>
    <div class="header-sub" id="headerSub">課程規範 · COURSE POLICY</div>
  </header>

  <!-- BLOCK 01 -->
  <div class="block">
    <div class="block-meta">
      <div class="section-tag" id="tag01">01 · 特殊時段</div>
      <div class="block-title" id="title01">哪些時段算特殊時段？</div>
    </div>
    <div class="block-content">
      <ul class="list">
        <li id="slot1">週六晚間 &nbsp;<strong>6pm – 9pm</strong></li>
        <li id="slot2">週日全天 &nbsp;<strong>10am – 3pm</strong></li>
      </ul>
      <div class="note-box">
        <div class="note-title" id="noteTag01">彈性預約時段</div>
        <p id="noteText01">以上為彈性預約時段，需個別詢問。老師保有拒絕預約之權利。</p>
      </div>
    </div>
  </div>

  <!-- BLOCK 02 -->
  <div class="block">
    <div class="block-meta">
      <div class="section-tag" id="tag02">02 · 費用倍率</div>
      <div class="block-title" id="title02">學生主動指定特殊時段</div>
    </div>
    <div class="block-content">
      <div class="rate-row">
        <div class="rate-item">
          <div class="rate-label" id="rate1label">週六晚間（6pm 後）指定上課</div>
          <div class="rate-formula" id="rate1formula">正常課程點數 <span class="rate-badge">× 1.2</span></div>
        </div>
        <div class="rate-item">
          <div class="rate-label" id="rate2label">週日指定上課</div>
          <div class="rate-formula" id="rate2formula">正常課程點數 <span class="rate-badge">× 1.33</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BLOCK 03 -->
  <div class="block">
    <div class="block-meta">
      <div class="section-tag" id="tag03">03 · 請假・調課</div>
      <div class="block-title" id="title03">特殊時段需提前 48 小時告知</div>
    </div>
    <div class="block-content">
      <div class="body-text" id="cancel1">逾時告知，仍需扣除該堂特殊時段課程點數。</div>
      <div class="body-text" style="margin-top: 14px;" id="cancel2">感謝您的合作與諒解。</div>
    </div>
  </div>

  <footer id="footer">Tony 線上美語家教 · 感謝您的配合</footer>
</div>

<script>
  let isEN = false;

  const content = {
    zh: {
      btnLabel: 'EN',
      headerTitle: 'Tony 線上美語家教',
      headerSub: '課程規範 · COURSE POLICY',
      tag01: '01 · 特殊時段',
      title01: '哪些時段算特殊時段？',
      slot1: '週六晚間 &nbsp;<strong>6pm – 9pm</strong>',
      slot2: '週日全天 &nbsp;<strong>10am – 3pm</strong>',
      noteTag01: '彈性預約時段',
      noteText01: '以上為彈性預約時段，需個別詢問。老師保有拒絕預約之權利。',
      tag02: '02 · 費用倍率',
      title02: '學生主動指定特殊時段',
      rate1label: '週六晚間（6pm 後）指定上課',
      rate1formula: '正常課程點數 <span class="rate-badge">× 1.2</span>',
      rate2label: '週日指定上課',
      rate2formula: '正常課程點數 <span class="rate-badge">× 1.33</span>',
      tag03: '03 · 請假・調課',
      title03: '特殊時段需提前 48 小時告知',
      cancel1: '逾時告知，仍需扣除該堂特殊時段課程點數。',
      cancel2: '感謝您的合作與諒解。',
      footer: 'Tony 線上美語家教 · 感謝您的配合',
    },
    en: {
      btnLabel: '中文',
      headerTitle: 'Tony Online English',
      headerSub: 'COURSE POLICY',
      tag01: '01 · Special Sessions',
      title01: 'What counts as a special session?',
      slot1: 'Saturday Evening &nbsp;<strong>6pm – 9pm</strong>',
      slot2: 'Sunday Daytime &nbsp;<strong>10am – 3pm</strong>',
      noteTag01: 'Flexible Booking',
      noteText01: 'These slots require individual inquiry. The instructor reserves the right to decline any booking.',
      tag02: '02 · Rate Multiplier',
      title02: 'Student-requested special sessions',
      rate1label: 'Saturday Evening (after 6 pm) — student-requested',
      rate1formula: 'Normal session points <span class="rate-badge">× 1.2</span>',
      rate2label: 'Sunday — student-requested',
      rate2formula: 'Normal session points <span class="rate-badge">× 1.33</span>',
      tag03: '03 · Cancellation',
      title03: '48-hour advance notice required',
      cancel1: 'Late notice: the special-session points for that lesson will still be deducted.',
      cancel2: 'Thank you for your cooperation and understanding.',
      footer: 'Tony Online English · Thank you for your cooperation',
    }
  };

  function toggleLang() {
    isEN = !isEN;
    const d = content[isEN ? 'en' : 'zh'];

    document.getElementById('langBtn').textContent = d.btnLabel;
    document.getElementById('headerTitle').innerHTML = d.headerTitle;
    document.getElementById('headerSub').textContent = d.headerSub;
    document.getElementById('tag01').textContent = d.tag01;
    document.getElementById('title01').textContent = d.title01;
    document.getElementById('slot1').innerHTML = d.slot1;
    document.getElementById('slot2').innerHTML = d.slot2;
    document.getElementById('noteTag01').textContent = d.noteTag01;
    document.getElementById('noteText01').textContent = d.noteText01;
    document.getElementById('tag02').textContent = d.tag02;
    document.getElementById('title02').textContent = d.title02;
    document.getElementById('rate1label').textContent = d.rate1label;
    document.getElementById('rate1formula').innerHTML = d.rate1formula;
    document.getElementById('rate2label').textContent = d.rate2label;
    document.getElementById('rate2formula').innerHTML = d.rate2formula;
    document.getElementById('tag03').textContent = d.tag03;
    document.getElementById('title03').textContent = d.title03;
    document.getElementById('cancel1').textContent = d.cancel1;
    document.getElementById('cancel2').textContent = d.cancel2;
    document.getElementById('footer').textContent = d.footer;

    document.documentElement.lang = isEN ? 'en' : 'zh-TW';
  }
</script>
</body>
</html>
