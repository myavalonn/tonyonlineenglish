<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生專區入口</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      font-size: 16px;
      color: white;
      background: #4a6cf7;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #3a55d1;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🔒 學生專區</h1>
    <p>請使用您的 Google 帳號登入以查看專屬內容</p>

    <a 
      class="btn"
      href="https://script.google.com/macros/s/AKfycbwrZvs2B0CPimIhWHnPSqKUlZkUuHLRPDjXnhmR0U0NHjv7-k7hWln7PGkGds8hI9sM/exec"
      target="_self"
    >
      進入學生專區
    </a>

    <div class="note">
      僅限授權學生使用
    </div>
  </div>

</body>
</html>
