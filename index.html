    <!-- 引入 Google 手寫字體讓 Tony 更接近圖片質感 -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* 套用您指定的深色背景與基礎設定 */
        html { 
            background-color: #060b1c !important; 
            margin: 0; 
            padding: 0; 
            scroll-behavior: smooth; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: "Microsoft JhengHei", sans-serif; 
            color: white; 
            overflow-x: hidden; 
            /* 多出 200px 空間，確保網頁可以滾動，才能觸發 Header 隱藏 */
            min-height: calc(100vh + 200px); 
        }

        /* 英雄區塊容器 */
        .hero {
            /* 使用 fixed (固定定位) 徹底解決被捲到畫面外的問題 */
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background-color: #060b1c !important; 
        }

        /* ====== 1. 照片從左側滑入 ====== */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 11, 28, 0.7), rgba(6, 11, 28, 0.8)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            transform: translateX(-100%);
            animation: slideInPhotoLeft 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* ====== 2. 內容區塊 ====== */
        .hero-content { 
            position: relative;
            z-index: 2;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* ====== 3. 左上角「課程詳細介紹」連結按鈕 ====== */
        .course-intro-btn {
            position: absolute;
            /* 🚀 電腦版位置：從 110px 往下移到 140px，避開 Header */
            top: 140px; 
            left: 30px;
            z-index: 100;
            text-decoration: none;
            color: white;
            font-size: clamp(1rem, 4vw, 1.25rem);
            font-weight: bold;
            background: linear-gradient(135deg, #4e54c8, #6B73FF); 
            padding: 12px 28px;
            border-radius: 40px; 
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 15px rgba(107, 115, 255, 0.6);
            opacity: 0; 
            animation: popInTopLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px; 
        }

        .course-intro-btn:hover {
            background: linear-gradient(135deg, #6B73FF, #4e54c8);
            box-shadow: 0 8px 25px rgba(107, 115, 255, 0.9);
            transform: scale(1.06); 
        }

        /* 小手點擊圖示浮動動畫 */
        .tap-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            animation: floatIcon 1.5s infinite ease-in-out alternate;
        }

        /* 針對平板與手機模式的專屬調整 */
        @media (max-width: 1024px) {
            .course-intro-btn {
                /* 🚀 平板模式：從 85px 往下移到 110px */
                top: 110px; 
                left: 20px;
                padding: 10px 24px;
            }
        }

        @media (max-width: 768px) {
            .course-intro-btn {
                /* 🚀 手機模式：從 65px 往下移到 90px，確保不被 Header 擋住 */
                top: 90px; 
                left: 15px;
                padding: 8px 18px;
                font-size: 0.95rem; 
            }
            .tap-icon {
                width: 22px;
                height: 22px;
            }
        }

        @keyframes floatIcon {
            from { transform: translateY(0); }
            to { transform: translateY(-4px) scale(1.05); }
        }

        /* ====== 4. 標題群組從右側滑入 ====== */
        .title-group {
            transform: translateX(100vw); 
            opacity: 0;
            animation: slideInTextRight 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2.5vh 0;
        }

        .main-title {
            font-size: clamp(2rem, 9.5vw, 6rem); 
            font-weight: 900;
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .tony-name { 
            color: #6B73FF; 
            font-family: 'Pacifico', 'Comic Sans MS', 'Brush Script MT', cursive; 
            font-weight: normal; 
            margin-right: 2vw; 
            padding-right: 0.5vw;
            text-shadow: 0px 0px 10px rgba(107, 115, 255, 0.6); 
        }

        .subtitle-italic {
            font-size: clamp(1rem, 4.5vw, 2rem);
            font-style: italic;
            font-weight: 400;
            color: #f1f1f1;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .slogan-text {
            font-size: clamp(0.9rem, 4vw, 1.8rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            margin: 4px 0;
            letter-spacing: 1.5px;
            font-style: italic; 
        }

        /* ====== 5. 標籤區域與動畫 ====== */
        .tags-container {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            max-width: 95vw;
        }

        .tag {
            font-size: clamp(0.75rem, 3.5vw, 1rem);
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }

        .tags-top { 
            transform: translateY(-50px); 
            opacity: 0;
            animation: slideInTop 1s ease-out 0.6s forwards; 
        }

        .tags-bottom { 
            transform: translateY(50px); 
            opacity: 0;
            animation: slideInBottom 1s ease-out 0.6s forwards; 
        }

        /* ====== 動畫定義 ====== */
        @keyframes slideInPhotoLeft { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(0); } 
        }
        @keyframes slideInTextRight { 
            from { transform: translateX(100vw); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        @keyframes slideInTop { 
            from { transform: translateY(-50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes slideInBottom { 
            from { transform: translateY(50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes popInTopLeft {
            from { transform: translate(-20px, -20px); opacity: 0; }
            to { transform: translate(0, 0); opacity: 1; }
        }
    </style>

    <!-- 💡 原本的排版腳本 -->
    <script src="layout-manager.js"></script>

    <!-- 🚀 自動往下微滾動，以觸發隱藏 Header 的邏輯 -->
    <script>
        (function() {
            window.addEventListener('load', () => {
                // 將延遲時間設為 2000 毫秒 (2秒)，讓 Header 停留 2 秒後再隱藏
                setTimeout(() => {
                    const scrollOffset = window.innerWidth > 1024 ? 180 : 100;
                    window.scrollTo({
                        top: scrollOffset,
                        behavior: 'smooth'
                    });
                }, 2000); 
            });
        })();
    </script>
