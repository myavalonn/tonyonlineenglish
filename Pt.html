<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff; --surf: #f5f5f5; --card: #ffffff;
    --border: #e0e0e0; --border2: #c0c0c0;
    --text: #111111; --sub: #444444; --muted: #999999;
    --red: #cc0000; --orange: #d97706; --r: 8px;
    --mono: 'Inter', sans-serif; --sans: 'Noto Sans TC', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100dvh; }

  #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 999; transition: opacity 0.5s ease; }
  #loader.out { opacity: 0; pointer-events: none; }
  .loader-ring { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.9s linear infinite; }
  .loader-text { font-family: var(--mono); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.96); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); padding: 14px 20px; }
  .hrow { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .logo { font-family: var(--mono); font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 7px; height: 7px; background: var(--text); border-radius: 50%; animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.6)} }

  .tabs { display: flex; background: var(--surf); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab { font-family: var(--mono); font-size: 0.9rem; font-weight: 700; padding: 7px 16px; border-radius: 5px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--text); color: var(--bg); }

  .right-actions { display: flex; align-items: center; gap: 10px; }
  .saving-pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.75rem; font-weight: 700; background: var(--surf); border: 1.5px solid var(--border2); border-radius: 4px; padding: 5px 10px; }
  .saving-spin { width: 9px; height: 9px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .overdue-btn { font-family: var(--mono); font-size: 0.8rem; font-weight: 700; color: var(--bg); background: var(--red); padding: 7px 14px; border-radius: 20px; border: none; cursor: pointer; display: none; align-items: center; gap: 5px; animation: pulseRed 2s infinite; }
  @keyframes pulseRed { 0%{box-shadow:0 0 0 0 rgba(204,0,0,0.4)}70%{box-shadow:0 0 0 8px rgba(0,0,0,0)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0)} }
  .add-btn { font-family: var(--mono); font-size: 0.95rem; font-weight: 700; padding: 8px 16px; border-radius: var(--r); border: 2px solid var(--text); background: transparent; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { background: var(--text); color: var(--bg); }

  .filter-bar { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .filter-btn { font-family: var(--mono); font-size: 0.75rem; font-weight: 700; padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border2); background: transparent; color: var(--sub); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .filter-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }
  .task-count { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); margin-left: auto; }

  .list-wrap { max-width: 860px; margin: 0 auto; padding: 8px 20px 80px; }

  .task-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; }

  .checkbox { width: 22px; height: 22px; border: 2px solid var(--border2); border-radius: 5px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; background: var(--bg); transition: all 0.15s; }
  .task-row.done .checkbox { background: var(--text); border-color: var(--text); color: var(--bg); }

  .task-body { flex: 1; min-width: 0; cursor: pointer; }
  .task-text { font-size: 1rem; font-weight: 500; line-height: 1.5; word-break: break-word; }
  .task-row.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
  .p-tag { font-family: var(--mono); font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
  .p-normal   { background: #e0e0e0; color: var(--sub); }
  .p-necessary{ background: #fef3c7; color: var(--orange); border: 1px solid #fde68a; }
  .p-urgent   { background: #fee2e2; color: var(--red); border: 1px solid #fca5a5; }
  .task-date { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }

  .del-btn { flex-shrink: 0; width: 28px; height: 28px; background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
  .del-btn:hover { color: #fff; background: var(--red); }

  .empty-state { text-align: center; padding: 60px 20px; font-family: var(--mono); color: var(--muted); font-size: 0.9rem; letter-spacing: 0.05em; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal { background: var(--bg); border-radius: var(--r); width: 100%; max-width: 420px; padding: 28px; transform: translateY(16px); transition: transform 0.2s; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal h2 { font-family: var(--mono); font-size: 1.2rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-family: var(--mono); font-size: 0.8rem; font-weight: 700; margin-bottom: 7px; color: var(--sub); }
  .form-group input, .form-group select { width: 100%; padding: 11px 13px; border: 2px solid var(--border); border-radius: 6px; font-size: 1rem; font-family: var(--sans); outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--text); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn { font-family: var(--mono); font-weight: 700; font-size: 0.95rem; padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-cancel { background: var(--surf); border: 2px solid var(--border); }
  .btn-submit { background: var(--text); color: var(--bg); }
  .overdue-list { max-height: 340px; overflow-y: auto; }

  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: var(--bg); font-family: var(--mono); font-size: 0.9rem; font-weight: 700; padding: 12px 24px; border-radius: 50px; z-index: 200; opacity: 0; pointer-events: none; transition: all 0.3s; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.fail { background: var(--red); }

  /* ---------------------------------------------------- */
  /* RESPONSIVE SCALING FOR TABLET (2x) AND DESKTOP (2.5x)*/
  /* ---------------------------------------------------- */
  @media (min-width: 768px) {
    html { font-size: 200%; }
    .checkbox { width: 44px; height: 44px; font-size: 26px; }
    .del-btn { width: 56px; height: 56px; font-size: 40px; }
    .modal { max-width: 840px; }
  }
  @media (min-width: 1024px) {
    html { font-size: 250%; }
    .checkbox { width: 55px; height: 55px; font-size: 32.5px; }
    .del-btn { width: 70px; height: 70px; font-size: 50px; }
    .modal { max-width: 1050px; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading…</div>
</div>
<div id="toast"></div>

<header>
  <div class="hrow">
    <div class="logo"><div class="logo-dot"></div>PROJECT TRACKER</div>
    <div class="tabs">
      <button class="tab active" onclick="switchCategory('trivia', this)">Trivia</button>
      <button class="tab" onclick="switchCategory('website', this)">Website Idea</button>
    </div>
    <div class="right-actions">
      <div class="saving-pill" id="savingPill" style="display:none"><span class="saving-spin"></span>SAVING</div>
      <button id="overdueBtn" class="overdue-btn" onclick="openOverdueModal()">&#9888; <span id="overdueCount">0</span> OVERDUE</button>
      <button class="add-btn" onclick="openAddModal()">+ ADD</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('todo',this)">To Do</button>
  <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('urgent',this)">Urgent</button>
  <button class="filter-btn" onclick="setFilter('necessary',this)">Necessary</button>
  <button class="filter-btn" onclick="setFilter('normal',this)">Normal</button>
  <span class="task-count" id="taskCount"></span>
</div>

<div class="list-wrap" id="listWrap"></div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>NEW TASK</h2>
    <div class="form-group">
      <label>TASK DESCRIPTION</label>
      <input type="text" id="taskText" placeholder="What needs to be done?" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>PRIORITY</label>
      <select id="taskPriority">
        <option value="normal">Normal</option>
        <option value="necessary">Necessary</option>
        <option value="urgent">Urgent</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModals()">CANCEL</button>
      <button class="btn btn-submit" onclick="saveNewTask()">SAVE</button>
    </div>
  </div>
</div>

<!-- Overdue Modal -->
<div class="modal-overlay" id="overdueModal">
  <div class="modal">
    <h2 style="color:var(--red)">&#9888; UNFINISHED TASKS</h2>
    <div class="overdue-list" id="overdueList"></div>
    <div class="modal-actions"><button class="btn btn-cancel" onclick="closeModals()">CLOSE</button></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbytaAAN3vXLMK2pxkmZRzGjqHnVHbmoC00J4HsPWEN90qTx29Y69jYTQAe0VJHCzujb4Q/exec';
const DAY_ZH = ['日','一','二','三','四','五','六'];

let currentCategory = 'trivia';
let currentFilter = 'all';
let allTasks = [];
let savesInFlight = 0;

window.addEventListener('DOMContentLoaded', loadData);

function loadData() {
  showLoader(true);
  apiFetch('getTasks').then(data => {
    allTasks = data || [];
    renderUI();
  }).catch(err => {
    alert("Connection Error: " + err.message);
    toast("Failed to load data", "fail");
  }).finally(() => showLoader(false));
}

function renderUI() {
  renderList();
  checkOverdue();
}

function switchCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderUI();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function getFiltered() {
  let tasks = allTasks.filter(t => t.category === currentCategory);
  if (currentFilter === 'todo')      tasks = tasks.filter(t => !t.done);
  else if (currentFilter === 'done') tasks = tasks.filter(t => t.done);
  else if (currentFilter === 'urgent')    tasks = tasks.filter(t => t.priority === 'urgent');
  else if (currentFilter === 'necessary') tasks = tasks.filter(t => t.priority === 'necessary');
  else if (currentFilter === 'normal')    tasks = tasks.filter(t => t.priority === 'normal');
  // undone first, newest first
  tasks.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return Number(b.id) - Number(a.id);
  });
  return tasks;
}

// Use the task ID (which is Date.now()) to reconstruct exact creation time
function formatCreatedTime(id) {
  const ts = parseInt(id);
  if (isNaN(ts) || ts < 1_000_000_000_000) return '';
  const d = new Date(ts);
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const weekday = DAY_ZH[d.getDay()];
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${month}月${day}日 星期${weekday} ${hh}:${mm} 新增`;
}

function renderList() {
  const wrap = document.getElementById('listWrap');
  const tasks = getFiltered();
  document.getElementById('taskCount').textContent = tasks.length + ' 項';

  if (tasks.length === 0) {
    wrap.innerHTML = '<div class="empty-state">NO TASKS</div>';
    return;
  }

  wrap.innerHTML = tasks.map(t => `
    <div class="task-row${t.done ? ' done' : ''}" id="task-${t.id}">
      <div class="checkbox" onclick="toggleTask('${t.id}')">${t.done ? '✓' : ''}</div>
      <div class="task-body" onclick="toggleTask('${t.id}')">
        <div class="task-text">${escapeHtml(t.text)}</div>
        <div class="task-meta">
          <span class="p-tag p-${t.priority}">${t.priority}</span>
          <span class="task-date">${formatCreatedTime(t.id)}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask(event,'${t.id}')">&times;</button>
    </div>`).join('');
}

function saveNewTask() {
  const text = document.getElementById('taskText').value.trim();
  const priority = document.getElementById('taskPriority').value;
  if (!text) return toast("Please enter task text", "fail");
  const now = new Date();
  const dateStr = fmt(now);
  const newTask = { id: Date.now().toString(), category: currentCategory, date: dateStr, text, priority, done: false };
  allTasks.push(newTask);
  renderUI();
  closeModals();
  incSave();
  apiFetch('addTask', newTask).then(() => {
    decSave(); toast("Saved ✓");
  }).catch(err => {
    decSave();
    alert("Backend Error: " + err.message);
    toast("Save failed", "fail");
    allTasks = allTasks.filter(t => t.id !== newTask.id);
    renderUI();
  });
}

function toggleTask(id) {
  const task = allTasks.find(t => String(t.id) === String(id));
  if (!task) return;
  task.done = !task.done;
  incSave();
  renderUI();
  apiFetch('toggleTask', { id: task.id, done: task.done }).then(() => {
    decSave();
  }).catch(err => {
    decSave();
    alert("Backend Error: " + err.message);
    task.done = !task.done;
    renderUI();
    toast("Sync failed", "fail");
  });
}

function deleteTask(event, id) {
  event.stopPropagation();
  if (!confirm("Delete this task?")) return;
  const idx = allTasks.findIndex(t => String(t.id) === String(id));
  const backup = allTasks[idx];
  allTasks.splice(idx, 1);
  renderUI();
  incSave();
  apiFetch('deleteTask', { id }).then(() => {
    decSave(); toast("Deleted");
  }).catch(err => {
    decSave();
    alert("Backend Error: " + err.message);
    allTasks.push(backup);
    renderUI();
    toast("Delete failed", "fail");
  });
}

function checkOverdue() {
  const todayStr = fmt(new Date());
  const overdue = allTasks.filter(t => t.category === currentCategory && !t.done && String(t.date).substring(0,10) < todayStr);
  const btn = document.getElementById('overdueBtn');
  if (overdue.length > 0) { btn.style.display = 'flex'; document.getElementById('overdueCount').textContent = overdue.length; }
  else { btn.style.display = 'none'; }
}

function openOverdueModal() {
  const todayStr = fmt(new Date());
  const overdue = allTasks.filter(t => t.category === currentCategory && !t.done && String(t.date).substring(0,10) < todayStr);
  document.getElementById('overdueList').innerHTML = overdue.map(t => `
    <div class="task-row" style="padding:12px 0;">
      <div class="checkbox" onclick="toggleTask('${t.id}')"></div>
      <div class="task-body" onclick="toggleTask('${t.id}')">
        <div class="task-text">${escapeHtml(t.text)}</div>
        <div class="task-meta">
          <span class="p-tag p-${t.priority}">${t.priority}</span>
          <span class="task-date">${formatCreatedTime(t.id)}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask(event,'${t.id}')">&times;</button>
    </div>`).join('');
  document.getElementById('overdueModal').classList.add('active');
}

function openAddModal() {
  document.getElementById('taskText').value = '';
  document.getElementById('taskPriority').value = 'normal';
  document.getElementById('addModal').classList.add('active');
  setTimeout(() => document.getElementById('taskText').focus(), 200);
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

function apiFetch(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const url = new URL(API);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', cbName);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
    const script = document.createElement('script');
    script.src = url.toString();
    const cleanup = () => { delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); };
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timed out.')); }, 12000);
    window[cbName] = (json) => { clearTimeout(timer); cleanup(); if (json.error) reject(new Error(json.error)); else resolve(json.data); };
    script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('Network error.')); };
    document.head.appendChild(script);
  });
}

function incSave() { savesInFlight++; document.getElementById('savingPill').style.display='inline-flex'; }
function decSave() { savesInFlight=Math.max(0,savesInFlight-1); if(!savesInFlight) document.getElementById('savingPill').style.display='none'; }
function showLoader(show) { document.getElementById('loader').classList.toggle('out',!show); }
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function escapeHtml(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

let _toast;
function toast(msg,type=''){const e=document.getElementById('toast');e.textContent=msg;e.className=['show',type].filter(Boolean).join(' ');clearTimeout(_toast);_toast=setTimeout(()=>{e.className='';},2600);}
</script>
</body>
</html>
