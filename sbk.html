<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony線上美語家教 Tony Online English Tutoring</title>

<!-- ⚡ SPEED UPGRADE: Preconnecting fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="layout-manager.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Responsive Font Scaling System */
  html { font-size: 24px; } /* 1.5x Base for Cellphone */
  @media (min-width: 768px) { html { font-size: 32px; } } /* 2x Base for Tablet */
  @media (min-width: 1024px) { html { font-size: 48px; } } /* 3x Base for Desktop */

  :root {
    --black: #0a0a0a; --white: #fafafa; --gray-100: #f0f0f0;
    --gray-200: #e0e0e0; --gray-400: #999; --gray-600: #555;
    --border: 0.0625rem solid #e0e0e0; --radius: 0.375rem;
    --font-mono: 'DM Mono', monospace; 
    --font-sans: 'DM Sans', 'Noto Sans TC', sans-serif;
  }

  body { font-family: var(--font-sans); background: var(--white); color: var(--black); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  
  #secret-zone { position: fixed; top: 0; left: 0; width: 4.375rem; height: 4.375rem; z-index: 9999; cursor: default; }
  
  /* Fixed Header */
  header { 
    position: relative; 
    z-index: 10000; /* Prevent widget overlap */
    background: var(--white); 
    border-bottom: var(--border); 
    padding: 1.75rem 2.5rem; 
    display: flex; 
    flex-direction: column; 
    gap: 0.25rem; 
    align-items: flex-start; /* Force Left Alignment */
    text-align: left;
  }
  .brand { font-family: var(--font-mono); font-size: 0.875rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .brand-sub { font-size: 0.8125rem; color: var(--gray-400); font-weight: 300; letter-spacing: 0.02em; }
  
  main { max-width: 42.5rem; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
  .page-title { font-size: 1.625rem; font-weight: 400; margin-bottom: 0.5rem; }
  .page-sub { font-size: 0.875rem; color: var(--gray-400); margin-bottom: 3rem; font-weight: 300; }

  /* ── 載入動畫 (Loading Spinner) ── */
  .loader {
    width: 1.625rem; height: 1.625rem; border: 0.125rem solid var(--gray-200);
    border-top-color: var(--black); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Calendar Styles ── */
  .calendar-container { margin-bottom: 2rem; border: var(--border); border-radius: 0.5rem; padding: 1.25rem; background: var(--white); }
  .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; font-family: var(--font-mono); font-size: 0.875rem; font-weight: 500; }
  .calendar-header button { background: none; border: 0.0625rem solid var(--gray-200); border-radius: 0.25rem; padding: 0.375rem 0.75rem; font-size: 0.8125rem; cursor: pointer; color: var(--black); transition: 0.15s; font-family: var(--font-mono); }
  .calendar-header button:hover { background: var(--gray-100); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.25rem; text-align: center; }
  .cal-day-name { font-size: 0.6875rem; color: var(--gray-400); font-family: var(--font-mono); margin-bottom: 0.5rem; text-transform: uppercase; }
  .cal-cell { display: flex; align-items: center; justify-content: center; aspect-ratio: 1; font-size: 0.875rem; font-family: var(--font-mono); border-radius: var(--radius); color: var(--gray-200); user-select: none; }
  .cal-cell.available { color: var(--black); background: var(--gray-100); cursor: pointer; border: 0.0625rem solid transparent; transition: 0.15s; }
  .cal-cell.available:hover { background: var(--gray-200); border-color: var(--black); }
  .cal-cell.today { font-weight: bold; text-decoration: underline; }
  .cal-cell.selected { background: var(--black) !important; color: var(--white) !important; border-color: var(--black) !important; }

  /* Slots styles */
  .date-group { margin-bottom: 2rem; }
  .date-label { font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; color: var(--gray-600); margin-bottom: 0.75rem; padding-bottom: 0.625rem; border-bottom: var(--border); }
  .slots-row { display: flex; flex-wrap: wrap; gap: 0.5rem; padding-top: 0.375rem; }
  .slot-btn { font-family: var(--font-mono); font-size: 0.8125rem; padding: 0.625rem 1.25rem; border: 0.0625rem solid var(--black); background: transparent; color: var(--black); border-radius: var(--radius); cursor: pointer; transition: 0.15s; }
  .slot-btn:hover { background: var(--black); color: var(--white); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,10,0.6); z-index: 10000; align-items: center; justify-content: center; padding: 1.25rem; backdrop-filter: blur(2px); }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border: var(--border); border-radius: 0.75rem; width: 100%; max-width: 26.25rem; padding: 2.25rem 2rem; position: relative; box-shadow: 0 0.625rem 1.875rem rgba(0,0,0,0.1); }
  .modal-close { position: absolute; top: 1rem; right: 1.25rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-400); transition: 0.15s; }
  .modal-close:hover { color: var(--black); }
  .modal-title { font-size: 1.125rem; margin-bottom: 0.375rem; font-weight: 500; }
  .modal-slot-info { font-family: var(--font-mono); font-size: 0.8125rem; color: var(--gray-600); margin-bottom: 1.75rem; }

  .form-field { margin-bottom: 1.25rem; }
  .form-field label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.375rem; }
  .form-field input { width: 100%; padding: 0.75rem 0.875rem; border: var(--border); border-radius: var(--radius); font-size: 0.9375rem; background: var(--white); outline: none; transition: 0.15s; font-family: var(--font-sans); }
  .form-field input:focus { border-color: var(--black); }
  .btn-primary { width: 100%; padding: 0.875rem; background: var(--black); color: var(--white); border: none; border-radius: var(--radius); font-family: var(--font-sans); font-size: 0.875rem; font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: 0.15s; }
  .btn-primary:hover { opacity: 0.8; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-view { text-align: center; padding: 1rem 0; }
  .success-check { width: 3.5rem; height: 3.5rem; border: 0.125rem solid var(--black); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 1.5rem; color: var(--black); }
  .success-detail { font-size: 0.875rem; color: var(--gray-600); line-height: 1.8; white-space: pre-wrap; font-family: var(--font-mono); }

  #admin-panel { display: none; position: fixed; top: 0; right: 0; width: min(26.25rem, 100vw); height: 100vh; background: var(--black); color: var(--white); z-index: 50000; padding: 2rem 1.75rem; overflow-y: auto; }
  #admin-panel.open { display: block; }
  .admin-header { display: flex; justify-content: space-between; margin-bottom: 2rem; }
  .admin-title { font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; color: #888; }
  .admin-close { background: none; border: none; color: #888; font-size: 1.25rem; cursor: pointer; }
  .admin-form { border: 0.0625rem solid #333; border-radius: 0.5rem; padding: 1.25rem; margin-bottom: 2rem; background: #111; }
  .admin-field { margin-bottom: 0.875rem; }
  .admin-field label { display: block; font-size: 0.6875rem; color: #888; margin-bottom: 0.375rem; }
  .admin-field input, .admin-field select { width: 100%; padding: 0.625rem 0.75rem; background: #000; border: 0.0625rem solid #444; border-radius: 0.25rem; color: var(--white); outline: none; }
  .btn-admin-add { width: 100%; padding: 0.75rem; background: var(--white); color: var(--black); border: none; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
  .btn-admin-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .admin-slot-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .admin-slot-item { display: flex; justify-content: space-between; align-items: center; padding: 0.875rem; border: 0.0625rem solid #333; border-radius: 0.375rem; background: #111; }
  .admin-slot-info { font-family: var(--font-mono); font-size: 0.8125rem; color: #ccc; }
  .btn-delete { background: none; border: 0.0625rem solid #444; color: #999; padding: 0.375rem 0.75rem; border-radius: 0.25rem; cursor: pointer; font-size: 0.6875rem; transition: 0.15s; }
  .btn-delete:hover { border-color: #ff5555; color: #ff5555; }
  .empty-state { text-align: center; padding: 5rem 0; color: var(--gray-400); }
  .empty-line { display: block; width: 2.5rem; height: 0.0625rem; background: var(--gray-200); margin: 0 auto 1.5rem; }
  .empty-state-small { text-align: center; font-size: 0.875rem; color: var(--gray-400); margin-top: 1rem; }
</style>
</head>
<body>

<div id="secret-zone"></div>

<header>
  <span class="brand">Tony Online English Tutoring</span>
  <span class="brand">Tony線上美語家教 / Book a Lesson</span>
</header>

<main>
  <h1 class="page-title">Available slots / 可預約時段<br>特殊時段 Special time slots</h1>
  <p class="page-sub">Select a time (50 mins/session) <br> 請選擇時間（每堂 50 分鐘）</p>
  
  <div id="calendar-view"></div>
  <div id="slots-view"></div>
</main>

<!-- BOOKING MODAL -->
<div class="overlay" id="booking-overlay">
  <div class="modal" id="booking-modal">
    <button class="modal-close" onclick="closeBooking()">×</button>
    <div id="booking-form-view">
      <p class="modal-title">Confirm booking / 確認預約</p>
      <p class="modal-slot-info" id="selected-slot-label"></p>
      <div class="form-field">
        <label>Name / 姓名</label>
        <input type="text" id="inp-name" placeholder="Your name">
      </div>
      <div class="form-field">
        <label>Email / 電子郵件</label>
        <input type="email" id="inp-email" placeholder="your@email.com">
      </div>
      <button class="btn-primary" id="confirm-btn" onclick="confirmBooking()">Confirm / 確認預約 →</button>
    </div>
    <div id="booking-success-view" class="success-view" style="display:none">
      <div class="success-check">✓</div>
      <p class="success-title">Booking confirmed / 預約成功</p>
      <p class="success-detail" id="success-detail"></p>
      <button class="btn-primary" style="margin-top:1.5rem" onclick="closeBooking()">Done / 完成</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <span class="admin-title">Admin / 後台管理</span>
    <button class="admin-close" onclick="closeAdmin()">×</button>
  </div>
  <div class="admin-form">
    <p style="margin-bottom:0.75rem; font-size:0.8125rem; color:#fff;">Add new slot / 新增時段</p>
    <div class="admin-field">
      <label>Date / 日期</label>
      <input type="date" id="admin-date" onchange="updateAdminTimeDropdown()" />
    </div>
    <div class="admin-field">
      <label>Time / 時間 (即時同步 Google 日曆空檔)</label>
      <select id="admin-time">
        <option value="">請先選擇日期...</option>
      </select>
    </div>
    <button class="btn-admin-add" id="admin-add-btn" onclick="adminAddSlot()" disabled>+ Add Slot / 新增</button>
  </div>
  <p style="margin-bottom:0.75rem; font-size:0.8125rem; color:#fff;">All manually added slots / 已新增時段</p>
  <div class="admin-slot-list" id="admin-slot-list"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyFaTXNNblUQfsrqAwi-dcRb-ob9w2R7pLehyn8OpLB-hoorh2HFlXFFg26LZhHFNRZ/exec";

let gasData = JSON.parse(localStorage.getItem('tony_gas_cache') || '{}'); 
let manualSlots = JSON.parse(localStorage.getItem('tony_manual_slots') || '[]');
let loadedDates = new Set(Object.keys(gasData)); 
let isGasLoading = true;

// Calendar State
let currentMonthDate = new Date();
let selectedDateStr = null;
let initializedSelection = false;

const ALL_TIMES =['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00', '22:00'];

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const enDays =['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const zhDays =['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
  const dayIdx = d.getDay();
  return `${yyyy}.${mm}.${dd} ${enDays[dayIdx]} ${zhDays[dayIdx]}`;
}

function fmtTime(timeStr) {
  const[h, m] = timeStr.split(':').map(Number);
  const suffix = h >= 12 ? 'PM' : 'AM';
  return `${((h - 1 + 12) % 12) + 1}:${m.toString().padStart(2,'0')} ${suffix}`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toDateString(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

async function fetchManualSlots() {
  try {
    const res = await fetch(`${API_URL}?action=getManualSlots`);
    if (res.ok) {
      const data = await res.json();
      if (data.isInit) {
        manualSlots = data.slots;
        localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
      } else if (manualSlots.length > 0) {
        syncManualSlots();
      }
    }
  } catch (err) {}
}

async function syncManualSlots() {
  try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveManualSlots', slots: manualSlots }) }); } catch (err) {}
}

async function init() {
  if (manualSlots.length > 0 && Object.keys(gasData).length > 0) {
     renderStudentView();
  } else {
     document.getElementById('slots-view').innerHTML = `<div class="empty-state"><div class="loader"></div><p style="font-size:0.875rem; line-height:1.6;">Syncing slots...<br>同步最新時段中...</p></div>`;
  }

  const today = new Date();
  const ranges =[
    { startOffset: 0, days: 2 },   
    { startOffset: 2, days: 5 },   
    { startOffset: 7, days: 7 },   
    { startOffset: 14, days: 7 }   
  ];

  const firstDateStr = toDateString(today);
  const manualPromise = fetchManualSlots();
  const firstBatchPromise = fetch(`${API_URL}?action=getBatchSlots&startDate=${firstDateStr}&days=${ranges[0].days}`);

  await manualPromise; 
  renderStudentView(); 

  try {
    const res = await firstBatchPromise;
    if (!res.ok) throw new Error("Network error");
    const chunkData = await res.json();
    Object.assign(gasData, chunkData);
    localStorage.setItem('tony_gas_cache', JSON.stringify(gasData));
    for (let d = 0; d < ranges[0].days; d++) {
      const temp = new Date(today);
      temp.setDate(today.getDate() + d);
      loadedDates.add(toDateString(temp));
    }
    renderStudentView(); 
    if (document.getElementById('admin-panel').classList.contains('open')) updateAdminTimeDropdown();
  } catch (err) {
    gasData._error = true;
    renderStudentView();
    return;
  }

  for (let i = 1; i < ranges.length; i++) {
    const chunkDate = new Date(today);
    chunkDate.setDate(today.getDate() + ranges[i].startOffset);
    const startDateStr = toDateString(chunkDate);

    try {
      const res = await fetch(`${API_URL}?action=getBatchSlots&startDate=${startDateStr}&days=${ranges[i].days}`);
      if (!res.ok) continue;
      const chunkData = await res.json();
      Object.assign(gasData, chunkData);
      localStorage.setItem('tony_gas_cache', JSON.stringify(gasData)); 
      for (let d = 0; d < ranges[i].days; d++) {
        const temp = new Date(today);
        temp.setDate(today.getDate() + ranges[i].startOffset + d);
        loadedDates.add(toDateString(temp));
      }
      renderStudentView(); 
    } catch (err) { break; }
  }
  
  isGasLoading = false;
  renderStudentView(); 
}

function changeMonth(delta) {
  currentMonthDate.setMonth(currentMonthDate.getMonth() + delta);
  renderStudentView();
}

function selectDate(dateStr) {
  selectedDateStr = dateStr;
  renderStudentView();
}

function renderStudentView() {
  const view = document.getElementById('slots-view');
  const calView = document.getElementById('calendar-view');

  if (gasData._error) {
     calView.innerHTML = '';
     view.innerHTML = `<div class="empty-state"><span class="empty-line"></span><p style="color:#d93025; font-weight:500;">Failed to connect to Calendar.<br>連線至 Google 日曆失敗。</p></div>`;
     return;
  }

  const todayStr = toDateString(new Date());
  const validSlots = manualSlots.filter(ms => {
    if (ms.date < todayStr) return false;
    if (!loadedDates.has(ms.date)) return false; 
    const dayData = gasData[ms.date];
    if (!dayData) return false; 
    return dayData.slots && dayData.slots.some(gs => gs.time === ms.time);
  }).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

  if (validSlots.length === 0) {
    calView.innerHTML = '';
    if (isGasLoading) {
       view.innerHTML = `<div class="empty-state"><div class="loader"></div><p style="font-size:0.875rem; line-height:1.6;">Checking background schedule...<br>正在確認後續可預約的日期...</p></div>`;
       return;
    }
    view.innerHTML = `<div class="empty-state"><span class="empty-line"></span><p style="line-height:1.6;">No upcoming slots available.<br>目前沒有可預約的時段，請稍後再來查看。</p></div>`;
    return;
  }

  const grouped = {};
  validSlots.forEach(s => {
    if (!grouped[s.date]) grouped[s.date] = [];
    grouped[s.date].push(s);
  });

  const availableDates = Object.keys(grouped).sort();
  
  // Auto-select earliest date if nothing is selected yet
  if (!initializedSelection && availableDates.length > 0) {
      selectedDateStr = availableDates[0];
      const autoDate = new Date(selectedDateStr + 'T00:00:00');
      currentMonthDate = new Date(autoDate.getFullYear(), autoDate.getMonth(), 1);
      initializedSelection = true;
  }

  // --- Render Calendar Grid ---
  const year = currentMonthDate.getFullYear();
  const month = currentMonthDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  const monthNames =["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  let calHtml = `
  <div class="calendar-container">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">&#8592; Prev</button>
      <div>${year} / ${String(month+1).padStart(2,'0')}</div>
      <button onclick="changeMonth(1)">Next &#8594;</button>
    </div>
    <div class="calendar-grid">`;
  
  const weekDays =['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  weekDays.forEach(wd => { calHtml += `<div class="cal-day-name">${wd}</div>`; });

  for (let i = 0; i < firstDay.getDay(); i++) { calHtml += `<div class="cal-cell empty"></div>`; }

  for (let d = 1; d <= lastDay.getDate(); d++) {
      const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasSlots = grouped[dStr] && grouped[dStr].length > 0;
      
      let classes = "cal-cell";
      if (hasSlots) classes += " available";
      if (dStr === selectedDateStr) classes += " selected";
      if (dStr === todayStr) classes += " today";
      
      if (hasSlots) {
          calHtml += `<div class="${classes}" onclick="selectDate('${dStr}')">${d}</div>`;
      } else {
          calHtml += `<div class="${classes}">${d}</div>`;
      }
  }
  calHtml += `</div></div>`;
  calView.innerHTML = calHtml;

  // --- Render Buttons for the selected Date ---
  if (!selectedDateStr || !grouped[selectedDateStr]) {
      view.innerHTML = `<p class="empty-state-small">Please select an available date from the calendar. <br> 請從上方日曆選擇可預約日期。</p>`;
  } else {
      let html = `<div class="date-group"><div class="date-label">${fmtDate(selectedDateStr)}</div><div class="slots-row">`;
      grouped[selectedDateStr].forEach(s => { 
          html += `<button class="slot-btn" onclick="openBooking('${s.id}')">${fmtTime(s.time)}</button>`; 
      });
      html += `</div></div>`;
      view.innerHTML = html;
  }
}

// ── ADMIN EVENT HANDLERS ──
document.getElementById('secret-zone').addEventListener('dblclick', openAdmin);
let secretClickCount = 0, secretTimer = null;
document.getElementById('secret-zone').addEventListener('click', () => {
  secretClickCount++; clearTimeout(secretTimer);
  if (secretClickCount >= 3) { secretClickCount = 0; openAdmin(); }
  else { secretTimer = setTimeout(() => { secretClickCount = 0; }, 600); }
});

function openAdmin() {
  document.getElementById('admin-date').value = toDateString(new Date());
  updateAdminTimeDropdown(); 
  renderAdminList();
  document.getElementById('admin-panel').classList.add('open');
}

function closeAdmin() { document.getElementById('admin-panel').classList.remove('open'); }

function updateAdminTimeDropdown() {
  const dateVal = document.getElementById('admin-date').value;
  const timeSelect = document.getElementById('admin-time');
  const addBtn = document.getElementById('admin-add-btn');
  timeSelect.innerHTML = ''; addBtn.disabled = true;

  if (!dateVal) { timeSelect.innerHTML = '<option value="">請先選擇日期...</option>'; return; }
  if (gasData._error) { timeSelect.innerHTML = '<option value="">連線失敗</option>'; return; }

  if (!loadedDates.has(dateVal)) {
    if (!isGasLoading) timeSelect.innerHTML = '<option value="">此日期超出 21 天範圍</option>';
    else timeSelect.innerHTML = '<option value="">同步中，請稍候...</option>';
    return;
  }

  let hasOption = false;
  ALL_TIMES.forEach(time => {
    if (manualSlots.some(m => m.date === dateVal && m.time === time)) return; 
    const dayData = gasData[dateVal];
    if (!dayData || !dayData.slots || !dayData.slots.some(gs => gs.time === time)) return; 

    const opt = document.createElement('option');
    opt.value = time; opt.textContent = fmtTime(time);
    timeSelect.appendChild(opt);
    hasOption = true;
  });

  if (hasOption) { timeSelect.disabled = false; addBtn.disabled = false; } 
  else { timeSelect.innerHTML = '<option value="">已被預約或無可用空檔</option>'; timeSelect.disabled = true; }
}

function adminAddSlot() {
  const dateVal = document.getElementById('admin-date').value;
  const timeVal = document.getElementById('admin-time').value;
  if (!dateVal || !timeVal) return;

  manualSlots.push({ id: uid(), date: dateVal, time: timeVal, timestamp: new Date(`${dateVal}T${timeVal}:00`).getTime() });
  localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
  syncManualSlots(); 
  updateAdminTimeDropdown(); renderAdminList(); renderStudentView();
}

function adminDeleteSlot(slotId) {
  if (!confirm(`確定要刪除嗎？ Delete this slot?`)) return;
  manualSlots = manualSlots.filter(x => x.id !== slotId);
  localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
  syncManualSlots(); 
  updateAdminTimeDropdown(); renderAdminList(); renderStudentView();
}

function renderAdminList() {
  const list = document.getElementById('admin-slot-list');
  const sorted =[...manualSlots].sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  if (sorted.length === 0) { list.innerHTML = `<p style="font-family:var(--font-mono);font-size:0.75rem;color:#666;padding:0.75rem 0">尚未新增任何時段 No slots added</p>`; return; }
  
  list.innerHTML = sorted.map(s => `
    <div class="admin-slot-item">
      <div class="admin-slot-info">${fmtDate(s.date)} · ${fmtTime(s.time)}</div>
      <button class="btn-delete" onclick="adminDeleteSlot('${s.id}')">Delete</button>
    </div>
  `).join('');
}

// ── BOOKING SYSTEM ──
let pendingSlotId = null;

function openBooking(slotId) {
  pendingSlotId = slotId;
  const s = manualSlots.find(x => x.id === slotId);
  if (!s) return;
  document.getElementById('selected-slot-label').textContent = `${fmtDate(s.date)} · ${fmtTime(s.time)}`;
  document.getElementById('inp-name').value = ''; document.getElementById('inp-email').value = '';
  document.getElementById('booking-form-view').style.display = ''; document.getElementById('booking-success-view').style.display = 'none';
  const btn = document.getElementById('confirm-btn'); btn.disabled = false; btn.textContent = 'Confirm / 確認預約 →';
  document.getElementById('booking-overlay').classList.add('open');
}

function closeBooking() { document.getElementById('booking-overlay').classList.remove('open'); pendingSlotId = null; }

function confirmBooking() {
  const name = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name || !email || !email.includes('@')) { alert('Please enter a valid email / 請輸入正確的信箱'); return; }

  const btn = document.getElementById('confirm-btn'); btn.disabled = true; btn.textContent = 'Processing... / 處理中...';
  const s = manualSlots.find(x => x.id === pendingSlotId);
  if (!s) return closeBooking();

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ name: name, email: email, appointments:[{ dateStr: s.date, time: s.time, timestamp: s.timestamp }] })
  }).then(res => res.json()).then(res => {
      if (!res.success) { alert("Failed: " + res.message); btn.disabled = false; btn.textContent = 'Confirm / 確認預約 →'; return; }
      
      manualSlots = manualSlots.filter(x => x.id !== pendingSlotId);
      localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
      syncManualSlots(); 
      
      // Auto-jump selection out if the date is now empty
      const groupedAfter = {};
      manualSlots.forEach(ms => { if (!groupedAfter[ms.date]) groupedAfter[ms.date] = []; groupedAfter[ms.date].push(ms); });
      if (!groupedAfter[selectedDateStr] || groupedAfter[selectedDateStr].length === 0) { initializedSelection = false; }
      
      renderStudentView();
      if(document.getElementById('admin-panel').classList.contains('open')) { renderAdminList(); updateAdminTimeDropdown(); }
      
      document.getElementById('booking-form-view').style.display = 'none';
      document.getElementById('success-detail').textContent = `${fmtDate(s.date)}\n${fmtTime(s.time)}\n\nName: ${name}\nEmail: ${email}\n\n✓ A confirmation email has been sent.\n確認信已寄至您的信箱。`;
      document.getElementById('booking-success-view').style.display = '';
  }).catch(err => {
      alert("Network Error / 網路連線錯誤"); btn.disabled = false; btn.textContent = 'Confirm / 確認預約 →';
  });
}

// Start
init();
</script>
