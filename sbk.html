<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony線上美語家教 Tony Online English Tutoring</title>

<!-- ⚡ SPEED UPGRADE: Preconnecting fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a; --white: #fafafa; --gray-100: #f0f0f0;
    --gray-200: #e0e0e0; --gray-400: #999; --gray-600: #555;
    --border: 1px solid #e0e0e0; --radius: 6px;
    --font-mono: 'DM Mono', monospace; 
    --font-sans: 'DM Sans', 'Noto Sans TC', sans-serif;
  }

  body { font-family: var(--font-sans); background: var(--white); color: var(--black); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  
  #secret-zone { position: fixed; top: 0; left: 0; width: 70px; height: 70px; z-index: 9999; cursor: default; }
  
  header { border-bottom: var(--border); padding: 28px 40px; display: flex; flex-direction: column; gap: 4px; }
  .brand { font-family: var(--font-mono); font-size: 14px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .brand-sub { font-size: 13px; color: var(--gray-400); font-weight: 300; letter-spacing: 0.02em; }
  main { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }
  .page-title { font-size: 26px; font-weight: 400; margin-bottom: 8px; }
  .page-sub { font-size: 14px; color: var(--gray-400); margin-bottom: 48px; font-weight: 300; }

  /* ── 載入動畫 (Loading Spinner) ── */
  .loader {
    width: 26px; height: 26px; border: 2px solid var(--gray-200);
    border-top-color: var(--black); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .date-group { margin-bottom: 32px; }
  .date-label { font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.05em; color: var(--gray-600); margin-bottom: 12px; padding-bottom: 10px; border-bottom: var(--border); }
  .slots-row { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 6px; }
  .slot-btn { font-family: var(--font-mono); font-size: 13px; padding: 10px 20px; border: 1px solid var(--black); background: transparent; color: var(--black); border-radius: var(--radius); cursor: pointer; transition: 0.15s; }
  .slot-btn:hover { background: var(--black); color: var(--white); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,10,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border: var(--border); border-radius: 12px; width: 100%; max-width: 420px; padding: 36px 32px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray-400); transition: 0.15s; }
  .modal-close:hover { color: var(--black); }
  .modal-title { font-size: 18px; margin-bottom: 6px; font-weight: 500; }
  .modal-slot-info { font-family: var(--font-mono); font-size: 13px; color: var(--gray-600); margin-bottom: 28px; }

  .form-field { margin-bottom: 20px; }
  .form-field label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
  .form-field input { width: 100%; padding: 12px 14px; border: var(--border); border-radius: var(--radius); font-size: 15px; background: var(--white); outline: none; transition: 0.15s; font-family: var(--font-sans); }
  .form-field input:focus { border-color: var(--black); }
  .btn-primary { width: 100%; padding: 14px; background: var(--black); color: var(--white); border: none; border-radius: var(--radius); font-family: var(--font-sans); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: 0.15s; }
  .btn-primary:hover { opacity: 0.8; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-view { text-align: center; padding: 16px 0; }
  .success-check { width: 56px; height: 56px; border: 2px solid var(--black); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px; color: var(--black); }
  .success-detail { font-size: 14px; color: var(--gray-600); line-height: 1.8; white-space: pre-wrap; font-family: var(--font-mono); }

  #admin-panel { display: none; position: fixed; top: 0; right: 0; width: min(420px, 100vw); height: 100vh; background: var(--black); color: var(--white); z-index: 5000; padding: 32px 28px; overflow-y: auto; }
  #admin-panel.open { display: block; }
  .admin-header { display: flex; justify-content: space-between; margin-bottom: 32px; }
  .admin-title { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; color: #888; }
  .admin-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
  .admin-form { border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 32px; background: #111; }
  .admin-field { margin-bottom: 14px; }
  .admin-field label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; }
  .admin-field input, .admin-field select { width: 100%; padding: 10px 12px; background: #000; border: 1px solid #444; border-radius: 4px; color: var(--white); outline: none; }
  .btn-admin-add { width: 100%; padding: 12px; background: var(--white); color: var(--black); border: none; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .btn-admin-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .admin-slot-list { display: flex; flex-direction: column; gap: 8px; }
  .admin-slot-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid #333; border-radius: 6px; background: #111; }
  .admin-slot-info { font-family: var(--font-mono); font-size: 13px; color: #ccc; }
  .btn-delete { background: none; border: 1px solid #444; color: #999; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.15s; }
  .btn-delete:hover { border-color: #ff5555; color: #ff5555; }
  .empty-state { text-align: center; padding: 80px 0; color: var(--gray-400); }
  .empty-line { display: block; width: 40px; height: 1px; background: var(--gray-200); margin: 0 auto 24px; }
</style>
</head>
<body>

<div id="secret-zone"></div>

<header>
  <span class="brand">Tony Online English Tutoring</span>
  <span class="brand-sub">Tony線上美語家教 / Book a Lesson</span>
</header>

<main>
  <h1 class="page-title">Available slots / 可預約時段<br>特殊時段 Special time slots</h1>
  <p class="page-sub">Select a time (50 mins/session) <br> 請選擇時間（每堂 50 分鐘）</p>
  <div id="slots-view"></div>
</main>

<!-- BOOKING MODAL -->
<div class="overlay" id="booking-overlay">
  <div class="modal" id="booking-modal">
    <button class="modal-close" onclick="closeBooking()">×</button>
    <div id="booking-form-view">
      <p class="modal-title">Confirm booking / 確認預約</p>
      <p class="modal-slot-info" id="selected-slot-label"></p>
      <div class="form-field">
        <label>Name / 姓名</label>
        <input type="text" id="inp-name" placeholder="Your name">
      </div>
      <div class="form-field">
        <label>Email / 電子郵件</label>
        <input type="email" id="inp-email" placeholder="your@email.com">
      </div>
      <button class="btn-primary" id="confirm-btn" onclick="confirmBooking()">Confirm / 確認預約 →</button>
    </div>
    <div id="booking-success-view" class="success-view" style="display:none">
      <div class="success-check">✓</div>
      <p class="success-title">Booking confirmed / 預約成功</p>
      <p class="success-detail" id="success-detail"></p>
      <button class="btn-primary" style="margin-top:24px" onclick="closeBooking()">Done / 完成</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <span class="admin-title">Admin / 後台管理</span>
    <button class="admin-close" onclick="closeAdmin()">×</button>
  </div>
  <div class="admin-form">
    <p style="margin-bottom:12px; font-size:13px; color:#fff;">Add new slot / 新增時段</p>
    <div class="admin-field">
      <label>Date / 日期</label>
      <input type="date" id="admin-date" onchange="updateAdminTimeDropdown()" />
    </div>
    <div class="admin-field">
      <label>Time / 時間 (系統即時同步 Google 日曆空檔)</label>
      <select id="admin-time">
        <option value="">請先選擇日期...</option>
      </select>
    </div>
    <button class="btn-admin-add" id="admin-add-btn" onclick="adminAddSlot()" disabled>+ Add Slot / 新增</button>
  </div>
  <p style="margin-bottom:12px; font-size:13px; color:#fff;">All manually added slots / 已新增時段</p>
  <div class="admin-slot-list" id="admin-slot-list"></div>
</div>

<script>
// 您專屬的 Google Apps Script 網址
const API_URL = "https://script.google.com/macros/s/AKfycbyFaTXNNblUQfsrqAwi-dcRb-ob9w2R7pLehyn8OpLB-hoorh2HFlXFFg26LZhHFNRZ/exec";

// 🚀 終極快取機制：讀取本地記憶體，達到 0 秒開網頁
let gasData = JSON.parse(localStorage.getItem('tony_gas_cache') || '{}'); 
let manualSlots = JSON.parse(localStorage.getItem('tony_manual_slots') || '[]');
let loadedDates = new Set(Object.keys(gasData)); // 初始化已經有的日期
let isGasLoading = true;

const ALL_TIMES =['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00', '22:00'];

// 📅 日期格式化：2026.03.03 Tue 週二
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const enDays =['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const zhDays =['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
  const dayIdx = d.getDay();
  return `${yyyy}.${mm}.${dd} ${enDays[dayIdx]} ${zhDays[dayIdx]}`;
}

function fmtTime(timeStr) {
  const[h, m] = timeStr.split(':').map(Number);
  const suffix = h >= 12 ? 'PM' : 'AM';
  return `${((h - 1 + 12) % 12) + 1}:${m.toString().padStart(2,'0')} ${suffix}`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toDateString(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// ── ⚡ 伺服器同步邏輯 ──
async function fetchManualSlots() {
  try {
    const res = await fetch(`${API_URL}?action=getManualSlots`);
    if (res.ok) {
      const data = await res.json();
      if (data.isInit) {
        manualSlots = data.slots;
        localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
      } else if (manualSlots.length > 0) {
        syncManualSlots();
      }
    }
  } catch (err) {
    console.warn("Using local slots due to fetch error:", err);
  }
}

async function syncManualSlots() {
  try {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveManualSlots', slots: manualSlots }) });
  } catch (err) {}
}

// ── ⚡ 極速載入邏輯：本地快取 + 背景分批抓取 ──
async function init() {
  // 1. 如果有快取，瞬間渲染畫面 (0秒延遲)
  if (manualSlots.length > 0 && Object.keys(gasData).length > 0) {
     renderStudentView();
  } else {
     // 沒有快取才顯示等待動畫
     const view = document.getElementById('slots-view');
     view.innerHTML = `<div class="empty-state"><div class="loader"></div><p style="font-size:14px; line-height:1.6;">Syncing slots...<br>同步最新時段中...</p></div>`;
  }

  const today = new Date();
  
  // 2. 依您要求，首批將伺服器負擔降到極致：先抓「2 天」
  const ranges =[
    { startOffset: 0, days: 2 },   // ⚡ 第一包：今天+明天 (超快速回傳)
    { startOffset: 2, days: 5 },   // 第二包：第 3-7 天
    { startOffset: 7, days: 7 },   // 第三包：第 8-14 天
    { startOffset: 14, days: 7 }   // 第四包：第 15-21 天
  ];

  const firstDateStr = toDateString(today);

  // 3. 平行觸發背景抓取
  const manualPromise = fetchManualSlots();
  const firstBatchPromise = fetch(`${API_URL}?action=getBatchSlots&startDate=${firstDateStr}&days=${ranges[0].days}`);

  await manualPromise; // 等待管理員手動時段清單回來
  renderStudentView(); // 收到清單，立刻再次更新畫面

  try {
    const res = await firstBatchPromise;
    if (!res.ok) throw new Error("Network error");
    
    const chunkData = await res.json();
    Object.assign(gasData, chunkData);
    
    // 將新拿到的資料存入瀏覽器快取
    localStorage.setItem('tony_gas_cache', JSON.stringify(gasData));
    
    for (let d = 0; d < ranges[0].days; d++) {
      const temp = new Date(today);
      temp.setDate(today.getDate() + d);
      loadedDates.add(toDateString(temp));
    }

    renderStudentView(); // 首批 2 天的最新日曆狀態渲染完成
    if (document.getElementById('admin-panel').classList.contains('open')) updateAdminTimeDropdown();
  } catch (err) {
    gasData._error = true;
    renderStudentView();
    return;
  }

  // 4. 背景載入剩餘天數，使用者在看前幾天的同時，我們在背景偷偷把整個月抓完
  for (let i = 1; i < ranges.length; i++) {
    const chunkDate = new Date(today);
    chunkDate.setDate(today.getDate() + ranges[i].startOffset);
    const startDateStr = toDateString(chunkDate);

    try {
      const res = await fetch(`${API_URL}?action=getBatchSlots&startDate=${startDateStr}&days=${ranges[i].days}`);
      if (!res.ok) continue;
      
      const chunkData = await res.json();
      Object.assign(gasData, chunkData);
      localStorage.setItem('tony_gas_cache', JSON.stringify(gasData)); // 更新快取
      
      for (let d = 0; d < ranges[i].days; d++) {
        const temp = new Date(today);
        temp.setDate(today.getDate() + ranges[i].startOffset + d);
        loadedDates.add(toDateString(temp));
      }

      renderStudentView(); // 每一包抓完就無縫補上新按鈕
    } catch (err) {
      break; 
    }
  }
  
  isGasLoading = false;
  renderStudentView(); 
}

function renderStudentView() {
  const view = document.getElementById('slots-view');
  if (gasData._error) {
     view.innerHTML = `<div class="empty-state"><span class="empty-line"></span><p style="color:#d93025; font-weight:500;">Failed to connect to Calendar.<br>連線至 Google 日曆失敗。</p></div>`;
     return;
  }

  const todayStr = toDateString(new Date());

  const validSlots = manualSlots.filter(ms => {
    if (ms.date < todayStr) return false;
    if (!loadedDates.has(ms.date)) return false; 
    
    const dayData = gasData[ms.date];
    if (!dayData) return false; 
    const isFreeInGas = dayData.slots && dayData.slots.some(gs => gs.time === ms.time);
    
    return isFreeInGas;
  }).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

  if (validSlots.length === 0) {
    if (isGasLoading) {
       view.innerHTML = `<div class="empty-state"><div class="loader"></div><p style="font-size:14px; line-height:1.6;">Checking background schedule...<br>正在確認後續可預約的日期...</p></div>`;
       return;
    }
    view.innerHTML = `<div class="empty-state"><span class="empty-line"></span><p style="line-height:1.6;">No upcoming slots available.<br>目前沒有可預約的時段，請稍後再來查看。</p></div>`;
    return;
  }

  const grouped = {};
  validSlots.forEach(s => {
    if (!grouped[s.date]) grouped[s.date] = [];
    grouped[s.date].push(s);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(date => {
    html += `<div class="date-group"><div class="date-label">${fmtDate(date)}</div><div class="slots-row">`;
    grouped[date].forEach(s => { html += `<button class="slot-btn" onclick="openBooking('${s.id}')">${fmtTime(s.time)}</button>`; });
    html += `</div></div>`;
  });
  view.innerHTML = html;
}

// ── ADMIN EVENT HANDLERS ──
document.getElementById('secret-zone').addEventListener('dblclick', openAdmin);
let secretClickCount = 0, secretTimer = null;
document.getElementById('secret-zone').addEventListener('click', () => {
  secretClickCount++; clearTimeout(secretTimer);
  if (secretClickCount >= 3) { secretClickCount = 0; openAdmin(); }
  else { secretTimer = setTimeout(() => { secretClickCount = 0; }, 600); }
});

function openAdmin() {
  document.getElementById('admin-date').value = toDateString(new Date());
  updateAdminTimeDropdown(); 
  renderAdminList();
  document.getElementById('admin-panel').classList.add('open');
}

function closeAdmin() { document.getElementById('admin-panel').classList.remove('open'); }

function updateAdminTimeDropdown() {
  const dateVal = document.getElementById('admin-date').value;
  const timeSelect = document.getElementById('admin-time');
  const addBtn = document.getElementById('admin-add-btn');
  timeSelect.innerHTML = ''; addBtn.disabled = true;

  if (!dateVal) { timeSelect.innerHTML = '<option value="">請先選擇日期...</option>'; return; }
  if (gasData._error) { timeSelect.innerHTML = '<option value="">連線失敗</option>'; return; }

  if (!loadedDates.has(dateVal)) {
    if (!isGasLoading) timeSelect.innerHTML = '<option value="">此日期超出 21 天範圍</option>';
    else timeSelect.innerHTML = '<option value="">同步中，請稍候...</option>';
    return;
  }

  let hasOption = false;
  ALL_TIMES.forEach(time => {
    if (manualSlots.some(m => m.date === dateVal && m.time === time)) return; 
    const dayData = gasData[dateVal];
    if (!dayData || !dayData.slots || !dayData.slots.some(gs => gs.time === time)) return; 

    const opt = document.createElement('option');
    opt.value = time; opt.textContent = fmtTime(time);
    timeSelect.appendChild(opt);
    hasOption = true;
  });

  if (hasOption) { timeSelect.disabled = false; addBtn.disabled = false; } 
  else { timeSelect.innerHTML = '<option value="">已被預約或無可用空檔</option>'; timeSelect.disabled = true; }
}

function adminAddSlot() {
  const dateVal = document.getElementById('admin-date').value;
  const timeVal = document.getElementById('admin-time').value;
  if (!dateVal || !timeVal) return;

  manualSlots.push({ id: uid(), date: dateVal, time: timeVal, timestamp: new Date(`${dateVal}T${timeVal}:00`).getTime() });
  
  localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
  syncManualSlots(); 
  
  updateAdminTimeDropdown(); renderAdminList(); renderStudentView();
}

function adminDeleteSlot(slotId) {
  if (!confirm(`確定要刪除嗎？ Delete this slot?`)) return;
  manualSlots = manualSlots.filter(x => x.id !== slotId);
  
  localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
  syncManualSlots(); 
  
  updateAdminTimeDropdown(); renderAdminList(); renderStudentView();
}

function renderAdminList() {
  const list = document.getElementById('admin-slot-list');
  const sorted =[...manualSlots].sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  if (sorted.length === 0) { list.innerHTML = `<p style="font-family:var(--font-mono);font-size:12px;color:#666;padding:12px 0">尚未新增任何時段 No slots added</p>`; return; }
  
  list.innerHTML = sorted.map(s => `
    <div class="admin-slot-item">
      <div class="admin-slot-info">${fmtDate(s.date)} · ${fmtTime(s.time)}</div>
      <button class="btn-delete" onclick="adminDeleteSlot('${s.id}')">Delete</button>
    </div>
  `).join('');
}

// ── BOOKING SYSTEM ──
let pendingSlotId = null;

function openBooking(slotId) {
  pendingSlotId = slotId;
  const s = manualSlots.find(x => x.id === slotId);
  if (!s) return;
  document.getElementById('selected-slot-label').textContent = `${fmtDate(s.date)} · ${fmtTime(s.time)}`;
  document.getElementById('inp-name').value = ''; document.getElementById('inp-email').value = '';
  document.getElementById('booking-form-view').style.display = ''; document.getElementById('booking-success-view').style.display = 'none';
  const btn = document.getElementById('confirm-btn'); btn.disabled = false; btn.textContent = 'Confirm / 確認預約 →';
  document.getElementById('booking-overlay').classList.add('open');
}

function closeBooking() { document.getElementById('booking-overlay').classList.remove('open'); pendingSlotId = null; }

function confirmBooking() {
  const name = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name || !email || !email.includes('@')) { alert('Please enter a valid email / 請輸入正確的信箱'); return; }

  const btn = document.getElementById('confirm-btn'); btn.disabled = true; btn.textContent = 'Processing... / 處理中...';
  const s = manualSlots.find(x => x.id === pendingSlotId);
  if (!s) return closeBooking();

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ name: name, email: email, appointments:[{ dateStr: s.date, time: s.time, timestamp: s.timestamp }] })
  }).then(res => res.json()).then(res => {
      if (!res.success) { alert("Failed: " + res.message); btn.disabled = false; btn.textContent = 'Confirm / 確認預約 →'; return; }
      
      manualSlots = manualSlots.filter(x => x.id !== pendingSlotId);
      localStorage.setItem('tony_manual_slots', JSON.stringify(manualSlots));
      syncManualSlots(); 
      
      renderStudentView();
      if(document.getElementById('admin-panel').classList.contains('open')) { renderAdminList(); updateAdminTimeDropdown(); }
      
      document.getElementById('booking-form-view').style.display = 'none';
      document.getElementById('success-detail').textContent = `${fmtDate(s.date)}\n${fmtTime(s.time)}\n\nName: ${name}\nEmail: ${email}\n\n✓ A confirmation email has been sent.\n確認信已寄至您的信箱。`;
      document.getElementById('booking-success-view').style.display = '';
  }).catch(err => {
      alert("Network Error / 網路連線錯誤"); btn.disabled = false; btn.textContent = 'Confirm / 確認預約 →';
  });
}

// 系統啟動
init();
</script>
</body>
</html>
