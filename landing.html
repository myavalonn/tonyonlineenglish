<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #000; overflow-x: hidden; }

        @keyframes slideInFromRight {
            from { transform: scale(1.1) translateX(100%); opacity: 0; }
            to { transform: scale(1.1) translateX(0); opacity: 1; }
        }

        @keyframes slideInFromLeft {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        /* LAYER 1: The Photo (Blurry & Slides in) */
        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            z-index: 1;
            animation: slideInFromRight 1.5s ease-out forwards;
        }

        /* LAYER 2: Dark Overlay */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Slightly darker for better text contrast */
            z-index: 2;
        }

        /* LAYER 3: Content */
        .hero-content {
            position: relative;
            z-index: 3;
            animation: slideInFromLeft 1.2s ease-out forwards;
            padding: 0 10px;
            width: 100%;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            white-space: nowrap;
        }

        /* Tony: 10% Darker Blue + Glow */
        .tony-name {
            font-style: italic;
            color: #00166d; /* Darker Blue */
            text-shadow: 0 0 15px #0044ff, 0 0 30px #00166d;
            margin-right: 5px;
        }

        /* Spacing Logic for Mobile vs Desktop */
        .mobile-text { display: none; }
        .desktop-text { display: inline; }

        .sub-text {
            font-size: 2rem;
            font-style: italic;
            margin: 15px 0 5px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        .tagline {
            font-size: 1.4rem;
            margin-bottom: 40px;
            color: #bdc3c7;
            letter-spacing: 4px;
        }

        .btn-main {
            padding: 18px 50px;
            font-size: 1.4rem;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .btn-main:hover {
            background-color: #1557b0;
            box-shadow: 0 0 20px rgba(26, 115, 232, 0.6);
        }

        /* Cellphone Mode Adjustments */
        @media (max-width: 768px) {
            .desktop-text { display: none; }
            .mobile-text { display: inline; }
            
            .hero h1 { 
                /* Shrink font to ensure "Tony 線上 美 語 家 教" stays on one row */
                font-size: 6.2vw; 
            } 
            .sub-text { font-size: 4.5vw; }
            .tagline { font-size: 3.5vw; letter-spacing: 2px; }
            .btn-main { padding: 15px 35px; font-size: 1.1rem; }
        }

        .info-section { padding: 80px 20px; text-align: center; background: white; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1100px; margin: 40px auto; }
        .card { padding: 30px; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>
                <span class="tony-name">Tony</span>
                <span class="desktop-text">線上美語家教</span>
                <span class="mobile-text"> 線上 美 語 家 教</span>
            </h1>
            <div class="sub-text">Tony Online English Tutoring</div>
            <div class="tagline">English is the Future</div>
            <br>
            <a href="#courses" class="btn-main">顯示所有課程</a>
        </div>
    </header>

    <section class="info-section">
        <h2>課程優勢</h2>
        <div class="grid">
            <div class="card"><h3>🗓️ 專業線上預約</h3><p>24小時隨時預約。</p></div>
            <div class="card"><h3>📹 課程全程錄影</h3><p>方便課後無限次複習。</p></div>
            <div class="card"><h3>💳 會員訂閱制</h3><p>穩定的學習步調與優惠。</p></div>
        </div>
    </section>

</body>
</html>
