<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #fff; overflow-x: hidden; }
        
        @keyframes slideInPhoto {
            from { background-position: 150% center; opacity: 0; }
            to { background-position: center; opacity: 1; }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Neon Glow Animation */
        @keyframes neonGlow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #00d2ff, 0 0 20px #00d2ff; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #00d2ff, 0 0 40px #00d2ff; }
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            animation: slideInPhoto 1.5s ease-out forwards;
        }

        .hero-content {
            animation: slideInLeft 1.2s ease-out forwards;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        /* Tony: Bright Blue and Glow */
        .tony-name {
            color: #00d2ff;
            font-style: italic;
            display: inline-block;
            animation: neonGlow 1.5s ease-in-out infinite alternate;
        }

        /* English Texts: Italicized */
        .sub-text {
            font-size: 1.8rem;
            font-style: italic; /* Italicized as requested */
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .tagline {
            font-size: 1.4rem;
            font-style: italic; /* Italicized as requested */
            color: #fff;
            animation: neonGlow 2s ease-in-out infinite alternate; /* Added glow to tagline */
        }

        .btn-main {
            display: inline-block;
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 1.4rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* Responsive Settings for Cellphone */
        @media (max-width: 768px) { 
            .hero h1 { font-size: 3.5rem; }
            .hero h1 span.break { display: block; } /* Forces the second row */
            .sub-text { font-size: 1.3rem; }
            .tagline { font-size: 1.1rem; }
            .btn-main { padding: 15px 40px; font-size: 1.1rem; }
        }

        .info-section { padding: 80px 20px; text-align: center; max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { padding: 40px 20px; border-radius: 20px; background: #ffffff; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card h3 { color: #3498db; font-size: 1.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1>
                <span class="tony-name">Tony</span>線上<br class="break">
                <span class="second-row">美語家教</span>
            </h1>
            <div class="sub-text">Tony Online English Tutoring</div>
            <div class="tagline">English is the Future</div>
            <a href="#courses" class="btn-main">顯示所有課程</a>
        </div>
    </header>

    <section class="info-section">
        <h2>課程優勢</h2>
        <div class="grid">
            <div class="card">
                <h3>🗓️ 專業線上預約</h3>
                <p>24小時隨時預約，彈性安排課程時段。</p>
            </div>
            <div class="card">
                <h3>📹 課程全程錄影</h3>
                <p>提供錄影檔方便課後無限次複習。</p>
            </div>
            <div class="card">
                <h3>💳 會員訂閱制</h3>
                <p>穩定的學習步調，更優惠的長期學費。</p>
            </div>
        </div>
    </section>

</body>
</html>
