<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tony 線上美語預約時段</title>
    <!-- 引入 Google 手寫字體讓 Tony 更接近圖片質感 -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* 套用您指定的深色背景與基礎設定 */
        html { 
            background-color: #060b1c !important; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: "Microsoft JhengHei", sans-serif; 
            color: white; 
            overflow-x: hidden; /* 防止動畫時出現左右捲軸 */
        }

        /* 英雄區塊容器 */
        .hero {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* ====== 1. 照片從左側滑入 ====== */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            /* 背景加入深色遮罩，讓文字更清晰 */
            background: linear-gradient(rgba(6, 11, 28, 0.7), rgba(6, 11, 28, 0.8)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translateX(-100%);
            animation: slideInPhotoLeft 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .hero-content { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* ====== 2. 左上角「課程介紹」連結按鈕 (等待2秒出現) ====== */
        .course-intro-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            text-decoration: none;
            color: white;
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            /* 顏色稍微帶一點 Tony 的藍色調，與一般 tag 區分 */
            background: rgba(107, 115, 255, 0.25); 
            padding: 8px 20px;
            border-radius: 25px;
            border: 1px solid rgba(107, 115, 255, 0.6);
            backdrop-filter: blur(5px);
            opacity: 0; /* 初始隱藏 */
            /* 延遲 2s 執行 popInTopLeft 動畫 */
            animation: popInTopLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        .course-intro-btn:hover {
            background-color: rgba(107, 115, 255, 0.6);
            box-shadow: 0 0 12px rgba(107, 115, 255, 0.8);
            transform: scale(1.05); /* 游標經過時微微放大 */
        }

        /* ====== 3. 標題群組從右側滑入 ====== */
        .title-group {
            transform: translateX(100vw); 
            opacity: 0;
            animation: slideInTextRight 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2.5vh 0;
        }

        .main-title {
            font-size: clamp(2rem, 9.5vw, 6rem); 
            font-weight: 900;
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .tony-name { 
            color: #6B73FF; 
            font-family: 'Pacifico', 'Comic Sans MS', 'Brush Script MT', cursive; 
            font-weight: normal; 
            margin-right: 2vw; 
            padding-right: 0.5vw;
            text-shadow: 0px 0px 10px rgba(107, 115, 255, 0.6); 
        }

        .subtitle-italic {
            font-size: clamp(1rem, 4.5vw, 2rem);
            font-style: italic;
            font-weight: 400;
            color: #f1f1f1;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .slogan-text {
            font-size: clamp(0.9rem, 4vw, 1.8rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            margin: 4px 0;
            letter-spacing: 1.5px;
        }

        /* ====== 4. 標籤區域與動畫 ====== */
        .tags-container {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            max-width: 95vw;
        }

        .tag {
            font-size: clamp(0.75rem, 3.5vw, 1rem);
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }

        .tags-top { 
            transform: translateY(-50px); 
            opacity: 0;
            animation: slideInTop 1s ease-out 0.6s forwards; 
        }

        .tags-bottom { 
            transform: translateY(50px); 
            opacity: 0;
            animation: slideInBottom 1s ease-out 0.6s forwards; 
        }

        /* ====== 動畫定義 ====== */
        @keyframes slideInPhotoLeft { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(0); } 
        }
        @keyframes slideInTextRight { 
            from { transform: translateX(100vw); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        @keyframes slideInTop { 
            from { transform: translateY(-50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes slideInBottom { 
            from { transform: translateY(50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        /* 左上角按鈕專屬滑入動畫 */
        @keyframes popInTopLeft {
            from { transform: translate(-20px, -20px); opacity: 0; }
            to { transform: translate(0, 0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <!-- 💡 左上角課程介紹按鈕 (等待 2 秒後滑入) -->
        <a href="https://tonyonlineenglish.netlify.app" class="course-intro-btn">課程介紹</a>

        <div class="hero-content">
            <!-- 上方標籤 (新增了：國中會考) -->
            <div class="tags-container tags-top">
                <span class="tag">升學</span>
                <span class="tag">檢定</span>
                <span class="tag">國中會考</span>
                <span class="tag">高中學測</span>
                <span class="tag">技高統測</span>
                <span class="tag">全民英檢</span>
                <span class="tag">多益</span>
                <span class="tag">FLPT外語能力測驗</span>
            </div>

            <!-- 標題群組 -->
            <div class="title-group">
                <h1 class="main-title"><span class="tony-name">Tony</span>線上美語家教</h1>
                <div class="subtitle-italic">Tony Online English Tutoring</div>
                <div class="slogan-text">English is the Future.</div>
                <div class="slogan-text">Let's get your English Boosted.</div>
            </div>

            <!-- 下方標籤 (新增了：國小英文) -->
            <div class="tags-container tags-bottom">
                <span class="tag">國小英文</span>
                <span class="tag">聽說讀寫</span>
                <span class="tag">作文</span>
                <span class="tag">觀光美語</span>
                <span class="tag">展場英文</span>
                <span class="tag">客製化</span>
                <span class="tag">職場</span>
                <span class="tag">公職</span>
                <span class="tag">英文面試</span>
            </div>
        </div>
    </div>

    <!-- 💡 layout-manager.js 放在 body 結尾前確保元素皆已載入 -->
    <script src="layout-manager.js"></script>
</body>
</html>
