<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #fff; }
        
        /* Hero Section set to 50% of the viewport height */
        .hero {
            height: 50vh; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 3.5rem; /* Slightly smaller to fit the half-height better */
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
            line-height: 1.1;
        }

        .btn-main {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .btn-main:hover { 
            transform: translateY(-2px); 
            background-color: #2980b9;
        }

        /* Content Section */
        .info-section { padding: 60px 20px; text-align: center; max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { padding: 30px 20px; border-radius: 15px; background: #ffffff; border: 1px solid #eee; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .card h3 { color: #3498db; margin-bottom: 10px; }
        .card p { color: #666; font-size: 0.95rem; }

        @media (max-width: 768px) { 
            .hero { height: 40vh; } /* Even shorter on mobile for better UX */
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Tony<br>線上美語家教</h1>
        <a href="#courses" class="btn-main">顯示所有課程</a>
    </header>

    <section class="info-section">
        <h2>課程優勢</h2>
        <div class="grid">
            <div class="card">
                <h3>🗓️ 專業線上預約</h3>
                <p>24小時隨時預約，彈性安排課程時段。</p>
            </div>
            <div class="card">
                <h3>📹 課程全程錄影</h3>
                <p>提供錄影檔方便課後無限次複習。</p>
            </div>
            <div class="card">
                <h3>💳 會員訂閱制</h3>
                <p>穩定的學習步調，更優惠的長期學費。</p>
            </div>
        </div>
    </section>

</body>
</html>
