<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #000; color: white; overflow-x: hidden; }
        
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
        }

        /* 動畫設定 */
        @keyframes slideRight { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(-100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .hero-content { display: flex; flex-direction: column; align-items: center; width: 100%; }

        /* 主標題：從右進場 */
        .main-title {
            animation: slideRight 1s ease-out forwards;
            font-size: 3.5rem;
            margin: 20px 0;
            white-space: nowrap;
        }
        .tony-name { color: #4e54c8; font-family: cursive; font-weight: bold; margin-right: 15px; }

        /* 標籤容器 */
        .tags-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; padding: 10px; }
        
        .tag {
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tags-top { animation: slideDown 1s ease-out forwards; margin-bottom: 10px; }
        .tags-bottom { animation: slideUp 1s ease-out forwards; margin-top: 10px; }

        /* 額外元素：從左進場 */
        .sub-text { animation: slideLeft 1s ease-out forwards; font-size: 1.2rem; margin-top: 20px; }

        @media (max-width: 768px) {
            .main-title { font-size: 1.8rem; }
            .tag { font-size: 0.75rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <!-- 上方標籤 -->
            <div class="tags-container tags-top">
                <span class="tag">升學</span><span class="tag">檢定</span><span class="tag">全民英檢</span>
                <span class="tag">多益</span><span class="tag">FLPT外語能力測驗</span><span class="tag">高中學測</span><span class="tag">技高統測</span>
            </div>

            <!-- 主標題 -->
            <h1 class="main-title"><span class="tony-name">Tony</span>線上美語家教</h1>

            <!-- 下方標籤 -->
            <div class="tags-container tags-bottom">
                <span class="tag">作文</span><span class="tag">聽說讀寫</span><span class="tag">觀光美語</span>
                <span class="tag">展場英文</span><span class="tag">客製化</span><span class="tag">職場</span>
                <span class="tag">公職</span><span class="tag">英文面試</span>
            </div>
            
            <div class="sub-text">專業的一對一客製化英語學習服務</div>
        </div>
    </header>

</body>
</html>
