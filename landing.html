<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #fff; overflow-x: hidden; }
        
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero-content { padding: 0 20px; }

        /* 標題與 Tony 顏色優化 */
        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            white-space: nowrap;
        }

        .tony-name {
            /* 換成亮金色漸層，在深色背景上極度顯眼且高級 */
            background: linear-gradient(to right, #FFD700, #FFEA00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
            margin-right: 15px;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }

        .sub-text { font-size: 1.5rem; margin-bottom: 20px; }

        /* 新增課程標籤區塊設計 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .tag {
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .btn-main {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main:hover { background-color: #2980b9; transform: translateY(-3px); }

        /* RWD 調整 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .sub-text { font-size: 1rem; }
            .tag { font-size: 0.75rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1><span class="tony-name">Tony</span>線上美語家教</h1>
            <div class="sub-text">Tony Online English Tutoring</div>
            
            <!-- 課程標籤清單 -->
            <div class="tags-container">
                <span class="tag">升學</span><span class="tag">檢定</span><span class="tag">全民英檢</span>
                <span class="tag">多益</span><span class="tag">FLPT外語能力測驗</span><span class="tag">高中學測</span>
                <span class="tag">技高統測</span><span class="tag">作文</span><span class="tag">聽說讀寫</span>
            </div>

            <a href="#courses" class="btn-main">顯示所有課程</a>
        </div>
    </header>

</body>
</html>
