<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony線上美語家教</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 核心 Hero 區塊 */
        .hero {
            height: 100vh;
            /* 使用 Unsplash 提供的亞洲學生線上學習圖片，保證連結有效 */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 5rem; /* 您要的極大字體 */
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.8);
        }

        .btn-main {
            padding: 20px 60px;
            font-size: 1.5rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .btn-main:hover { transform: scale(1.05); background-color: #2980b9; }

        /* 優勢區塊 */
        .info-section { padding: 80px 20px; text-align: center; max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { padding: 30px; border-radius: 15px; background: #f9f9f9; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card h3 { color: #3498db; }

        @media (max-width: 768px) { .hero h1 { font-size: 2.8rem; } }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Tony<br>線上美語家教</h1>
        <a href="#courses" class="btn-main">顯示所有課程</a>
    </header>

    <section class="info-section">
        <h2>課程優勢</h2>
        <div class="grid">
            <div class="card">
                <h3>🗓️ 專業線上預約</h3>
                <p>24小時隨時預約，彈性安排課程時段。</p>
            </div>
            <div class="card">
                <h3>📹 課程全程錄影</h3>
                <p>提供錄影檔方便課後無限次複習。</p>
            </div>
            <div class="card">
                <h3>💳 會員訂閱制</h3>
                <p>穩定的學習步調，更優惠的長期學費。</p>
            </div>
        </div>
    </section>

</body>
</html>
