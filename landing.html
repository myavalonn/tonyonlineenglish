<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tony 線上美語預約時段</title>
    <!-- 引入 Google 手寫字體讓 Tony 更接近圖片質感 -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* 套用您指定的深色背景與基礎設定 */
        html { 
            background-color: #060b1c !important; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: "Microsoft JhengHei", sans-serif; 
            color: white; 
            overflow-x: hidden; /* 防止動畫時出現左右捲軸 */
        }

        /* 英雄區塊容器 */
        .hero {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* 確保外層有全站白底時，這個區塊依然強制是深色底 */
            background-color: #060b1c !important; 
        }

        /* ====== 1. 照片從左側滑入 ====== */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            /* 背景加入深色遮罩，讓文字更清晰 */
            background: linear-gradient(rgba(6, 11, 28, 0.7), rgba(6, 11, 28, 0.8)), 
                        url('https://ik.imagekit.io/lql1uveoc/HIgh%20Quality%20Pictures/1DE8F5F9-4E48-4960-84F7-A5B1B98B4954.jpg');
            background-size: cover;
            background-position: center;
            /* Z-index 設為 1，防止退到全站白色背景後面 */
            z-index: 1;
            transform: translateX(-100%);
            animation: slideInPhotoLeft 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* ====== 2. 內容區塊 ====== */
        .hero-content { 
            /* 必須設定 relative，且 Z-index 設為 2，確保白字蓋在背景圖上 */
            position: relative;
            z-index: 2;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* ====== 3. 左上角「課程詳細介紹」連結按鈕 (等待2秒出現) ====== */
        .course-intro-btn {
            position: absolute;
            top: 110px; /* 避開頂部 Header */
            left: 30px;
            z-index: 100;
            text-decoration: none;
            color: white;
            /* 🚀 讓字體變大、加粗，使其更吸睛 */
            font-size: clamp(1rem, 4vw, 1.25rem);
            font-weight: bold;
            /* 🚀 換上吸睛的漸層背景 */
            background: linear-gradient(135deg, #4e54c8, #6B73FF); 
            padding: 12px 28px;
            border-radius: 40px; /* 🚀 更圓潤的膠囊形狀 (Pill shape) */
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 15px rgba(107, 115, 255, 0.6);
            opacity: 0; /* 初始隱藏 */
            animation: popInTopLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
            transition: all 0.3s ease;
            
            /* 🚀 Flex 排版讓文字與圖示對齊 */
            display: flex;
            align-items: center;
            gap: 10px; 
        }

        .course-intro-btn:hover {
            background: linear-gradient(135deg, #6B73FF, #4e54c8);
            box-shadow: 0 8px 25px rgba(107, 115, 255, 0.9);
            transform: scale(1.06); /* 游標經過時稍微放大 */
        }

        /* 🚀 點擊圖示 (Tap Icon) 樣式與浮動動畫 */
        .tap-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            animation: floatIcon 1.5s infinite ease-in-out alternate;
        }

        @keyframes floatIcon {
            from { transform: translateY(0); }
            to { transform: translateY(-4px) scale(1.05); }
        }

        /* ====== 4. 標題群組從右側滑入 ====== */
        .title-group {
            transform: translateX(100vw); 
            opacity: 0;
            animation: slideInTextRight 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2.5vh 0;
        }

        .main-title {
            font-size: clamp(2rem, 9.5vw, 6rem); 
            font-weight: 900;
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .tony-name { 
            color: #6B73FF; 
            font-family: 'Pacifico', 'Comic Sans MS', 'Brush Script MT', cursive; 
            font-weight: normal; 
            margin-right: 2vw; 
            padding-right: 0.5vw;
            text-shadow: 0px 0px 10px rgba(107, 115, 255, 0.6); 
        }

        .subtitle-italic {
            font-size: clamp(1rem, 4.5vw, 2rem);
            font-style: italic;
            font-weight: 400;
            color: #f1f1f1;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .slogan-text {
            font-size: clamp(0.9rem, 4vw, 1.8rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            margin: 4px 0;
            letter-spacing: 1.5px;
            /* 🚀 強制設定為斜體 (Italicized) */
            font-style: italic; 
        }

        /* ====== 5. 標籤區域與動畫 ====== */
        .tags-container {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            max-width: 95vw;
        }

        .tag {
            font-size: clamp(0.75rem, 3.5vw, 1rem);
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }

        .tags-top { 
            transform: translateY(-50px); 
            opacity: 0;
            animation: slideInTop 1s ease-out 0.6s forwards; 
        }

        .tags-bottom { 
            transform: translateY(50px); 
            opacity: 0;
            animation: slideInBottom 1s ease-out 0.6s forwards; 
        }

        /* ====== 動畫定義 ====== */
        @keyframes slideInPhotoLeft { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(0); } 
        }
        @keyframes slideInTextRight { 
            from { transform: translateX(100vw); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        @keyframes slideInTop { 
            from { transform: translateY(-50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes slideInBottom { 
            from { transform: translateY(50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        /* 左上角按鈕專屬滑入動畫 */
        @keyframes popInTopLeft {
            from { transform: translate(-20px, -20px); opacity: 0; }
            to { transform: translate(0, 0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <!-- 💡 左上角課程詳細介紹按鈕 (等待 2 秒後滑入，並加入小手圖標) -->
        <a href="https://tonyonlineenglish.netlify.app" class="course-intro-btn">
            課程詳細介紹
            <img src="https://ik.imagekit.io/lql1uveoc/tap-4.png?updatedAt=1771239128743" alt="Click Here" class="tap-icon">
        </a>

        <div class="hero-content">
            <!-- 上方標籤 -->
            <div class="tags-container tags-top">
                <span class="tag">升學</span>
                <span class="tag">檢定</span>
                <span class="tag">國中會考</span>
                <span class="tag">高中學測</span>
                <span class="tag">技高統測</span>
                <span class="tag">全民英檢</span>
                <span class="tag">多益</span>
                <span class="tag">FLPT外語能力測驗</span>
            </div>

            <!-- 標題群組 -->
            <div class="title-group">
                <h1 class="main-title"><span class="tony-name">Tony</span>線上美語家教</h1>
                <div class="subtitle-italic">Tony Online English Tutoring</div>
                <!-- 🚀 下方兩句皆已變成斜體 -->
                <div class="slogan-text">English is the Future.</div>
                <div class="slogan-text">Let's get your English Boosted.</div>
            </div>

            <!-- 下方標籤 -->
            <div class="tags-container tags-bottom">
                <span class="tag">國小英文</span>
                <span class="tag">聽說讀寫</span>
                <span class="tag">作文</span>
                <span class="tag">觀光美語</span>
                <span class="tag">展場英文</span>
                <span class="tag">客製化</span>
                <span class="tag">職場</span>
                <span class="tag">公職</span>
                <span class="tag">英文面試</span>
            </div>
        </div>
    </div>

    <!-- 💡 原本的排版腳本 -->
    <script src="layout-manager.js"></script>

    <!-- 🚀 處理上方導覽列(Header) 滑動隱藏/顯示的腳本 -->
    <script>
        let topHeader = null;

        function initHeaderScroll() {
            // 動態尋找您的 header，應對 layout-manager.js 可能較晚生成元素的情況
            if (!topHeader) {
                topHeader = document.querySelector('header') || document.querySelector('.navbar') || document.querySelector('nav');
                
                if (topHeader) {
                    // 強制將 header 設定為固定在最上方，並加上平滑過渡動畫
                    topHeader.style.position = 'fixed';
                    topHeader.style.top = '0';
                    topHeader.style.left = '0';
                    topHeader.style.width = '100%';
                    topHeader.style.zIndex = '9999';
                    topHeader.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                }
            }
        }

        // 監聽滾動事件
        window.addEventListener('scroll', () => {
            initHeaderScroll();
            if (topHeader) {
                // 當視窗往下滾動超過 50px 時，將 header 往上平移隱藏
                if (window.scrollY > 50) {
                    topHeader.style.transform = 'translateY(-100%)';
                } else {
                    // 滾回頂部時 (scrollY <= 50)，讓 header 重新降下顯示
                    topHeader.style.transform = 'translateY(0)';
                }
            }
        });

        // 頁面載入後自動檢查一次
        setTimeout(initHeaderScroll, 500);
        
        // 為了防止 layout-manager.js 載入過慢，設定一個定時器幫忙尋找 Header 元素
        setInterval(initHeaderScroll, 2000); 
    </script>
</body>
</html>
